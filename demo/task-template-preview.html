<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task 403 — Preview</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,Arial,sans-serif;background:#141414;color:#1a1a1a;font-size:15px;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px}

.shell{width:100%;max-width:1040px;border-radius:14px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 4px 32px rgba(0,0,0,0.35),0 0 0 0.5px rgba(255,255,255,0.08)}

/* Topbar */
.topbar{background:#242424;padding:11px 18px;display:flex;align-items:center;gap:10px;position:sticky;top:0;z-index:10}
.back-btn{font-size:12px;color:rgba(255,255,255,0.45);border:0.5px solid rgba(255,255,255,0.1);border-radius:5px;padding:4px 10px;cursor:pointer;background:transparent;text-decoration:none;display:flex;align-items:center;gap:4px;white-space:nowrap;transition:color 0.12s,border-color 0.12s}
.back-btn:hover{color:#fff;border-color:rgba(255,255,255,0.25)}
.topbar-title{font-size:14px;font-weight:600;color:#fff;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;letter-spacing:-0.01em}
.topbar-meta{font-size:12px;color:rgba(255,255,255,0.28);white-space:nowrap}
.task-link{font-size:12px;color:rgba(255,255,255,0.35);text-decoration:none;border:0.5px solid rgba(255,255,255,0.1);border-radius:5px;padding:4px 10px;background:transparent;white-space:nowrap;transition:color 0.12s,border-color 0.12s}
.task-link:hover{color:#fff;border-color:rgba(255,255,255,0.25)}

/* Stats */
.stats-bar{background:#1d1d1d;border-bottom:0.5px solid rgba(255,255,255,0.05);padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap}
.pill{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
.pl-pass{background:rgba(82,168,105,0.2);color:#7ec87e}
.pl-fail{background:rgba(226,75,74,0.2);color:#f09595}
.pl-skip{background:rgba(212,160,23,0.2);color:#c9a040}
.pl-pend{background:rgba(255,255,255,0.07);color:rgba(255,255,255,0.3)}

/* Content area */
.body{background:#f5f4f1;padding:14px 18px 20px}

.section-hd{font-size:11px;font-weight:600;color:#bbb;letter-spacing:0.07em;padding:14px 0 6px;text-transform:uppercase}
.section-hd:first-child{padding-top:4px}

/* TC Row */
.tc-row{background:#fff;border:0.5px solid #e8e8e8;border-left:3px solid transparent;border-radius:7px;padding:9px 11px;margin-bottom:5px;transition:border-color 0.1s}
.tc-row.s-pass{border-left-color:#52a869;background:#fafffe}
.tc-row.s-fail{border-left-color:#e24b4a;background:#fffafa}
.tc-row.s-skip{border-left-color:#d4a017;background:#fffdf5}
.tc-top{display:grid;grid-template-columns:48px 1fr auto;gap:8px;align-items:center}
.tc-id{font-size:12px;color:#bbb}
.tc-name{font-size:14px;color:#1a1a1a;font-weight:500;line-height:1.4}
.tc-btns{display:flex;gap:3px;flex-shrink:0}
.tbtn{font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid #e0e0e0;background:#fff;color:#999;cursor:pointer;transition:all 0.1s}
.tbtn:hover{background:#f5f5f5}
.tbtn.ap{background:#eaf3de;color:#3b6d11;border-color:#c0dd97}
.tbtn.af{background:#fcebeb;color:#a32d2d;border-color:#f7c1c1}
.tbtn.as{background:#faeeda;color:#854f0b;border-color:#fac775}
.tc-toggle{font-size:12px;color:#bbb;cursor:pointer;margin-top:5px;display:inline-flex;align-items:center;gap:3px;user-select:none}
.tc-toggle:hover{color:#888}

/* Detail */
.tc-detail{margin-top:8px;padding-top:8px;border-top:0.5px solid #f0f0f0;display:none}
.tc-detail.open{display:block}
.detail-label{font-size:12px;color:#aaa;margin-bottom:3px;margin-top:8px}
.detail-label:first-child{margin-top:0}
.detail-val{font-size:13px;color:#444;line-height:1.6}

.actual-editor{min-height:72px;border:0.5px solid #ddd;border-radius:5px;padding:7px 9px;font-size:13px;color:#1a1a1a;background:#fff;outline:none;line-height:1.6}
.actual-editor:focus{border-color:#aaa}
.actual-editor[data-placeholder]:empty:before{content:attr(data-placeholder);color:#ccc;pointer-events:none}
.save-row{display:flex;justify-content:flex-end;margin-top:5px}
.save-btn{font-size:12px;padding:4px 12px;border-radius:5px;border:0.5px solid #ccc;background:#1a1a1a;color:#fff;cursor:pointer}
.save-btn:hover{background:#333}

/* Bottom bar */
.bottom-bar{display:flex;gap:8px;padding:11px 18px;background:#eeecea;border-top:0.5px solid #e4e1dc}
.abtn{font-size:13px;padding:7px 14px;border-radius:6px;border:0.5px solid #ddd;background:#fff;color:#666;cursor:pointer;transition:background 0.1s}
.abtn:hover{background:#f5f5f5}
.abtn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.abtn.primary:hover{background:#333}
.abtn.send{background:#1F3864;color:#fff;border-color:#1F3864}
.abtn.send:hover{background:#2a4a82}

/* Bug output */
.bug-out{display:none;padding:0 18px 20px;background:#f5f4f1}
.bug-out.open{display:block}
.bug-section-title{font-size:12px;font-weight:500;color:#1a1a1a;margin-bottom:8px;padding-top:4px}
.bug-item{border:0.5px solid #f7c1c1;background:#fffafa;border-radius:7px;padding:10px 12px;margin-bottom:8px}
.bug-id{font-size:12px;color:#a32d2d;font-weight:500;margin-bottom:5px}
.bug-line{font-size:13px;color:#444;line-height:1.7}
.bug-line b{color:#888;font-weight:500}
.no-fail{font-size:14px;color:#3b6d11;background:#eaf3de;border-radius:7px;padding:10px 14px;display:inline-block}
.bug-actual-content{font-size:13px;color:#444;line-height:1.6;margin-top:2px;padding-left:16px}

/* Lightbox */
.lb-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lb-overlay img{max-width:90vw;max-height:90vh;border-radius:8px}
.lb-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}

.send-progress{position:fixed;bottom:24px;right:24px;z-index:9998;background:#1a1a1a;color:#fff;border-radius:8px;padding:12px 16px;font-size:13px;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,0.2);line-height:1.6}
.send-progress-title{font-weight:500;margin-bottom:6px}
.send-step{color:#aaa;font-size:12px}
.send-step.done{color:#7ec87e}
.send-step.active{color:#fff}
.send-step.err{color:#f09595}
</style>
</head>
<body>

<div class="shell">
  <div class="topbar">
    <a class="back-btn" href="../../index.html">← กลับ</a>
    <div class="topbar-title">#403 — ฟอร์มบันทึกประวัติการเปลี่ยนแปลงข้อมูลการทำงานของพนักงาน</div>
    <div class="topbar-meta">HR · Sprint 5</div>
    <a class="task-link" href="#" target="_blank">เปิด Board ↗</a>
  </div>

  <div class="stats-bar">
    <span class="pill pl-pass" id="sp">Pass 0</span>
    <span class="pill pl-fail" id="sf">Fail 0</span>
    <span class="pill pl-skip" id="ss">Skip 0</span>
    <span class="pill pl-pend" id="sn">Pending 5</span>
  </div>

  <div class="body">
    <div id="tc-list"></div>
  </div>

  <div class="bottom-bar">
    <button class="abtn" onclick="resetAll()">Reset</button>
    <button class="abtn primary" onclick="showBugReport()">สรุป Bug Report</button>
    <button class="abtn" id="export-btn" onclick="exportBugJSON()" style="display:none">📥 Export JSON</button>
    <button class="abtn send" id="send-btn" onclick="sendToBoard()" style="display:none">📤 ส่งไป Taiga</button>
  </div>

  <div class="bug-out" id="bug-out">
    <div class="bug-section-title" id="bug-title"></div>
    <div id="bug-list"></div>
  </div>
</div>

<script>
const STORAGE_KEY = 'qa_task_preview'
const TASK_URL = '#'
const TASK_NUMBER = '403'
const TASK_NAME = 'ฟอร์มบันทึกประวัติการเปลี่ยนแปลงข้อมูลการทำงาน'

const SECTIONS = [
  {
    name: "ส่วนที่ 1 — เลือกพนักงาน",
    tcs: [
      { id: "TC-001", name: "ค้นหาพนักงาน Active ด้วยรหัสพนักงาน",
        precondition: "มีพนักงาน Active อยู่ในระบบ",
        steps: "1. เปิดฟอร์ม\n2. พิมพ์รหัสพนักงาน Active ในช่องค้นหา\n3. ดู dropdown",
        expected: "แสดงชื่อพนักงานใน dropdown สามารถเลือกได้" },
      { id: "TC-002", name: "บันทึกโดยไม่เลือกพนักงาน (required field)",
        precondition: "เปิดฟอร์มใหม่",
        steps: "1. ไม่เลือกพนักงาน\n2. กดบันทึก",
        expected: "ระบบแจ้ง error และไม่บันทึก" },
    ]
  },
  {
    name: "ส่วนที่ 2 — กรอกข้อมูลการเปลี่ยนแปลง",
    tcs: [
      { id: "TC-003", name: "กรอกข้อมูลครบทุกช่องบังคับและกดบันทึก",
        precondition: "เลือกพนักงานแล้ว",
        steps: "1. กรอกประเภทการเปลี่ยนแปลง\n2. กรอกวันที่มีผล\n3. กรอกตำแหน่งใหม่\n4. กดบันทึก",
        expected: "บันทึกสำเร็จ แสดง toast แจ้งผล" },
      { id: "TC-004", name: "ฟิลด์แสดงค่าปัจจุบันแบบ read-only",
        precondition: "เลือกพนักงานแล้ว",
        steps: "1. เลือกพนักงาน\n2. ตรวจสอบฟิลด์ \"ตำแหน่งปัจจุบัน\"",
        expected: "แสดงค่าปัจจุบันของพนักงาน ไม่สามารถแก้ไขได้" },
      { id: "TC-005", name: "วันที่มีผลเป็นอดีต ระบบแจ้ง warning",
        precondition: "เลือกพนักงานแล้ว",
        steps: "1. กรอกวันที่มีผลเป็นวันในอดีต\n2. ดูการแจ้งเตือน",
        expected: "แสดง warning แต่ไม่บล็อกการบันทึก" },
    ]
  }
]

const state = {}
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  state[tc.id] = { status: null, note: '' }
}))

function saveState() {
  const data = {}
  Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY)
    if (!saved) return
    const data = JSON.parse(saved)
    Object.keys(data).forEach(id => {
      if (state[id]) { state[id].status = data[id].status; state[id].note = data[id].note || '' }
    })
  } catch(e) {}
}

function updateStats() {
  let p=0,f=0,s=0,n=0
  Object.values(state).forEach(v => {
    if(v.status==='pass') p++
    else if(v.status==='fail') f++
    else if(v.status==='skip') s++
    else n++
  })
  document.getElementById('sp').textContent = 'Pass ' + p
  document.getElementById('sf').textContent = 'Fail ' + f
  document.getElementById('ss').textContent = 'Skip ' + s
  document.getElementById('sn').textContent = 'Pending ' + n
}

function setStatus(id, st) {
  state[id].status = state[id].status === st ? null : st
  const row = document.getElementById('row-' + id)
  row.className = 'tc-row' + (state[id].status ? ' s-' + state[id].status : '')
  ;['p','f','s'].forEach(k => {
    const map = {p:'pass',f:'fail',s:'skip'}
    const btn = document.getElementById(k + '-' + id)
    btn.className = 'tbtn' + (state[id].status === map[k] ? ' a' + k : '')
  })
  updateStats()
  saveState()
}

function toggleDetail(id, el) {
  const d = document.getElementById('detail-' + id)
  const open = d.classList.toggle('open')
  el.textContent = open ? '▾ ซ่อน' : '▸ ดูรายละเอียด'
}

function setupEditor(id) {
  const editor = document.getElementById('actual-' + id)
  if (!editor) return
  editor.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || [])
    const imgItem = items.find(i => i.type.startsWith('image/'))
    if (!imgItem) return
    e.preventDefault()
    const reader = new FileReader()
    reader.onload = (ev) => {
      const img = document.createElement('img')
      img.src = ev.target.result
      img.style.cssText = 'max-width:100%;border-radius:4px;display:block;margin:4px 0;cursor:zoom-in'
      img.onclick = () => openLightbox(img.src)
      insertAtCursor(img)
    }
    reader.readAsDataURL(imgItem.getAsFile())
  })
}

function insertAtCursor(node) {
  const sel = window.getSelection()
  if (!sel || !sel.rangeCount) return
  const range = sel.getRangeAt(0)
  range.deleteContents()
  range.insertNode(node)
  range.setStartAfter(node)
  range.collapse(true)
  sel.removeAllRanges()
  sel.addRange(range)
}

function saveActual(id) {
  const editor = document.getElementById('actual-' + id)
  state[id].note = editor ? editor.innerHTML : ''
  saveState()
  showToast('💾 บันทึกแล้ว')
}

function openLightbox(src) {
  const overlay = document.createElement('div')
  overlay.className = 'lb-overlay'
  const img = document.createElement('img')
  img.src = src
  const close = document.createElement('button')
  close.className = 'lb-close'
  close.textContent = '✕'
  overlay.appendChild(img)
  overlay.appendChild(close)
  document.body.appendChild(overlay)
  const rm = () => overlay.remove()
  close.onclick = (e) => { e.stopPropagation(); rm() }
  overlay.onclick = rm
  img.onclick = (e) => e.stopPropagation()
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { rm(); document.removeEventListener('keydown', esc) }
  })
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  t.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;background:#1a1a1a;color:#fff;border-radius:6px;padding:8px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;'
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

function resetAll() {
  if (!confirm('รีเซ็ตทั้งหมด?')) return
  localStorage.removeItem(STORAGE_KEY)
  Object.keys(state).forEach(id => { state[id] = { status: null, note: '' } })
  document.querySelectorAll('.tc-row').forEach(r => r.className = 'tc-row')
  document.querySelectorAll('.tbtn').forEach(b => b.className = 'tbtn')
  document.querySelectorAll('.actual-editor').forEach(e => e.innerHTML = '')
  document.getElementById('bug-out').classList.remove('open')
  updateStats()
}

function showBugReport() {
  const fails = []
  let num = 1
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const actual = editor ? editor.innerText.trim() : ''
        const actualHtml = editor ? editor.innerHTML.trim() : ''
        fails.push({ ...tc, section: sec.name, actual, actualHtml, num: num++ })
      }
    })
  })
  const out = document.getElementById('bug-out')
  const list = document.getElementById('bug-list')
  const title = document.getElementById('bug-title')
  out.classList.add('open')
  document.getElementById('export-btn').style.display = fails.length ? 'block' : 'none'
  document.getElementById('send-btn').style.display = fails.length ? 'block' : 'none'
  if (!fails.length) {
    title.textContent = ''
    list.innerHTML = '<div class="no-fail">ไม่มี Test Case ที่ Fail ✅</div>'
    out.scrollIntoView({ behavior: 'smooth', block: 'start' })
    return
  }
  title.textContent = 'พบ ' + fails.length + ' รายการที่ Fail'
  list.innerHTML = fails.map(f => `
    <div class="bug-item">
      <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
      <div class="bug-line" style="font-weight:500;color:#1a1a1a;margin-bottom:6px">${f.name}</div>
      ${f.precondition ? `<div class="bug-line"><b>Precondition:</b> ${f.precondition}</div>` : ''}
      <div class="bug-line"><b>Steps:</b> ${f.steps.replace(/\n/g,'<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;')}</div>
      <div class="bug-line"><b>Expected:</b> ${f.expected}</div>
      <div class="bug-line"><b>Actual result:</b></div>
      <div class="bug-actual-content">${f.actualHtml || '<span style="color:#bbb">ยังไม่ได้ระบุ</span>'}</div>
    </div>
  `).join('')
  out.scrollIntoView({ behavior: 'smooth', block: 'start' })
}

function buildPayload() {
  const fails = []
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const images = []
        if (editor) editor.querySelectorAll('img').forEach(img => images.push(img.src))
        fails.push({ tc_id: tc.id, name: tc.name, section: sec.name,
          precondition: tc.precondition || '', steps: tc.steps, expected: tc.expected,
          actual: editor ? editor.innerText.trim() : 'ยังไม่ได้ระบุ', images })
      }
    })
  })
  if (!fails.length) { showToast('ไม่มี Fail ที่จะส่ง'); return null }
  return {
    task_url: TASK_URL, task_number: TASK_NUMBER, task_name: TASK_NAME,
    total_pass: Object.values(state).filter(v => v.status === 'pass').length,
    total_fail: fails.length,
    total_skip: Object.values(state).filter(v => v.status === 'skip').length,
    total_tc: Object.keys(state).length,
    bugs: fails
  }
}

function exportBugJSON() {
  const payload = buildPayload()
  if (!payload) return
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'bug-report-' + TASK_NUMBER + '.json'
  a.click()
}

let progressEl = null
function showSending() {
  if (progressEl) progressEl.remove()
  progressEl = document.createElement('div')
  progressEl.className = 'send-progress'
  progressEl.innerHTML = `<div class="send-progress-title">📤 กำลังส่ง Bug Report...</div>
    <div class="send-step active" id="sp-0">→ ส่งไป proxy...</div>`
  document.body.appendChild(progressEl)
}

async function sendToBoard() {
  const payload = buildPayload()
  if (!payload) return
  showSending()
  try {
    const r = await fetch('https://web-production-3a704.up.railway.app/send', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    const data = await r.json()
    if (data.ok) {
      progressEl.querySelector('#sp-0').className = 'send-step done'
      progressEl.querySelector('#sp-0').textContent = '✓ ส่งสำเร็จ'
      setTimeout(() => { progressEl?.remove(); progressEl = null }, 3000)
      showToast(`✅ ส่ง ${payload.total_fail} bugs เข้า Task #${TASK_NUMBER} แล้วครับ`)
    } else {
      progressEl.querySelector('#sp-0').className = 'send-step err'
      progressEl.querySelector('#sp-0').textContent = '✗ ' + (data.error || 'ส่งไม่สำเร็จ')
      setTimeout(() => { progressEl?.remove(); progressEl = null }, 5000)
    }
  } catch (err) {
    progressEl.querySelector('#sp-0').className = 'send-step err'
    progressEl.querySelector('#sp-0').textContent = '✗ ไม่พบ proxy — รัน: python proxy.py'
    setTimeout(() => { progressEl?.remove(); progressEl = null }, 5000)
  }
}

function render() {
  const container = document.getElementById('tc-list')
  container.innerHTML = SECTIONS.map(sec => `
    <div>
      <div class="section-hd">${sec.name}</div>
      ${sec.tcs.map(tc => `
        <div class="tc-row" id="row-${tc.id}">
          <div class="tc-top">
            <div class="tc-id">${tc.id}</div>
            <div class="tc-name">${tc.name}</div>
            <div class="tc-btns">
              <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
              <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
              <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
            </div>
          </div>
          <span class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</span>
          <div class="tc-detail" id="detail-${tc.id}">
            ${tc.precondition ? `<div class="detail-label">Precondition</div><div class="detail-val">${tc.precondition}</div>` : ''}
            <div class="detail-label">Steps</div>
            <div class="detail-val">${tc.steps.replace(/\n/g,'<br>')}</div>
            <div class="detail-label">Expected</div>
            <div class="detail-val">${tc.expected}</div>
            <div class="detail-label" style="margin-top:10px">Actual result</div>
            <div class="actual-editor" id="actual-${tc.id}" contenteditable="true"
              data-placeholder="พิมพ์หรือ Ctrl+V วางรูปได้เลย..."></div>
            <div class="save-row">
              <button class="save-btn" onclick="saveActual('${tc.id}')">💾 Save</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('')
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => setupEditor(tc.id)))
}

render()
loadState()
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  const s = state[tc.id]
  if (s.status) {
    document.getElementById('row-' + tc.id).className = 'tc-row s-' + s.status
    const map = { pass:'p', fail:'f', skip:'s' }
    const btn = document.getElementById(map[s.status] + '-' + tc.id)
    if (btn) btn.className = 'tbtn a' + map[s.status][0]
  }
  if (s.note) {
    const editor = document.getElementById('actual-' + tc.id)
    if (editor) editor.innerHTML = s.note
  }
}))
updateStats()
</script>
</body>
</html>
