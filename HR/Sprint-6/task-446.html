<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>

<script>
const STORAGE_KEY = 'qa_task_446'
const TCS_KEY = STORAGE_KEY + '_tcs'
const TASK_URL = 'https://boards.intelligent-bytes.com/project/hrfi/task/446'
const TASK_NUMBER = '446'
const TASK_NAME = '5.2.4 ลบปฏิทิน'

const SECTIONS = [
  {
    name: "ส่วนที่ 1 — Modal ยืนยันก่อนลบ",
    tcs: [
      {
        id: "TC-001",
        name: "กด \"จัดการปฏิทิน\" → เลือก \"ลบ\" → Modal ยืนยันปรากฏ",
        precondition: "มีปฏิทินที่เลือกอยู่ใน dropdown",
        steps: "1. เปิดหน้าปฏิทินวันหยุด\n2. เลือกปฏิทินจาก dropdown\n3. กด \"จัดการปฏิทิน\" → เลือก \"ลบ\"\n4. สังเกต UI",
        expected: "Modal ยืนยันการลบปรากฏขึ้น (ไม่ลบทันที)"
      },
      {
        id: "TC-002",
        name: "Modal แสดงข้อความเตือน + ปุ่มยืนยัน / ยกเลิก",
        precondition: "Modal ยืนยันการลบเปิดอยู่",
        steps: "1. เปิด Modal ยืนยันการลบ\n2. ตรวจสอบเนื้อหาใน Modal",
        expected: "Modal มีข้อความเตือนว่าจะลบปฏิทิน + ปุ่มยืนยันลบ + ปุ่มยกเลิก"
      }
    ]
  },
  {
    name: "ส่วนที่ 2 — ลบสำเร็จ (Happy Path)",
    tcs: [
      {
        id: "TC-003",
        name: "ยืนยันลบ → สำเร็จ (toast/success) Modal ปิด",
        precondition: "Modal ยืนยันการลบเปิดอยู่ กับปฏิทินที่ไม่มีพนักงานผูก",
        steps: "1. เปิด Modal ยืนยันการลบ\n2. กดปุ่มยืนยันลบ\n3. ตรวจสอบ UI",
        expected: "Modal ปิด แสดง toast/success message ปฏิทินถูกลบสำเร็จ"
      },
      {
        id: "TC-004",
        name: "Network DELETE /api/v1/holiday-calendars/{id}/delete/ → 200 OK, {message:\"success\",data:null}",
        precondition: "เปิด DevTools Network ก่อนยืนยันลบ",
        steps: "1. เปิด DevTools > Network\n2. ยืนยันลบปฏิทิน\n3. ตรวจสอบ API call",
        expected: "DELETE /api/v1/holiday-calendars/{id}/delete/ → 200 OK, body: {\"message\":\"success\",\"data\":null}"
      },
      {
        id: "TC-005",
        name: "หลังลบ → ปฏิทินที่ลบหายไปจาก dropdown รายการ",
        precondition: "TC-003 ผ่านแล้ว",
        steps: "1. หลังลบปฏิทินสำเร็จ\n2. ตรวจสอบ dropdown ปฏิทิน",
        expected: "ปฏิทินที่ถูกลบไม่ปรากฏใน dropdown อีกต่อไป (soft delete: is_deleted=true)"
      }
    ]
  },
  {
    name: "ส่วนที่ 3 — ยกเลิกการลบ",
    tcs: [
      {
        id: "TC-006",
        name: "กดยกเลิกใน Modal → ปฏิทินยังอยู่ ไม่มี DELETE API call",
        precondition: "Modal ยืนยันการลบเปิดอยู่",
        steps: "1. เปิด Modal ยืนยันการลบ\n2. กดปุ่มยกเลิก\n3. ตรวจสอบ dropdown และ Network",
        expected: "Modal ปิด ปฏิทินยังอยู่ใน dropdown ครบ ไม่มี DELETE API call ถูกส่งออกไป"
      }
    ]
  },
  {
    name: "ส่วนที่ 4 — Guard: มีพนักงานผูกอยู่",
    tcs: [
      {
        id: "TC-007",
        name: "ลบปฏิทินที่มีพนักงานผูกอยู่ → API 400, error แสดงใน UI",
        precondition: "มีปฏิทินที่มีพนักงานใน HolidayCalendarEmployees (tab พนักงานในปฏิทิน มีข้อมูล)",
        steps: "1. เลือกปฏิทินที่มีพนักงานผูกอยู่\n2. กด \"จัดการปฏิทิน\" → \"ลบ\"\n3. ยืนยันลบ\n4. ตรวจสอบ response และ UI",
        expected: "DELETE → 400 {errorCode:4000, message:[{calendar_id:\"มีพนักงานผูกอยู่ในปฏิทินนี้\"}]} + UI แสดงข้อความแจ้งเตือน ปฏิทินไม่ถูกลบ"
      },
      {
        id: "TC-008",
        name: "หลัง error 400 (มีพนักงาน) → ปฏิทินยังคงอยู่ใน dropdown ไม่หายไป",
        precondition: "TC-007 ผ่าน (ได้รับ error)",
        steps: "1. หลังได้รับ error 400 จากการลบปฏิทินที่มีพนักงาน\n2. ตรวจสอบ dropdown ปฏิทิน",
        expected: "ปฏิทินยังคงอยู่ใน dropdown รายการ ไม่ถูกลบ"
      }
    ]
  }
]

const state = {}
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  state[tc.id] = { status: null, note: '' }
}))

let customTcs = []

function loadCustomTcs() {
  try { const s = localStorage.getItem(TCS_KEY); if (s) customTcs = JSON.parse(s) } catch(e) {}
  customTcs.forEach(tc => { if (!state[tc.id]) state[tc.id] = { status: null, note: '' } })
}

function saveCustomTcs() { localStorage.setItem(TCS_KEY, JSON.stringify(customTcs)) }

function nextExId() {
  const nums = customTcs.map(tc => parseInt(tc.id.replace('EX-',''), 10)).filter(n => !isNaN(n))
  return 'EX-' + String(nums.length ? Math.max(...nums) + 1 : 1).padStart(3, '0')
}

function addExtraTc() {
  const id = nextExId()
  customTcs.push({ id, name: id, precondition: '', steps: '', expected: '' })
  state[id] = { status: null, note: '' }
  saveCustomTcs(); render(); applyStateToUI(); updateStats()
}

function deleteExtraTc(id) {
  if (!confirm('ลบ ' + id + '?')) return
  customTcs = customTcs.filter(tc => tc.id !== id)
  delete state[id]; saveCustomTcs(); saveState(); render(); applyStateToUI(); updateStats()
}

function saveState() {
  const data = {}
  Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY); if (!saved) return
    const data = JSON.parse(saved)
    Object.keys(data).forEach(id => { if (state[id]) { state[id].status = data[id].status; state[id].note = data[id].note || '' } })
  } catch(e) {}
}

function updateStats() {
  let p=0,f=0,r=0,s=0,n=0
  Object.values(state).forEach(v => {
    if(v.status==='pass') p++; else if(v.status==='fail') f++; else if(v.status==='retest') r++; else if(v.status==='skip') s++; else n++
  })
  document.getElementById('sp').textContent='Pass '+p; document.getElementById('sf').textContent='Fail '+f
  const rp=document.getElementById('sr'); if(r>0){rp.style.display='';rp.textContent='Retest '+r}else rp.style.display='none'
  document.getElementById('ss').textContent='Skip '+s; document.getElementById('sn').textContent='Pending '+n
  document.getElementById('st').textContent='Total '+Object.keys(state).length+' TC'
}

function setStatus(id, st) {
  state[id].status = state[id].status === st ? null : st
  const row = document.getElementById('row-'+id)
  row.className = 'tc-row' + (state[id].status ? ' s-'+state[id].status : '')
  ;['p','f','s'].forEach(k => {
    const map={p:'pass',f:'fail',s:'skip'}
    const btn=document.getElementById(k+'-'+id)
    btn.className='tbtn'+(state[id].status===map[k]?' a'+k:'')
  })
  updateStats(); saveState()
}

let activeEditor = null
function toggleDetail(id, el) {
  const d = document.getElementById('detail-'+id); const open = d.classList.toggle('open')
  el.textContent = open ? '▾ ซ่อน' : '▸ ดูรายละเอียด'; if (open) activeEditor = id
}

function setupEditor(id) {
  const editor = document.getElementById('actual-'+id); if (!editor) return
  editor.addEventListener('focus', () => { activeEditor = id })
  editor.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || [])
    const imgItem = items.find(i => i.type.startsWith('image/')); if (!imgItem) return
    e.preventDefault()
    const reader = new FileReader()
    reader.onload = (ev) => { const img = document.createElement('img'); img.src=ev.target.result; img.onclick=()=>openLightbox(img.src); insertAtCursor(img); showToast('📋 วางรูปแล้ว') }
    reader.readAsDataURL(imgItem.getAsFile())
  })
}

function insertAtCursor(node) {
  const sel=window.getSelection(); if(!sel||!sel.rangeCount) return
  const range=sel.getRangeAt(0); range.deleteContents(); range.insertNode(node)
  range.setStartAfter(node); range.collapse(true); sel.removeAllRanges(); sel.addRange(range)
}

function saveActual(id) {
  const editor=document.getElementById('actual-'+id); state[id].note=editor?editor.innerHTML:''
  saveState(); showToast('💾 บันทึกแล้ว')
}

function openLightbox(src) {
  const overlay=document.createElement('div'); overlay.className='lb-overlay'
  const img=document.createElement('img'); img.src=src
  const close=document.createElement('button'); close.className='lb-close'; close.textContent='✕'
  overlay.appendChild(img); overlay.appendChild(close); document.body.appendChild(overlay)
  const rm=()=>overlay.remove(); close.onclick=(e)=>{e.stopPropagation();rm()}; overlay.onclick=rm; img.onclick=(e)=>e.stopPropagation()
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){rm();document.removeEventListener('keydown',esc)}})
}

function showToast(msg) {
  const t=document.createElement('div'); t.textContent=msg
  t.style.cssText='position:fixed;top:16px;right:16px;z-index:9999;background:#1a1a1a;color:#fff;border-radius:6px;padding:8px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;'
  document.body.appendChild(t); setTimeout(()=>t.remove(),2000)
}

function resetAll() {
  if(!confirm('รีเซ็ตทั้งหมด?')) return
  localStorage.removeItem(STORAGE_KEY); Object.keys(state).forEach(id=>{state[id]={status:null,note:''}})
  document.getElementById('bug-out').classList.remove('open'); render(); applyStateToUI(); updateStats()
}

function collectFails(tcs, sectionName, fails, num) {
  tcs.forEach(tc => {
    if(state[tc.id]?.status==='fail') {
      const editor=document.getElementById('actual-'+tc.id)
      fails.push({...tc,section:sectionName,actual:editor?editor.innerText.trim():'',actualHtml:editor?editor.innerHTML.trim():'',num:num++})
    }
  }); return num
}

function collectRetests(tcs, sectionName, retests) {
  tcs.forEach(tc => { if(state[tc.id]?.status==='retest') retests.push({...tc,section:sectionName}) })
}

function markRetest(id) {
  state[id].status='retest'; const row=document.getElementById('row-'+id)
  if(row){row.className='tc-row s-retest';['p','f','s'].forEach(k=>{const b=document.getElementById(k+'-'+id);if(b)b.className='tbtn'})}
  updateStats();saveState();showBugReport()
}

function unmarkRetest(id) {
  state[id].status='fail'; const row=document.getElementById('row-'+id)
  if(row){row.className='tc-row s-fail';const b=document.getElementById('f-'+id);if(b)b.className='tbtn af'}
  updateStats();saveState();showBugReport()
}

function retestPass(id) {
  state[id].status='pass'; const row=document.getElementById('row-'+id)
  if(row){row.className='tc-row s-pass';['p','f','s'].forEach((k,i)=>{const b=document.getElementById(k+'-'+id);if(b)b.className='tbtn'+(i===0?' ap':'')})}
  updateStats();saveState();showBugReport()
}

function showBugReport() {
  const fails=[]; let num=1
  SECTIONS.forEach(sec=>{num=collectFails(sec.tcs,sec.name,fails,num)}); num=collectFails(customTcs,'เพิ่มเติม',fails,num)
  const retests=[]; SECTIONS.forEach(sec=>collectRetests(sec.tcs,sec.name,retests)); collectRetests(customTcs,'เพิ่มเติม',retests)
  const out=document.getElementById('bug-out'); const list=document.getElementById('bug-list'); const title=document.getElementById('bug-title')
  out.classList.add('open')
  document.getElementById('export-btn').style.display=fails.length?'block':'none'
  document.getElementById('send-btn').style.display=fails.length?'block':'none'
  if(!fails.length&&!retests.length){title.textContent='';list.innerHTML='<div class="no-fail">ไม่มี Test Case ที่ Fail ✅</div>';out.scrollIntoView({behavior:'smooth',block:'start'});return}
  const parts=[]; if(fails.length)parts.push(fails.length+' รายการที่ Fail'); if(retests.length)parts.push(retests.length+' รายการรอ Retest')
  title.textContent='พบ '+parts.join(' · ')
  const failsHtml=fails.map(f=>`
    <div class="bug-item">
      <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
      <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:6px">${f.name}</div>
      ${f.precondition?`<div class="bug-line"><b>Precondition:</b> ${f.precondition}</div>`:''}
      <div class="bug-line"><b>Steps:</b> ${f.steps?f.steps.replace(/\n/g,'<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;'):'—'}</div>
      <div class="bug-line"><b>Expected:</b> ${f.expected||'—'}</div>
      <div class="bug-line"><b>Actual result:</b></div>
      <div class="bug-actual-content">${f.actualHtml||'<span style="color:rgba(248,250,252,0.4)">ยังไม่ได้ระบุ</span>'}</div>
      <button class="bug-retest-btn" onclick="markRetest('${f.id}')">🔁 Dev แก้แล้ว — Mark Retest</button>
    </div>`).join('')
  const retestsHtml=retests.length?`
    <div class="bug-section-title" style="margin-top:14px;color:#fbbf24">รอ Retest (${retests.length})</div>
    ${retests.map(f=>`
      <div class="bug-item-retest">
        <div class="bug-id" style="color:#fbbf24">${f.id}<span class="retest-badge">⏳ รอ Retest</span></div>
        <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:4px">${f.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
          <button class="bug-retest-btn" style="color:#7ec87e;border-color:rgba(82,168,105,0.3)" onclick="retestPass('${f.id}')">✅ Retest ผ่าน</button>
          <button class="bug-retest-btn" style="color:#f09595;border-color:rgba(226,75,74,0.3)" onclick="unmarkRetest('${f.id}')">❌ Retest ไม่ผ่าน</button>
        </div>
      </div>`).join('')}`:''
  list.innerHTML=failsHtml+retestsHtml; out.scrollIntoView({behavior:'smooth',block:'start'})
}

document.getElementById('bug-list').addEventListener('click',e=>{if(e.target.tagName==='IMG')openLightbox(e.target.src)})

function tcRowHTML(tc, isDynamic) {
  return `
    <div class="tc-row" id="row-${tc.id}">
      <div class="tc-top">
        <div class="tc-id">${tc.id}</div>
        <div class="tc-name">${tc.name}</div>
        <div class="tc-btns">
          <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
          <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
          <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
          ${isDynamic?`<button class="tbtn del-btn" onclick="deleteExtraTc('${tc.id}')" title="ลบ TC นี้">✕</button>`:''}
        </div>
      </div>
      <span class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</span>
      <div class="tc-detail" id="detail-${tc.id}">
        ${tc.precondition?`<div class="detail-label">Precondition</div><div class="detail-val">${tc.precondition}</div>`:''}
        <div class="detail-label">Steps</div>
        <div class="detail-val">${tc.steps?tc.steps.replace(/\n/g,'<br>'):'<span style="color:rgba(248,250,252,0.25)">—</span>'}</div>
        <div class="detail-label">Expected</div>
        <div class="detail-val">${tc.expected||'<span style="color:rgba(248,250,252,0.25)">—</span>'}</div>
        <div class="detail-label" style="margin-top:10px">Actual result</div>
        <div class="actual-editor" id="actual-${tc.id}" contenteditable="true" data-placeholder="พิมพ์หรือ Ctrl+V วางรูปได้เลย..."></div>
        <div class="save-row"><button class="save-btn" onclick="saveActual('${tc.id}')">💾 Save</button></div>
      </div>
    </div>`
}

function render() {
  const container = document.getElementById('tc-list')
  container.innerHTML =
    SECTIONS.map(sec=>`
      <div>
        ${sec.name?`<div class="section-hd">${sec.name}</div>`:''}
        ${sec.tcs.map(tc=>tcRowHTML(tc,false)).join('')}
      </div>`).join('') +
    `<div>
      <div class="extra-hd">Test Cases เพิ่มเติม <span style="font-weight:400;font-size:10px">(นอกเหนือ AC)</span></div>
      ${customTcs.map(tc=>tcRowHTML(tc,true)).join('')}
      <button class="add-tc-btn" onclick="addExtraTc()">+ เพิ่ม Test Case</button>
    </div>`
  SECTIONS.forEach(sec=>sec.tcs.forEach(tc=>setupEditor(tc.id)))
  customTcs.forEach(tc=>setupEditor(tc.id))
}

function applyStateToUI() {
  const applyOne = (tc) => {
    const s = state[tc.id]; if (!s) return
    if (s.status) {
      const row=document.getElementById('row-'+tc.id); if(row) row.className='tc-row s-'+s.status
      const map={pass:'p',fail:'f',skip:'s'}
      if(s.status!=='retest'&&map[s.status]){const btn=document.getElementById(map[s.status]+'-'+tc.id);if(btn)btn.className='tbtn a'+map[s.status][0]}
    }
    if (s.note) {
      const editor=document.getElementById('actual-'+tc.id)
      if (editor) {
        let _html=s.note
        _html=_html.replace(/\[รูป\]\s*(https?:\/\/[^\s<"'\n]+)/g,'<img src="$1" style="max-width:100%;border-radius:4px;display:block;margin:4px 0;cursor:zoom-in" onclick="openLightbox(this.src)">')
        _html=_html.replace(/(?<!['"=>])(https?:\/\/i\.ibb\.co\/[^\s<"'\n]+)/g,'<img src="$1" style="max-width:100%;border-radius:4px;display:block;margin:4px 0;cursor:zoom-in" onclick="openLightbox(this.src)">')
        editor.innerHTML=_html
      }
    }
  }
  SECTIONS.forEach(sec=>sec.tcs.forEach(applyOne)); customTcs.forEach(applyOne)
}

loadCustomTcs(); render()
;(async()=>{if(window.FS)await window.FS.pullDoc(STORAGE_KEY);loadState();applyStateToUI();updateStats()})()

const PROXY_URL='https://web-production-3a704.up.railway.app'

function exportBugJSON() {
  const payload=buildPayload(); if(!payload) return
  const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'})
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='bug-report-'+TASK_NUMBER+'.json'; a.click()
  showToast('📥 ดาวน์โหลด bug-report-'+TASK_NUMBER+'.json แล้วครับ')
}

function buildPayload() {
  const fails=[]
  const gather=(tcs,sectionName)=>tcs.forEach(tc=>{
    if(state[tc.id]?.status==='fail'){
      const editor=document.getElementById('actual-'+tc.id); const images=[]
      if(editor) editor.querySelectorAll('img').forEach(img=>images.push(img.src))
      const noteText=state[tc.id]?.note||''
      ;(noteText.match(/https?:\/\/i\.ibb\.co\/[^\s<"'\n]+/g)||[]).forEach(url=>{if(!images.includes(url))images.push(url)})
      let actualText=editor?editor.innerText.trim():''
      if(!actualText) actualText=noteText.replace(/\[รูป\]\s*https?:\/\/[^\n]+/g,'').trim()||'ยังไม่ได้ระบุ'
      fails.push({tc_id:tc.id,name:tc.name,section:sectionName,precondition:tc.precondition||'',steps:tc.steps||'',expected:tc.expected||'',actual:actualText,images})
    }
  })
  SECTIONS.forEach(sec=>gather(sec.tcs,sec.name)); gather(customTcs,'เพิ่มเติม')
  if(!fails.length){showToast('ไม่มี Fail ที่จะส่ง');return null}
  return{task_url:TASK_URL,task_number:TASK_NUMBER,task_name:TASK_NAME,
    total_pass:Object.values(state).filter(v=>v.status==='pass').length,
    total_fail:fails.length,total_skip:Object.values(state).filter(v=>v.status==='skip').length,
    total_tc:Object.keys(state).length,bugs:fails}
}

let progressEl=null
function showSending(){if(progressEl)progressEl.remove();progressEl=document.createElement('div');progressEl.className='send-progress';progressEl.innerHTML=`<div class="send-progress-title">📤 กำลังส่ง Bug Report...</div><div class="send-step active" id="sp-0">→ ส่งไป proxy...</div>`;document.body.appendChild(progressEl)}
function showSendDone(msg){if(!progressEl)return;progressEl.querySelector('#sp-0').className='send-step done';progressEl.querySelector('#sp-0').textContent='✓ '+msg;setTimeout(()=>{progressEl?.remove();progressEl=null},3000)}
function showSendErr(msg){if(!progressEl)return;progressEl.querySelector('#sp-0').className='send-step err';progressEl.querySelector('#sp-0').textContent='✗ '+msg;setTimeout(()=>{progressEl?.remove();progressEl=null},5000)}

async function sendToBoard(){
  const payload=buildPayload();if(!payload)return;showSending()
  try{
    const r=await fetch(`${PROXY_URL}/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)})
    const json=await r.json();if(r.ok)showSendDone('ส่งสำเร็จ! '+(json.message||''));else showSendErr('Error: '+(json.error||r.status))
  }catch(e){showSendErr('ส่งไม่ได้: '+e.message)}
}
