<script>
const STORAGE_KEY = 'qa_task_438'
const TCS_KEY = STORAGE_KEY + '_tcs'
const TASK_URL = 'https://boards.intelligent-bytes.com/project/hrfi/task/438'
const TASK_NUMBER = '438'
const TASK_NAME = '5.1.1 ค้นหาสถานที่ทำงาน'

const SECTIONS = [
  {
    name: "ส่วนที่ 1 — ค้นหาด้วยชื่อ",
    tcs: [
      {
        id: "TC-001",
        name: "ค้นหาด้วยชื่อเต็ม → แสดงผลถูกต้อง",
        precondition: "มีสถานที่ทำงานอยู่ในระบบแล้ว",
        steps: "1. เปิดหน้าค้นหาสถานที่ทำงาน\n2. พิมพ์ชื่อสถานที่เต็มๆ ในช่องค้นหา\n3. ดูผลลัพธ์",
        expected: "แสดงสถานที่ที่ชื่อตรงกัน ไม่แสดงรายการอื่น"
      },
      {
        id: "TC-002",
        name: "ค้นหาด้วยชื่อบางส่วน (icontains) → แสดงทุกรายการที่มีคำนั้น",
        precondition: "มีสถานที่ทำงานหลายรายการ",
        steps: "1. พิมพ์ชื่อบางส่วน (เช่น 2-3 ตัวอักษรแรก)\n2. ดูผลลัพธ์",
        expected: "แสดงทุกรายการที่ชื่อ contains คำที่ค้นหา (case-insensitive)"
      },
      {
        id: "TC-003",
        name: "ค้นหาชื่อที่ไม่มีในระบบ → แสดงผลว่าง",
        precondition: "มีสถานที่ทำงานอยู่ในระบบ",
        steps: "1. พิมพ์ชื่อที่ไม่มีในระบบ\n2. ดูผลลัพธ์",
        expected: "แสดงผลว่าง / ข้อความ 'ไม่พบข้อมูล' ไม่แสดงรายการใดเลย"
      },
      {
        id: "TC-004",
        name: "ล้างช่องค้นหา → แสดงรายการทั้งหมด",
        precondition: "มีสถานที่ทำงานหลายรายการ",
        steps: "1. พิมพ์ชื่อค้นหาก่อน\n2. ลบข้อความออกจนช่องว่าง\n3. ดูผลลัพธ์",
        expected: "แสดงสถานที่ทุกรายการ (is_deleted=false) เหมือนก่อนค้นหา"
      }
    ]
  },
  {
    name: "ส่วนที่ 2 — กรองตามประเภท",
    tcs: [
      {
        id: "TC-005",
        name: "เลือกประเภท GPS → แสดงเฉพาะ GPS",
        precondition: "มีสถานที่ประเภท GPS ในระบบ",
        steps: "1. เลือก 'GPS' ใน dropdown ประเภทสถานที่\n2. ดูผลลัพธ์",
        expected: "แสดงเฉพาะสถานที่ที่ location_type = GPS"
      },
      {
        id: "TC-006",
        name: "เลือกประเภท Scanner → แสดงเฉพาะ Scanner",
        precondition: "มีสถานที่ประเภท Scanner ในระบบ",
        steps: "1. เลือก 'Scanner' ใน dropdown ประเภทสถานที่\n2. ดูผลลัพธ์",
        expected: "แสดงเฉพาะสถานที่ที่ location_type = SCANNER"
      },
      {
        id: "TC-007",
        name: "เลือกประเภท WiFi → แสดงเฉพาะ WiFi",
        precondition: "มีสถานที่ประเภท WiFi ในระบบ",
        steps: "1. เลือก 'WiFi' ใน dropdown ประเภทสถานที่\n2. ดูผลลัพธ์",
        expected: "แสดงเฉพาะสถานที่ที่ location_type = WIFI"
      },
      {
        id: "TC-008",
        name: "เลือกประเภท QR → แสดงเฉพาะ QR",
        precondition: "มีสถานที่ประเภท QR ในระบบ",
        steps: "1. เลือก 'QR' ใน dropdown ประเภทสถานที่\n2. ดูผลลัพธ์",
        expected: "แสดงเฉพาะสถานที่ที่ location_type = QR"
      },
      {
        id: "TC-009",
        name: "ล้าง filter ประเภท → แสดงทุกประเภท",
        precondition: "มีสถานที่หลายประเภทในระบบ",
        steps: "1. เลือก filter ประเภทก่อน\n2. ล้าง/เลือก 'ทั้งหมด'\n3. ดูผลลัพธ์",
        expected: "แสดงสถานที่ทุกประเภท"
      }
    ]
  },
  {
    name: "ส่วนที่ 3 — กรองตามสถานะ",
    tcs: [
      {
        id: "TC-010",
        name: "กรอง 'ใช้งาน' → แสดงเฉพาะ is_active=true",
        precondition: "มีสถานที่ทั้งสถานะใช้งานและไม่ใช้งาน",
        steps: "1. เลือก 'ใช้งาน' ใน dropdown สถานะ\n2. ดูผลลัพธ์",
        expected: "แสดงเฉพาะสถานที่ที่ is_active = true"
      },
      {
        id: "TC-011",
        name: "กรอง 'ไม่ใช้งาน' → แสดงเฉพาะ is_active=false",
        precondition: "มีสถานที่ที่ปิดการใช้งานแล้ว",
        steps: "1. เลือก 'ไม่ใช้งาน' ใน dropdown สถานะ\n2. ดูผลลัพธ์",
        expected: "แสดงเฉพาะสถานที่ที่ is_active = false"
      },
      {
        id: "TC-012",
        name: "ไม่แสดงรายการที่ถูกลบ (is_deleted=true)",
        precondition: "มีสถานที่ที่ถูก soft-delete (is_deleted=true) ในระบบ",
        steps: "1. เปิดหน้าค้นหาสถานที่ทำงาน\n2. ดูรายการทั้งหมด (ไม่ filter อะไร)",
        expected: "ไม่แสดงรายการที่ is_deleted = true แม้ไม่ได้กรอง"
      }
    ]
  },
  {
    name: "ส่วนที่ 4 — กรองหลายเงื่อนไขพร้อมกัน",
    tcs: [
      {
        id: "TC-013",
        name: "ค้นหาชื่อ + กรองประเภท → ผลลัพธ์ถูกต้อง",
        precondition: "มีสถานที่หลายรายการ หลายประเภท",
        steps: "1. พิมพ์ชื่อบางส่วนในช่องค้นหา\n2. เลือกประเภท (เช่น GPS)\n3. ดูผลลัพธ์",
        expected: "แสดงเฉพาะรายการที่ตรงทั้งชื่อ (icontains) และประเภท"
      },
      {
        id: "TC-014",
        name: "ค้นหาชื่อ + กรองสถานะ → ผลลัพธ์ถูกต้อง",
        precondition: "มีสถานที่หลายรายการ หลายสถานะ",
        steps: "1. พิมพ์ชื่อบางส่วนในช่องค้นหา\n2. เลือกสถานะ (เช่น ใช้งาน)\n3. ดูผลลัพธ์",
        expected: "แสดงเฉพาะรายการที่ตรงทั้งชื่อและสถานะ"
      },
      {
        id: "TC-015",
        name: "กรองประเภท + กรองสถานะพร้อมกัน → ผลลัพธ์ถูกต้อง",
        precondition: "มีสถานที่หลายประเภทและหลายสถานะ",
        steps: "1. เลือกประเภท (เช่น GPS)\n2. เลือกสถานะ (เช่น ใช้งาน)\n3. ดูผลลัพธ์",
        expected: "แสดงเฉพาะ GPS + ใช้งาน เท่านั้น"
      }
    ]
  },
  {
    name: "ส่วนที่ 5 — รองรับ filter ประเภทเก่า (Backward Compat)",
    tcs: [
      {
        id: "TC-016",
        name: "filter ประเภท GPS ยังแสดงข้อมูล GPS เก่าได้",
        precondition: "มีข้อมูล GPS เก่าในระบบ",
        steps: "1. เลือก filter ประเภท GPS\n2. ดูผลลัพธ์",
        expected: "รายการ GPS เก่าแสดงครบ ไม่หายหรือ error"
      },
      {
        id: "TC-017",
        name: "filter ประเภท Scanner ยังแสดงข้อมูล Scanner เก่าได้",
        precondition: "มีข้อมูล Scanner เก่าในระบบ",
        steps: "1. เลือก filter ประเภท Scanner\n2. ดูผลลัพธ์",
        expected: "รายการ Scanner เก่าแสดงครบ ไม่หายหรือ error"
      },
      {
        id: "TC-018",
        name: "filter ประเภท WiFi ยังแสดงข้อมูล WiFi เก่าได้",
        precondition: "มีข้อมูล WiFi เก่าในระบบ",

const state = {}
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  state[tc.id] = { status: null, note: '' }
}))

let customTcs = []

function loadCustomTcs() {
  try {
    const saved = localStorage.getItem(TCS_KEY)
    if (saved) customTcs = JSON.parse(saved)
  } catch(e) {}
  customTcs.forEach(tc => {
    if (!state[tc.id]) state[tc.id] = { status: null, note: '' }
  })
}

function saveCustomTcs() {
  localStorage.setItem(TCS_KEY, JSON.stringify(customTcs))
}

function nextExId() {
  const nums = customTcs.map(tc => parseInt(tc.id.replace('EX-',''), 10)).filter(n => !isNaN(n))
  const next = nums.length ? Math.max(...nums) + 1 : 1
  return 'EX-' + String(next).padStart(3, '0')
}

function addExtraTc() {
  const id = nextExId()
  customTcs.push({ id, name: id, precondition: '', steps: '', expected: '' })
  state[id] = { status: null, note: '' }
  saveCustomTcs()
  render()
  applyStateToUI()
  updateStats()
}

function deleteExtraTc(id) {
  if (!confirm('ลบ ' + id + '?')) return
  customTcs = customTcs.filter(tc => tc.id !== id)
  delete state[id]
  saveCustomTcs()
  saveState()
  render()
  applyStateToUI()
  updateStats()
}

function saveState() {
  const data = {}
  Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY)
    if (!saved) return
    const data = JSON.parse(saved)
    Object.keys(data).forEach(id => {
      if (state[id]) {
        state[id].status = data[id].status
        state[id].note = data[id].note || ''
      }
    })
  } catch(e) {}
}

function updateStats() {
  let p=0,f=0,r=0,s=0,n=0
  Object.values(state).forEach(v => {
    if(v.status==='pass') p++
    else if(v.status==='fail') f++
    else if(v.status==='retest') r++
    else if(v.status==='skip') s++
    else n++
  })
  document.getElementById('sp').textContent = 'Pass ' + p
  document.getElementById('sf').textContent = 'Fail ' + f
  const retestPill = document.getElementById('sr')
  if (r > 0) { retestPill.style.display = ''; retestPill.textContent = 'Retest ' + r }
  else retestPill.style.display = 'none'
  document.getElementById('ss').textContent = 'Skip ' + s
  document.getElementById('sn').textContent = 'Pending ' + n
  document.getElementById('st').textContent = 'Total ' + Object.keys(state).length + ' TC'
}

function setStatus(id, st) {
  state[id].status = state[id].status === st ? null : st
  const row = document.getElementById('row-' + id)
  row.className = 'tc-row' + (state[id].status ? ' s-' + state[id].status : '')
  ;['p','f','s'].forEach(k => {
    const map = {p:'pass',f:'fail',s:'skip'}
    const btn = document.getElementById(k + '-' + id)
    btn.className = 'tbtn' + (state[id].status === map[k] ? ' a' + k : '')
  })
  updateStats()
  saveState()
}

let activeEditor = null
function toggleDetail(id, el) {
  const d = document.getElementById('detail-' + id)
  const open = d.classList.toggle('open')
  el.textContent = open ? '▾ ซ่อน' : '▸ ดูรายละเอียด'
  if (open) activeEditor = id
}

function setupEditor(id) {
  const editor = document.getElementById('actual-' + id)
  if (!editor) return
  editor.addEventListener('focus', () => { activeEditor = id })
  editor.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || [])
    const imgItem = items.find(i => i.type.startsWith('image/'))
    if (!imgItem) return
    e.preventDefault()
    const reader = new FileReader()
    reader.onload = (ev) => {
      const img = document.createElement('img')
      img.src = ev.target.result
      img.onclick = () => openLightbox(img.src)
      insertAtCursor(img)
      showToast('📋 วางรูปแล้ว')
    }
    reader.readAsDataURL(imgItem.getAsFile())
  })
  editor.addEventListener('dragover', (e) => { e.preventDefault() })
  editor.addEventListener('drop', (e) => {
    e.preventDefault()
    const _ins = (src) => { const _a = (s) => { const img = document.createElement('img'); img.src = s; img.onclick = () => openLightbox(img.src); editor.appendChild(img); showToast('📎 วางรูปแล้ว') }; if (!src.startsWith('data:') || src.startsWith('data:image/gif')) { _a(src); return }; const tmp = new Image(); tmp.onload = () => { const MAX = 600, cv = document.createElement('canvas'); let w = tmp.width, h = tmp.height; if (w > MAX) { h = Math.round(h * MAX / w); w = MAX } if (h > MAX) { w = Math.round(w * MAX / h); h = MAX } cv.width = w; cv.height = h; cv.getContext('2d').drawImage(tmp, 0, 0, w, h); _a(cv.toDataURL('image/jpeg', 0.4)) }; tmp.src = src }
    const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'))
    if (file) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(file); return }
    const item = Array.from(e.dataTransfer.items || []).find(i => i.kind === 'file' && i.type.startsWith('image/'))
    if (item) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(item.getAsFile()); return }
    const html = e.dataTransfer.getData('text/html')
    if (html) { const tmp = document.createElement('div'); tmp.innerHTML = html; const s = tmp.querySelector('img')?.src; if (s) { _ins(s); return } }
    const uri = (e.dataTransfer.getData('text/uri-list') || '').split('\n')[0].trim()
    if (uri && /\.(png|jpe?g|gif|webp|svg)/i.test(uri)) _ins(uri)
  })
}

function insertAtCursor(node) {
  const sel = window.getSelection()
  if (!sel || !sel.rangeCount) return
  const range = sel.getRangeAt(0)
  range.deleteContents()
  range.insertNode(node)
  range.setStartAfter(node)
  range.collapse(true)
  sel.removeAllRanges()
  sel.addRange(range)
}

function saveActual(id) {
  const editor = document.getElementById('actual-' + id)
  state[id].note = editor ? editor.innerHTML : ''
  saveState()
  showToast('💾 บันทึกแล้ว')
}

function openLightbox(src) {
  const overlay = document.createElement('div')
  overlay.className = 'lb-overlay'
  const img = document.createElement('img')
  img.src = src
  const close = document.createElement('button')
  close.className = 'lb-close'
  close.textContent = '✕'
  overlay.appendChild(img)
  overlay.appendChild(close)
  document.body.appendChild(overlay)
  const rm = () => overlay.remove()
  close.onclick = (e) => { e.stopPropagation(); rm() }
  overlay.onclick = rm
  img.onclick = (e) => e.stopPropagation()
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { rm(); document.removeEventListener('keydown', esc) }
  })
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  t.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;background:#1a1a1a;color:#fff;border-radius:6px;padding:8px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;'
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

function resetAll() {
  if (!confirm('รีเซ็ตทั้งหมด? (TC เพิ่มเติมที่สร้างไว้จะยังอยู่)')) return
  localStorage.removeItem(STORAGE_KEY)
  Object.keys(state).forEach(id => { state[id] = { status: null, note: '' } })
  document.getElementById('bug-out').classList.remove('open')
  render()
  applyStateToUI()
  updateStats()
}

function collectFails(tcs, sectionName, fails, num) {
  tcs.forEach(tc => {
    if (state[tc.id]?.status === 'fail') {
      const editor = document.getElementById('actual-' + tc.id)
      fails.push({ ...tc, section: sectionName,
        actual: editor ? editor.innerText.trim() : '',
        actualHtml: editor ? editor.innerHTML.trim() : '',
        num: num++ })
    }
  })
  return num
}

function collectRetests(tcs, sectionName, retests) {
  tcs.forEach(tc => {
    if (state[tc.id]?.status === 'retest') retests.push({ ...tc, section: sectionName })
  })
}

function markRetest(id) {
  state[id].status = 'retest'
  const row = document.getElementById('row-' + id)
  if (row) { row.className = 'tc-row s-retest'; ['p','f','s'].forEach(k => { const b = document.getElementById(k+'-'+id); if(b) b.className='tbtn' }) }
  updateStats(); saveState(); showBugReport()
}

function unmarkRetest(id) {
  state[id].status = 'fail'
  const row = document.getElementById('row-' + id)
  if (row) { row.className = 'tc-row s-fail'; const b = document.getElementById('f-'+id); if(b) b.className='tbtn af' }
  updateStats(); saveState(); showBugReport()
}

function retestPass(id) {
  state[id].status = 'pass'
  const row = document.getElementById('row-' + id)
  if (row) { row.className = 'tc-row s-pass'; ['p','f','s'].forEach((k,i) => { const b = document.getElementById(k+'-'+id); if(b) b.className='tbtn'+(i===0?' ap':'') }) }
  updateStats(); saveState(); showBugReport()
}

function showBugReport() {
  const fails = []
  let num = 1
  SECTIONS.forEach(sec => { num = collectFails(sec.tcs, sec.name, fails, num) })
  num = collectFails(customTcs, 'เพิ่มเติม', fails, num)
  const retests = []
  SECTIONS.forEach(sec => collectRetests(sec.tcs, sec.name, retests))
  collectRetests(customTcs, 'เพิ่มเติม', retests)
  const out = document.getElementById('bug-out')
  const list = document.getElementById('bug-list')
  const title = document.getElementById('bug-title')
  out.classList.add('open')
  document.getElementById('export-btn').style.display = fails.length ? 'block' : 'none'
  document.getElementById('send-btn').style.display = fails.length ? 'block' : 'none'
  if (!fails.length && !retests.length) {
    title.textContent = ''
    list.innerHTML = '<div class="no-fail">ไม่มี Test Case ที่ Fail ✅</div>'
    out.scrollIntoView({ behavior: 'smooth', block: 'start' })
    return
  }
  const parts = []
  if (fails.length) parts.push(fails.length + ' รายการที่ Fail')
  if (retests.length) parts.push(retests.length + ' รายการรอ Retest')
  title.textContent = 'พบ ' + parts.join(' · ')
  const failsHtml = fails.map(f => `
    <div class="bug-item">
      <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
      <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:6px">${f.name}</div>
      ${f.precondition ? `<div class="bug-line"><b>Precondition:</b> ${f.precondition}</div>` : ''}
      <div class="bug-line"><b>Steps:</b> ${f.steps ? f.steps.replace(/\n/g,'<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;') : '—'}</div>
      <div class="bug-line"><b>Expected:</b> ${f.expected || '—'}</div>
      <div class="bug-line"><b>Actual result:</b></div>
      <div class="bug-actual-content">${f.actualHtml || '<span style="color:rgba(248,250,252,0.4)">ยังไม่ได้ระบุ</span>'}</div>
      <button class="bug-retest-btn" onclick="markRetest('${f.id}')">🔁 Dev แก้แล้ว — Mark Retest</button>
    </div>
  `).join('')
  const retestsHtml = retests.length ? `
    <div class="bug-section-title" style="margin-top:14px;color:#fbbf24">รอ Retest (${retests.length})</div>
    ${retests.map(f => `
      <div class="bug-item-retest">
        <div class="bug-id" style="color:#fbbf24">${f.id}<span class="retest-badge">⏳ รอ Retest</span></div>
        <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:4px">${f.name}</div>
        <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
          <button class="bug-retest-btn" style="color:#7ec87e;border-color:rgba(82,168,105,0.3)" onclick="retestPass('${f.id}')">✅ Retest ผ่าน</button>
          <button class="bug-retest-btn" style="color:#f09595;border-color:rgba(226,75,74,0.3)" onclick="unmarkRetest('${f.id}')">❌ Retest ไม่ผ่าน</button>
        </div>
      </div>
    `).join('')}
  ` : ''
  list.innerHTML = failsHtml + retestsHtml
  out.scrollIntoView({ behavior: 'smooth', block: 'start' })
}

document.getElementById('bug-list').addEventListener('click', e => {
  if (e.target.tagName === 'IMG') openLightbox(e.target.src)
})

function tcRowHTML(tc, isDynamic) {
  return `
    <div class="tc-row" id="row-${tc.id}">
      <div class="tc-top">
        <div class="tc-id">${tc.id}</div>
        <div class="tc-name">${tc.name}</div>
        <div class="tc-btns">
          <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
          <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
          <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
          ${isDynamic ? `<button class="tbtn del-btn" onclick="deleteExtraTc('${tc.id}')" title="ลบ TC นี้">✕</button>` : ''}
        </div>
      </div>
      <span class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</span>
      <div class="tc-detail" id="detail-${tc.id}">
        ${tc.precondition ? `<div class="detail-label">Precondition</div><div class="detail-val">${tc.precondition}</div>` : ''}
        <div class="detail-label">Steps</div>
        <div class="detail-val">${tc.steps ? tc.steps.replace(/\n/g,'<br>') : '<span style="color:rgba(248,250,252,0.25)">—</span>'}</div>
        <div class="detail-label">Expected</div>
        <div class="detail-val">${tc.expected || '<span style="color:rgba(248,250,252,0.25)">—</span>'}</div>
        <div class="detail-label" style="margin-top:10px">Actual result</div>
        <div class="actual-editor" id="actual-${tc.id}" contenteditable="true"
          data-placeholder="พิมพ์หรือ Ctrl+V วางรูปได้เลย..."></div>
        <div class="save-row">
          <button class="save-btn" onclick="saveActual('${tc.id}')">💾 Save</button>
        </div>
      </div>
    </div>`
}

function render() {
  const container = document.getElementById('tc-list')
  container.innerHTML =
    SECTIONS.map(sec => `
      <div>
        ${sec.name ? `<div class="section-hd">${sec.name}</div>` : ''}
        ${sec.tcs.map(tc => tcRowHTML(tc, false)).join('')}
      </div>`
    ).join('') +
    `<div>
      <div class="extra-hd">Test Cases เพิ่มเติม <span style="font-weight:400;font-size:10px">(นอกเหนือ AC)</span></div>
      ${customTcs.map(tc => tcRowHTML(tc, true)).join('')}
      <button class="add-tc-btn" onclick="addExtraTc()">+ เพิ่ม Test Case</button>
    </div>`
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => setupEditor(tc.id)))
  customTcs.forEach(tc => setupEditor(tc.id))
}

function applyStateToUI() {
  const applyOne = (tc) => {
    const s = state[tc.id]
    if (!s) return
    if (s.status) {
      const row = document.getElementById('row-' + tc.id)
      if (row) row.className = 'tc-row s-' + s.status
      const map = { pass:'p', fail:'f', skip:'s' }
      const btn = document.getElementById(map[s.status] + '-' + tc.id)
      if (btn) btn.className = 'tbtn a' + map[s.status][0]
    }
    if (s.note) {
      const editor = document.getElementById('actual-' + tc.id)
      if (editor) {
        const imgStyle = 'max-width:100%;border-radius:4px;display:block;margin:4px 0;cursor:zoom-in'
        let html = s.note
        html = html.replace(/\[รูป\]\s*(https?:\/\/[^\s<"'\n]+)/g,
          `<img src="$1" style="${imgStyle}" onclick="openLightbox(this.src)">`)
        html = html.replace(/(?<!['"=>])(https?:\/\/i\.ibb\.co\/[^\s<"'\n]+)/g,
          `<img src="$1" style="${imgStyle}" onclick="openLightbox(this.src)">`)
        editor.innerHTML = html
      }
    }
  }
  SECTIONS.forEach(sec => sec.tcs.forEach(applyOne))
  customTcs.forEach(applyOne)
}

loadCustomTcs()
render()
;(async () => {
  if (window.FS) await window.FS.pullDoc(STORAGE_KEY)
  loadState()
  applyStateToUI()
  updateStats()
})()

const PROXY_URL = 'https://web-production-3a704.up.railway.app'

function exportBugJSON() {
  const payload = buildPayload()
  if (!payload) return
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'bug-report-' + TASK_NUMBER + '.json'
  a.click()
  showToast('📥 ดาวน์โหลด bug-report-' + TASK_NUMBER + '.json แล้วครับ')
}

function buildPayload() {
  const fails = []
  const gather = (tcs, sectionName) => tcs.forEach(tc => {
    if (state[tc.id]?.status === 'fail') {
      const editor = document.getElementById('actual-' + tc.id)
      const images = []
      if (editor) editor.querySelectorAll('img').forEach(img => images.push(img.src))
      const noteText = state[tc.id]?.note || ''
      ;(noteText.match(/https?:\/\/i\.ibb\.co\/[^\s<"'\n]+/g) || []).forEach(url => { if (!images.includes(url)) images.push(url) })
      let actualText = editor ? editor.innerText.trim() : ''
      if (!actualText) actualText = noteText.replace(/\[รูป\]\s*https?:\/\/[^\n]+/g, '').trim() || 'ยังไม่ได้ระบุ'
      fails.push({ tc_id: tc.id, name: tc.name, section: sectionName,
        precondition: tc.precondition || '', steps: tc.steps || '', expected: tc.expected || '',
        actual: actualText, images })
    }
  })
  SECTIONS.forEach(sec => gather(sec.tcs, sec.name))
  gather(customTcs, 'เพิ่มเติม')
  if (!fails.length) { showToast('ไม่มี Fail ที่จะส่ง'); return null }
  return {
    task_url: TASK_URL, task_number: TASK_NUMBER, task_name: TASK_NAME,
    total_pass: Object.values(state).filter(v => v.status === 'pass').length,
    total_fail: fails.length,
    total_skip: Object.values(state).filter(v => v.status === 'skip').length,
    total_tc: Object.keys(state).length,
    bugs: fails
  }
}

let progressEl = null
function showSending() {
  if (progressEl) progressEl.remove()
  progressEl = document.createElement('div')
  progressEl.className = 'send-progress'
  progressEl.innerHTML = `<div class="send-progress-title">📤 กำลังส่ง Bug Report...</div>
    <div class="send-step active" id="sp-0">→ ส่งไป proxy...</div>`
  document.body.appendChild(progressEl)
}
function showSendDone(msg) {
  if (!progressEl) return
  progressEl.querySelector('#sp-0').className = 'send-step done'
  progressEl.querySelector('#sp-0').textContent = '✓ ' + msg
  setTimeout(() => { progressEl?.remove(); progressEl = null }, 3000)
}
function showSendErr(msg) {
  if (!progressEl) return
  progressEl.querySelector('#sp-0').className = 'send-step err'
  progressEl.querySelector('#sp-0').textContent = '✗ ' + msg
  setTimeout(() => { progressEl?.remove(); progressEl = null }, 5000)
}

async function sendToBoard() {
  const payload = buildPayload()
  if (!payload) return
  showSending()
  try {
    const r = await fetch(`${PROXY_URL}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    const data = await r.json()
    if (data.ok) {
      showSendDone(`ส่ง ${payload.total_fail} bugs สำเร็จ!`)
      showToast(`✅ ส่ง ${payload.total_fail} bugs เข้า Task #${TASK_NUMBER} แล้วครับ`)
    } else {
      showSendErr(data.error || 'ส่งไม่สำเร็จ')
      showToast('❌ ' + (data.error || 'ส่งไม่สำเร็จ'))
    }
  } catch (err) {
    showSendErr('เปิด proxy ก่อน')
    showToast('❌ ไม่พบ proxy — รัน: python proxy.py')
    console.error(err)
  }
}
