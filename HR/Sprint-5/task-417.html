  {
    name: 'ส่วนที่ 1 — หน้ารายการสัญญาโหลดได้ปกติ',
    tcs: [
      {
        id: 'TC-001',

        id: 'TC-002',

        precondition: 'มีสัญญาหลายสถานะในระบบ',
        steps: '1. ดูรายการสัญญาในหน้า\n2. สังเกต badge สถานะ',
        expected: 'แต่ละสัญญามี badge แสดงสถานะ เช่น "มีผลบังคับใช้", "ใกล้หมดอายุ", "หมดอายุ", "ยกเลิก"'
      }
    ]
  },
  {
    name: 'ส่วนที่ 2 — Badge สีแสดงถูกต้อง',
    tcs: [
      {
        id: 'TC-003',
        name: 'สัญญาสถานะ "มีผลบังคับใช้" → badge สีเขียว',
        precondition: 'มีสัญญาสถานะ "มีผลบังคับใช้" (วันที่เหลือ > 30 วัน)',
        steps: '1. หาสัญญาสถานะ "มีผลบังคับใช้"\n2. สังเกตสี badge',
        expected: 'Badge แสดงข้อความ "มีผลบังคับใช้" สีเขียว'
      },
      {
        id: 'TC-004',
        name: 'สัญญาสถานะ "ใกล้หมดอายุ" → badge สีส้ม',

      {
        id: 'TC-005',
        name: 'สัญญาสถานะ "หมดอายุ" → badge สีแดง',

      },
      {
        id: 'TC-006',
        name: 'สัญญาสถานะ "ยกเลิก" → badge ไม่เปลี่ยน (Cronjob ข้ามไป)',

  {

        precondition: 'มีสัญญาที่ไม่ได้กำหนดวันสิ้นสุด',

  {

      {

        id: 'TC-012',

      },
      {
        id: 'TC-013',
        name: 'กรองสถานะ "หมดอายุ" → แสดงเฉพาะสัญญาหมดอายุ',

const state = {}
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  state[tc.id] = { status: null, note: '' }
}))

function saveState() {
  const data = {}
  Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY)
    if (!saved) return
    const data = JSON.parse(saved)
    Object.keys(data).forEach(id => {
      if (state[id]) {
        state[id].status = data[id].status
        state[id].note = data[id].note || ''
      }
    })
  } catch(e) {}
}

function updateStats() {
  let p=0,f=0,s=0,n=0
  Object.values(state).forEach(v => {
    if(v.status==='pass') p++
    else if(v.status==='fail') f++
    else if(v.status==='skip') s++
    else n++
  })
  document.getElementById('sp').textContent = 'Pass ' + p
  document.getElementById('sf').textContent = 'Fail ' + f
  document.getElementById('ss').textContent = 'Skip ' + s
  document.getElementById('sn').textContent = 'Pending ' + n
  document.getElementById('st').textContent = 'Total ' + Object.keys(state).length + ' TC'
}

function setStatus(id, st) {
  state[id].status = state[id].status === st ? null : st
  const row = document.getElementById('row-' + id)
  row.className = 'tc-row' + (state[id].status ? ' s-' + state[id].status : '')
  ;['p','f','s'].forEach(k => {
    const map = {p:'pass',f:'fail',s:'skip'}
    const btn = document.getElementById(k + '-' + id)
    btn.className = 'tbtn' + (state[id].status === map[k] ? ' a' + k : '')
  })
  updateStats()
  saveState()
}

let activeEditor = null
function toggleDetail(id, el) {
  const d = document.getElementById('detail-' + id)
  const open = d.classList.toggle('open')
  el.textContent = open ? '▾ ซ่อน' : '▸ ดูรายละเอียด'
  if (open) activeEditor = id
}

function setupEditor(id) {
  const editor = document.getElementById('actual-' + id)
  if (!editor) return
  editor.addEventListener('focus', () => { activeEditor = id })
  editor.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || [])
    const imgItem = items.find(i => i.type.startsWith('image/'))
    if (!imgItem) return
    e.preventDefault()
    const reader = new FileReader()
    reader.onload = (ev) => {
      const img = document.createElement('img')
      img.src = ev.target.result
      img.onclick = () => openLightbox(img.src)
      insertAtCursor(img)
      showToast('📋 วางรูปแล้ว')
    }
    reader.readAsDataURL(imgItem.getAsFile())
  })
  editor.addEventListener('dragover', (e) => { e.preventDefault() })
  editor.addEventListener('drop', (e) => {
    e.preventDefault()
    const _ins = (src) => { const _a = (s) => { const img = document.createElement('img'); img.src = s; img.onclick = () => openLightbox(img.src); editor.appendChild(img); showToast('📎 วางรูปแล้ว') }; if (!src.startsWith('data:') || src.startsWith('data:image/gif')) { _a(src); return }; const tmp = new Image(); tmp.onload = () => { const MAX = 600, cv = document.createElement('canvas'); let w = tmp.width, h = tmp.height; if (w > MAX) { h = Math.round(h * MAX / w); w = MAX } if (h > MAX) { w = Math.round(w * MAX / h); h = MAX } cv.width = w; cv.height = h; cv.getContext('2d').drawImage(tmp, 0, 0, w, h); _a(cv.toDataURL('image/jpeg', 0.4)) }; tmp.src = src }
    const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'))
    if (file) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(file); return }
    const item = Array.from(e.dataTransfer.items || []).find(i => i.kind === 'file' && i.type.startsWith('image/'))
    if (item) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(item.getAsFile()); return }
    const html = e.dataTransfer.getData('text/html')
    if (html) { const tmp = document.createElement('div'); tmp.innerHTML = html; const s = tmp.querySelector('img')?.src; if (s) { _ins(s); return } }
    const uri = (e.dataTransfer.getData('text/uri-list') || '').split('\n')[0].trim()
    if (uri && /\.(png|jpe?g|gif|webp|svg)/i.test(uri)) _ins(uri)
  })
}

function insertAtCursor(node) {
  const sel = window.getSelection()
  if (!sel || !sel.rangeCount) return
  const range = sel.getRangeAt(0)
  range.deleteContents()
  range.insertNode(node)
  range.setStartAfter(node)
  range.collapse(true)
  sel.removeAllRanges()
  sel.addRange(range)
}

function saveActual(id) {
  const editor = document.getElementById('actual-' + id)
  state[id].note = editor ? editor.innerHTML : ''
  saveState()
  showToast('💾 บันทึกแล้ว')
}

function openLightbox(src) {
  const overlay = document.createElement('div')
  overlay.className = 'lb-overlay'
  const img = document.createElement('img')
  img.src = src
  const close = document.createElement('button')
  close.className = 'lb-close'
  close.textContent = '✕'
  overlay.appendChild(img)
  overlay.appendChild(close)
  document.body.appendChild(overlay)
  const rm = () => overlay.remove()
  close.onclick = (e) => { e.stopPropagation(); rm() }
  overlay.onclick = rm
  img.onclick = (e) => e.stopPropagation()
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { rm(); document.removeEventListener('keydown', esc) }
  })
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  t.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;background:#1a1a1a;color:#fff;border-radius:6px;padding:8px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;'
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

function resetAll() {
  if (!confirm('รีเซ็ตทั้งหมด?')) return
  localStorage.removeItem(STORAGE_KEY)
  Object.keys(state).forEach(id => { state[id] = { status: null, note: '' } })
  document.getElementById('bug-out').classList.remove('open')
  render()
  loadState()
  applyStateToUI()
  updateStats()
}

function showBugReport() {
  const fails = []
  let num = 1
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const actual = editor ? editor.innerText.trim() : ''
        const actualHtml = editor ? editor.innerHTML.trim() : ''
        fails.push({ ...tc, section: sec.name, actual, actualHtml, num: num++ })
      }
    })
  })
  const out = document.getElementById('bug-out')
  const list = document.getElementById('bug-list')
  const title = document.getElementById('bug-title')
  out.classList.add('open')
  document.getElementById('export-btn').style.display = fails.length ? 'block' : 'none'
  document.getElementById('send-btn').style.display = fails.length ? 'block' : 'none'
  if (!fails.length) {
    title.textContent = ''
    list.innerHTML = '<div class="no-fail">ไม่มี Test Case ที่ Fail ✅</div>'
    out.scrollIntoView({ behavior: 'smooth', block: 'start' })
    return
  }
  title.textContent = 'พบ ' + fails.length + ' รายการที่ Fail'
  list.innerHTML = fails.map(f => `
    <div class="bug-item">
      <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
      <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:6px">${f.name}</div>
      ${f.precondition ? `<div class="bug-line"><b>Precondition:</b> ${f.precondition}</div>` : ''}
      <div class="bug-line"><b>Steps:</b> ${f.steps.replace(/\n/g,'<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;')}</div>
      <div class="bug-line"><b>Expected:</b> ${f.expected}</div>
      <div class="bug-line"><b>Actual result:</b></div>
      <div class="bug-actual-content">${f.actualHtml || '<span style="color:rgba(248,250,252,0.4)">ยังไม่ได้ระบุ</span>'}</div>
    </div>
  `).join('')
  out.scrollIntoView({ behavior: 'smooth', block: 'start' })
}

document.getElementById('bug-list').addEventListener('click', e => {
  if (e.target.tagName === 'IMG') openLightbox(e.target.src)
})

function render() {
  const container = document.getElementById('tc-list')
  container.innerHTML = SECTIONS.map(sec => `
    <div>
      <div class="section-hd">${sec.name}</div>
      ${sec.tcs.map(tc => `
        <div class="tc-row" id="row-${tc.id}">
          <div class="tc-top">
            <div class="tc-id">${tc.id}</div>
            <div class="tc-name">${tc.name}</div>
            <div class="tc-btns">
              <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
              <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
              <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
            </div>
          </div>
          <span class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</span>
          <div class="tc-detail" id="detail-${tc.id}">
            ${tc.precondition ? `<div class="detail-label">Precondition</div><div class="detail-val">${tc.precondition}</div>` : ''}
            <div class="detail-label">Steps</div>
            <div class="detail-val">${tc.steps.replace(/\n/g,'<br>')}</div>
            <div class="detail-label">Expected</div>
            <div class="detail-val">${tc.expected}</div>
            <div class="detail-label" style="margin-top:10px">Actual result</div>
            <div class="actual-editor" id="actual-${tc.id}" contenteditable="true"
              data-placeholder="พิมพ์หรือ Ctrl+V วางรูปได้เลย..."></div>
            <div class="save-row">
              <button class="save-btn" onclick="saveActual('${tc.id}')">💾 Save</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('')
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => setupEditor(tc.id)))
}

function applyStateToUI() {
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
    const s = state[tc.id]
    if (s.status) {
      document.getElementById('row-' + tc.id).className = 'tc-row s-' + s.status
      const map = { pass:'p', fail:'f', skip:'s' }
      const btn = document.getElementById(map[s.status] + '-' + tc.id)
      if (btn) btn.className = 'tbtn a' + map[s.status][0]
    }
    if (s.note) {
      const editor = document.getElementById('actual-' + tc.id)
      if (editor) editor.innerHTML = s.note
    }
  }))
}

render()
;(async () => {
  if (window.AUTH) await window.AUTH.waitForAuth()
  if (window.FS) await window.FS.pullDoc(STORAGE_KEY)
  loadState()
  applyStateToUI()
  updateStats()
})()

const PROXY_URL = 'https://web-production-3a704.up.railway.app'

function exportBugJSON() {
  const payload = buildPayload()
  if (!payload) return
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'bug-report-417.json'
  a.click()
  showToast('📥 ดาวน์โหลด bug-report-417.json แล้วครับ')
}

function buildPayload() {
  const fails = []
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const images = []
        if (editor) editor.querySelectorAll('img').forEach(img => images.push(img.src))
        fails.push({ tc_id: tc.id, name: tc.name, section: sec.name,
          precondition: tc.precondition || '', steps: tc.steps, expected: tc.expected,
          actual: editor ? editor.innerText.trim() : 'ยังไม่ได้ระบุ', images })
      }
    })
  })
  if (!fails.length) { showToast('ไม่มี Fail ที่จะส่ง'); return null }
  return {
    task_url: TASK_URL, task_number: TASK_NUMBER, task_name: TASK_NAME,
    total_pass: Object.values(state).filter(v => v.status === 'pass').length,
    total_fail: fails.length,
    total_skip: Object.values(state).filter(v => v.status === 'skip').length,
    total_tc: Object.keys(state).length,
    bugs: fails
  }
}

let progressEl = null
function showSending() {
  if (progressEl) progressEl.remove()
  progressEl = document.createElement('div')
  progressEl.className = 'send-progress'
  progressEl.innerHTML = `<div class="send-progress-title">📤 กำลังส่ง Bug Report...</div>
    <div class="send-step active" id="sp-0">→ ส่งไป proxy...</div>`
  document.body.appendChild(progressEl)
}
function showSendDone(msg) {
  if (!progressEl) return
  progressEl.querySelector('#sp-0').className = 'send-step done'
  progressEl.querySelector('#sp-0').textContent = '✓ ' + msg
  setTimeout(() => { progressEl?.remove(); progressEl = null }, 3000)
}
function showSendErr(msg) {
  if (!progressEl) return
  progressEl.querySelector('#sp-0').className = 'send-step err'
  progressEl.querySelector('#sp-0').textContent = '✗ ' + msg
  setTimeout(() => { progressEl?.remove(); progressEl = null }, 5000)
}

async function sendToBoard() {
  const payload = buildPayload()
  if (!payload) return
  showSending()
  try {
    const r = await fetch(`${PROXY_URL}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    const data = await r.json()
    if (data.ok) {
      showSendDone(`ส่ง ${payload.total_fail} bugs สำเร็จ!`)
      showToast(`✅ ส่ง ${payload.total_fail} bugs เข้า Task #417 แล้วครับ`)
    } else {
      showSendErr(data.error || 'ส่งไม่สำเร็จ')
      showToast('❌ ' + (data.error || 'ส่งไม่สำเร็จ'))
    }
  } catch (err) {
    showSendErr('เปิด proxy ก่อน')
    showToast('❌ ไม่พบ proxy — รัน: python proxy.py')
    console.error(err)
  }
}
