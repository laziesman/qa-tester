.lb-close:hover{background:rgba(255,255,255,0.25)}

<script src="../../firebase-auth.js"></script><script>
const STORAGE_KEY = 'qa_task_403'
const FILE_NAME = 'task-403-results.json'
let fileHandle = null

const SECTIONS = [
  {
    name: 'ส่วนที่ 1 — เลือกพนักงาน',
    tcs: [
      {
        id: 'TC-001',
        name: 'Happy Path — ค้นหาพนักงาน Active ด้วยรหัส dropdown แสดงผลถูกต้อง',
        precondition: 'มีพนักงานสถานะ Active อยู่ในระบบ',
        steps: '1. เปิดฟอร์มบันทึกการเปลี่ยนแปลง\n2. พิมพ์รหัสพนักงาน Active ใน field รหัสพนักงาน\n3. สังเกต dropdown ที่แสดงขึ้น',
        expected: 'Dropdown แสดงชื่อพนักงานที่ตรงกับรหัสที่พิมพ์ สามารถเลือกได้'
      },
      {
        id: 'TC-002',
        name: 'ชื่อ-สกุล auto-fill และ read-only หลังเลือกพนักงาน',
        precondition: 'เปิดฟอร์มและค้นหาพนักงานแล้ว',
        steps: '1. เลือกพนักงานจาก dropdown\n2. สังเกต field ชื่อ-สกุล\n3. พยายามพิมพ์ใน field ชื่อ-สกุล',
        expected: 'ชื่อ-สกุล auto-fill ตรงกับพนักงานที่เลือก และเป็น read-only ไม่สามารถแก้ไขได้'
      },
      {
        id: 'TC-003',
        name: 'Dropdown แสดงเฉพาะพนักงานสถานะ Active เท่านั้น',
        precondition: 'มีพนักงานทั้งสถานะ Active และ Inactive / Resigned ในระบบ',
        steps: '1. พิมพ์คำค้นหาที่ตรงกับทั้งพนักงาน Active และ Inactive\n2. สังเกตผลลัพธ์ใน dropdown',
        expected: 'Dropdown แสดงเฉพาะพนักงาน Active ไม่แสดงพนักงาน Inactive หรือ Resigned'
      },
      {
        id: 'TC-004',
        name: 'ค้นหาด้วยรหัสที่ไม่มีในระบบ — dropdown ไม่แสดงผล',
        precondition: 'เปิดฟอร์ม',
        steps: '1. พิมพ์รหัสพนักงานที่ไม่มีอยู่ในระบบ\n2. สังเกต dropdown',
        expected: 'Dropdown ไม่แสดงผลลัพธ์ หรือแสดงข้อความ "ไม่พบข้อมูล"'
      },
      {
        id: 'TC-005',
        name: 'รหัสพนักงาน required — บันทึกไม่ได้ถ้าไม่เลือกพนักงาน',
        precondition: 'เปิดฟอร์ม ยังไม่ได้เลือกพนักงาน',
        steps: '1. ไม่เลือกพนักงาน\n2. กรอกข้อมูลอื่นครบ\n3. กดปุ่ม บันทึกการเปลี่ยนแปลง',
        expected: 'ระบบแสดง error ที่ field รหัสพนักงาน บันทึกไม่สำเร็จ'
      }
    ]
  },
  {
    name: 'ส่วนที่ 2 — ประเภทการเปลี่ยนแปลง',
    tcs: [
      {
        id: 'TC-006',
        name: 'เลือก checkbox ได้หลายประเภทพร้อมกัน — ฟอร์มแสดงทุก section',
        precondition: 'เลือกพนักงานแล้ว',
        steps: '1. เลือก checkbox "เปลี่ยนตำแหน่ง"\n2. เลือก checkbox "ปรับเงินเดือน" เพิ่ม\n3. สังเกตฟอร์ม',
        expected: 'ทั้งสอง checkbox ถูกเลือกพร้อมกัน ฟอร์มแสดง section ของทั้งสองประเภทพร้อมกัน'
      },
      {
        id: 'TC-007',
        name: 'ไม่เลือกประเภทการเปลี่ยนแปลงเลย — บันทึกไม่ได้',
        precondition: 'เลือกพนักงานแล้ว ไม่ได้ติ๊ก checkbox ใด',
        steps: '1. เลือกพนักงาน\n2. ไม่เลือก checkbox ประเภทการเปลี่ยนแปลงใดเลย\n3. กรอกวันที่มีผล\n4. กดบันทึก',
        expected: 'ระบบแสดง error "ต้องเลือกประเภทการเปลี่ยนแปลงอย่างน้อย 1 ข้อ" บันทึกไม่สำเร็จ'
      },
      {
        id: 'TC-008',
        name: 'เลือกทั้ง 3 ประเภทพร้อมกัน — ฟอร์มแสดงครบทุก section',
        precondition: 'เลือกพนักงานแล้ว',
        steps: '1. เลือก checkbox ทั้ง 3: เปลี่ยนตำแหน่ง / เปลี่ยนแผนก-ฝ่าย / ปรับเงินเดือน\n2. สังเกตฟอร์ม',
        expected: 'ฟอร์มแสดง section ของทั้ง 3 ประเภทพร้อมกัน ฟิลด์ครบทุกกลุ่ม'
      },
      {
        id: 'TC-009',
        name: 'ยกเลิก checkbox — section ที่เกี่ยวข้องซ่อนหาย',
        precondition: 'เลือก checkbox "เปลี่ยนตำแหน่ง" ไว้แล้ว',
        steps: '1. สังเกตว่า section เปลี่ยนตำแหน่งแสดงอยู่\n2. ยกเลิก checkbox "เปลี่ยนตำแหน่ง"\n3. สังเกตฟอร์ม',
        expected: 'Section เปลี่ยนตำแหน่งซ่อนหายทันที'
      }
    ]
  },
  {
    name: 'ส่วนที่ 3 — เปลี่ยนตำแหน่ง',
    tcs: [
      {
        id: 'TC-010',
        name: 'ตำแหน่งเดิม auto-fill read-only จากข้อมูลปัจจุบัน',
        precondition: 'เลือกพนักงานและติ๊ก "เปลี่ยนตำแหน่ง" แล้ว',
        steps: '1. สังเกต field ตำแหน่งเดิม\n2. พยายามแก้ไข field ตำแหน่งเดิม',
        expected: 'ตำแหน่งเดิม auto-fill ตรงกับตำแหน่งปัจจุบันของพนักงาน เป็น read-only แก้ไขไม่ได้'
      },
      {
        id: 'TC-011',
        name: 'ตำแหน่งใหม่ required — บันทึกไม่ได้ถ้าไม่เลือก',
        precondition: 'ติ๊ก "เปลี่ยนตำแหน่ง" แล้ว',
        steps: '1. ไม่เลือกตำแหน่งใหม่\n2. กรอกข้อมูลอื่นครบ\n3. กดบันทึก',
        expected: 'ระบบแสดง error ที่ field ตำแหน่งใหม่ บันทึกไม่สำเร็จ'
      },
      {
        id: 'TC-012',
        name: 'ระดับพนักงาน auto-fill ตามตำแหน่งใหม่ที่เลือก',
        precondition: 'ติ๊ก "เปลี่ยนตำแหน่ง" และเปิด dropdown ตำแหน่งใหม่',
        steps: '1. เลือกตำแหน่งใหม่จาก dropdown\n2. สังเกต field ระดับพนักงาน',
        expected: 'ระดับพนักงาน auto-fill ตามตำแหน่งใหม่ที่เลือกทันที'
      },
      {
        id: 'TC-013',
        name: 'เลือกตำแหน่งใหม่เหมือนตำแหน่งเดิม — ไม่มี error/warning',
        precondition: 'ติ๊ก "เปลี่ยนตำแหน่ง" ทราบตำแหน่งปัจจุบันของพนักงาน',
        steps: '1. เลือกตำแหน่งใหม่เป็นตำแหน่งเดียวกับตำแหน่งเดิม\n2. กรอกข้อมูลอื่นครบ\n3. กดบันทึก',
        expected: 'ระบบไม่แสดง error หรือ warning เกี่ยวกับตำแหน่ง บันทึกสำเร็จตามปกติ'
      }
    ]
  },
  {
    name: 'ส่วนที่ 4 — เปลี่ยนแผนก / ฝ่าย',
    tcs: [
      {
        id: 'TC-014',
        name: 'แผนก/ฝ่ายเดิม auto-fill read-only จากข้อมูลปัจจุบัน',
        precondition: 'เลือกพนักงานและติ๊ก "เปลี่ยนแผนก/ฝ่าย" แล้ว',
        steps: '1. สังเกต field แผนก/ฝ่ายเดิม\n2. พยายามแก้ไข',
        expected: 'แผนก/ฝ่ายเดิม auto-fill จากข้อมูลปัจจุบัน เป็น read-only ไม่สามารถแก้ไขได้'
      },
      {
        id: 'TC-015',
        name: 'แผนก/ฝ่ายใหม่ required — บันทึกไม่ได้ถ้าไม่เลือก',
        precondition: 'ติ๊ก "เปลี่ยนแผนก/ฝ่าย" แล้ว',
        steps: '1. ไม่เลือกแผนก/ฝ่ายใหม่\n2. กรอกข้อมูลอื่นครบ\n3. กดบันทึก',
        expected: 'ระบบแสดง error ที่ field แผนก/ฝ่ายใหม่ บันทึกไม่สำเร็จ'
      },
      {
        id: 'TC-016',
        name: 'สาขาที่ทำงาน auto-fill เมื่อเลือกแผนก/ฝ่ายใหม่',
        precondition: 'ติ๊ก "เปลี่ยนแผนก/ฝ่าย" แล้ว',
        steps: '1. เลือกแผนก/ฝ่ายใหม่จาก dropdown\n2. สังเกต field สาขาที่ทำงาน',
        expected: 'สาขาที่ทำงาน auto-fill ตามแผนก/ฝ่ายใหม่ที่เลือก'
      },
      {
        id: 'TC-017',
        name: 'สาขาที่ทำงาน สามารถเปลี่ยนใหม่ได้ (ไม่ lock)',
        precondition: 'สาขาที่ทำงาน auto-fill แล้วจากการเลือกแผนก/ฝ่ายใหม่',
        steps: '1. คลิก field สาขาที่ทำงาน\n2. เลือกสาขาอื่นจาก dropdown',
        expected: 'สามารถเปลี่ยนสาขาได้ ค่าเปลี่ยนตามที่เลือก'
      }
    ]
  },
  {
    name: 'ส่วนที่ 5 — ปรับเงินเดือน',
    tcs: [
      {
        id: 'TC-018',
        name: 'เงินเดือนเดิม auto-fill read-only จากข้อมูลปัจจุบัน',
        precondition: 'เลือกพนักงานและติ๊ก "ปรับเงินเดือน" แล้ว',
        steps: '1. สังเกต field เงินเดือนเดิม\n2. พยายามแก้ไข',
        expected: 'เงินเดือนเดิม auto-fill ตรงกับข้อมูลปัจจุบัน เป็น read-only'
      },

const state = {}
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  state[tc.id] = { status: null, note: '' }
}))
state['TC-034'].status = 'skip'

function saveState() {
  const data = {}
  Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
  writeToFile()
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY)
    if (!saved) return
    const data = JSON.parse(saved)
    Object.keys(data).forEach(id => {
      if (state[id]) {
        state[id].status = data[id].status
        state[id].note = data[id].note || ''
      }
    })
  } catch(e) {}
}

function updateStats() {
  let p=0,f=0,s=0,n=0
  Object.values(state).forEach(v => {
    if(v.status==='pass') p++
    else if(v.status==='fail') f++
    else if(v.status==='skip') s++
    else n++
  })
  document.getElementById('sp').textContent = 'Pass ' + p
  document.getElementById('sf').textContent = 'Fail ' + f
  document.getElementById('ss').textContent = 'Skip ' + s
  document.getElementById('sn').textContent = 'Pending ' + n
}

function setStatus(id, st) {
  state[id].status = state[id].status === st ? null : st
  const row = document.getElementById('row-' + id)
  row.className = 'tc-row' + (state[id].status ? ' s-' + state[id].status : '')
  ;['p','f','s'].forEach(k => {
    const map = {p:'pass',f:'fail',s:'skip'}
    const btn = document.getElementById(k + '-' + id)
    btn.className = 'tbtn' + (state[id].status === map[k] ? ' a' + k : '')
  })
  updateStats()
  saveState()
}

function setupEditor(id) {
  const editor = document.getElementById('actual-' + id)
  if (!editor) return

  editor.addEventListener('focus', () => { activeEditor = id })

  editor.addEventListener('click', (e) => {
    if (e.target.tagName !== 'IMG') return
    const range = document.createRange()
    range.selectNode(e.target)
    const sel = window.getSelection()
    sel.removeAllRanges()
    sel.addRange(range)
  })

  editor.addEventListener('dblclick', (e) => {
    if (e.target.tagName !== 'IMG') return
    openLightbox(e.target.src)
  })

  editor.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || [])
    const imgItem = items.find(i => i.type.startsWith('image/'))
    if (!imgItem) return
    e.preventDefault()
    const reader = new FileReader()
    reader.onload = (ev) => {
      const img = document.createElement('img')
      img.src = ev.target.result
      insertAtCursor(img)
      showToast('📋 วางรูปแล้ว')
    }
    reader.readAsDataURL(imgItem.getAsFile())
  })

  editor.addEventListener('dragover', (e) => { e.preventDefault() })
  editor.addEventListener('drop', (e) => {
    e.preventDefault()
    const _ins = (src) => { const _a = (s) => { const img = document.createElement('img'); img.src = s; img.onclick = () => openLightbox(img.src); editor.appendChild(img); showToast('📎 วางรูปแล้ว') }; if (!src.startsWith('data:') || src.startsWith('data:image/gif')) { _a(src); return }; const tmp = new Image(); tmp.onload = () => { const MAX = 600, cv = document.createElement('canvas'); let w = tmp.width, h = tmp.height; if (w > MAX) { h = Math.round(h * MAX / w); w = MAX } if (h > MAX) { w = Math.round(w * MAX / h); h = MAX } cv.width = w; cv.height = h; cv.getContext('2d').drawImage(tmp, 0, 0, w, h); _a(cv.toDataURL('image/jpeg', 0.4)) }; tmp.src = src }
    const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'))
    if (file) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(file); return }
    const item = Array.from(e.dataTransfer.items || []).find(i => i.kind === 'file' && i.type.startsWith('image/'))
    if (item) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(item.getAsFile()); return }
    const html = e.dataTransfer.getData('text/html')
    if (html) { const tmp = document.createElement('div'); tmp.innerHTML = html; const s = tmp.querySelector('img')?.src; if (s) { _ins(s); return } }
    const uri = (e.dataTransfer.getData('text/uri-list') || '').split('\n')[0].trim()
    if (uri && /\.(png|jpe?g|gif|webp|svg)/i.test(uri)) _ins(uri)
  })
}

function insertAtCursor(node) {
  const sel = window.getSelection()
  if (!sel || !sel.rangeCount) return
  const range = sel.getRangeAt(0)
  range.deleteContents()
  range.insertNode(node)
  range.setStartAfter(node)
  range.collapse(true)
  sel.removeAllRanges()
  sel.addRange(range)
}

function openLightbox(src) {
  const overlay = document.createElement('div')
  overlay.className = 'lb-overlay'
  const img = document.createElement('img')
  img.src = src
  const close = document.createElement('button')
  close.className = 'lb-close'
  close.textContent = '✕'
  overlay.appendChild(img)
  overlay.appendChild(close)
  document.body.appendChild(overlay)
  const rm = () => overlay.remove()
  close.onclick = (e) => { e.stopPropagation(); rm() }
  overlay.onclick = rm
  img.onclick = (e) => e.stopPropagation()
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { rm(); document.removeEventListener('keydown', esc) }
  })
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  t.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;background:#1a1a1a;color:#fff;border-radius:6px;padding:8px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;'
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

function showBugReport() {
  const fails = []
  let num = 1
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const actual = editor ? editor.innerText.trim() : ''
        fails.push({ ...tc, section: sec.name, actual, num: num++ })
      }
    })
  })

  const out = document.getElementById('bug-out')
  const list = document.getElementById('bug-list')
  const title = document.getElementById('bug-title')
  out.classList.add('open')

  if (!fails.length) {
    title.textContent = ''
    list.innerHTML = '<div class="no-fail">ไม่มี Test Case ที่ Fail ✅</div>'
    out.scrollIntoView({ behavior: 'smooth', block: 'start' })
    return
  }

  title.textContent = 'พบ ' + fails.length + ' รายการที่ Fail'
  list.innerHTML = fails.map(f => `
    <div class="bug-item">
      <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
      <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:4px">${f.name}</div>
      <div class="bug-line"><b>• ทำ:</b> ${f.steps.split('\n')[0]}</div>
      <div class="bug-line"><b>• ควรได้:</b> ${f.expected}</div>
      <div class="bug-line"><b>• ได้จริง:</b> ${f.actual || 'ยังไม่ได้ระบุ'}</div>
    </div>
  `).join('')
  out.scrollIntoView({ behavior: 'smooth', block: 'start' })
}

// --- File System ---
async function dbGet(key) {
  return new Promise(resolve => {
    const req = indexedDB.open('qa_handles', 1)
    req.onupgradeneeded = e => e.target.result.createObjectStore('h')
    req.onsuccess = e => {
      const tx = e.target.result.transaction('h', 'readonly')
      const r = tx.objectStore('h').get(key)
      r.onsuccess = () => resolve(r.result ?? null)
      r.onerror = () => resolve(null)
    }
    req.onerror = () => resolve(null)
  })
}

async function dbSet(key, val) {
  return new Promise(resolve => {
    const req = indexedDB.open('qa_handles', 1)
    req.onupgradeneeded = e => e.target.result.createObjectStore('h')
    req.onsuccess = e => {
      const tx = e.target.result.transaction('h', 'readwrite')
      tx.objectStore('h').put(val, key)
      tx.oncomplete = resolve
      tx.onerror = resolve
    }
    req.onerror = resolve
  })
}

async function writeToFile() {
  if (!fileHandle) return
  try {
    const data = {}
    Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
    const w = await fileHandle.createWritable()
    await w.write(JSON.stringify(data, null, 2))
    await w.close()
  } catch(e) {
    if (e.name === 'NotAllowedError') {
      try {
        const perm = await fileHandle.requestPermission({ mode: 'readwrite' })
        if (perm === 'granted') await writeToFile()
      } catch(_) { fileHandle = null; setFileBadge(null) }
    }
  }
}

async function connectFile() {
  if (!window.showSaveFilePicker) {
    showToast('❌ ใช้ Chrome หรือ Edge เพื่อใช้งานฟีเจอร์นี้')
    return
  }
  try {
    const handle = await window.showSaveFilePicker({
      suggestedName: FILE_NAME,
      types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }]
    })
    fileHandle = handle
    await dbSet(STORAGE_KEY, handle)
    const file = await handle.getFile()
    if (file.size > 0) {
      try {
        const data = JSON.parse(await file.text())
        Object.keys(data).forEach(id => {
          if (state[id]) { state[id].status = data[id].status; state[id].note = data[id].note || '' }
        })
        applyStateToUI()
        updateStats()
        saveState()
        showToast('📂 โหลดข้อมูลจากไฟล์แล้ว')
      } catch(_) { await writeToFile(); showToast('💾 เชื่อมต่อไฟล์แล้ว') }
    } else {
      await writeToFile()
      showToast('💾 เชื่อมต่อไฟล์แล้ว')
    }
    setFileBadge(file.name)
  } catch(e) {
    if (e.name !== 'AbortError') showToast('❌ ' + (e.message || 'เกิดข้อผิดพลาด'))
  }
}

async function initFileHandle() {
  const handle = await dbGet(STORAGE_KEY)
  if (!handle) return
  try {
    fileHandle = handle
    const file = await handle.getFile()
    const perm = await handle.queryPermission({ mode: 'readwrite' })
    setFileBadge(file.name + (perm !== 'granted' ? ' ⚠️' : ''))
  } catch(e) {}
}

function applyStateToUI() {
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
    const s = state[tc.id]
    if (!s) return
    const row = document.getElementById('row-' + tc.id)
    if (!row) return
    row.className = 'tc-row' + (s.status ? ' s-' + s.status : '')
    ;['p','f','s'].forEach(k => {
      const map = {p:'pass',f:'fail',s:'skip'}
      const btn = document.getElementById(k + '-' + tc.id)
      if (btn) btn.className = 'tbtn' + (s.status === map[k] ? ' a'+k : '')
    })
    if (s.note) {
      const editor = document.getElementById('actual-' + tc.id)
      if (editor) editor.innerHTML = s.note
    }
  }))
}

function render() {
  const container = document.getElementById('tc-list')
  container.innerHTML = SECTIONS.map(sec => `
    <div>
      <div class="section-hd">${sec.name}</div>
      ${sec.tcs.map(tc => `
        <div class="tc-row" id="row-${tc.id}">
          <div class="tc-top">
            <div class="tc-id">${tc.id}</div>
            <div class="tc-name">${tc.name}</div>
            <div class="tc-btns">
              <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
              <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
              <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
            </div>
          </div>
          <span class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</span>
          <div class="tc-detail" id="detail-${tc.id}">
            ${tc.precondition ? `<div class="detail-label">Precondition</div><div class="detail-val">${tc.precondition}</div>` : ''}
            <div class="detail-label">Steps</div>
            <div class="detail-val">${tc.steps.replace(/\n/g,'<br>')}</div>
            <div class="detail-label">Expected</div>
            <div class="detail-val">${tc.expected}</div>
            <div class="detail-label" style="margin-top:10px">Actual result</div>
            <div class="actual-editor" id="actual-${tc.id}" contenteditable="true"
              data-placeholder="พิมพ์หรือ Ctrl+V วางรูปได้เลย..."></div>
            <div class="save-row">
              <button class="save-btn" onclick="saveActual('${tc.id}')">💾 Save</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('')

  SECTIONS.forEach(sec => sec.tcs.forEach(tc => setupEditor(tc.id)))
}

render()
;(async () => {
  if (window.AUTH) await window.AUTH.waitForAuth()
  if (window.FS) await window.FS.pullDoc(STORAGE_KEY)
  loadState()
  applyStateToUI()
  updateStats()
})()
initFileHandle()
</script>
</body>
</html>
