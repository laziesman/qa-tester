.task-link{font-size:12px;color:rgba(255,255,255,0.35);text-decoration:none;border:0.5px solid rgba(255,255,255,0.1);border-radius:5px;padding:4px 10px;background:transparent;white-space:nowrap;transition:color 0.12s,border-color 0.12s}

.stats-bar{background:#162032;border-bottom:0.5px solid rgba(255,255,255,0.05);padding:8px 18px;display:flex;gap:6px;flex-wrap:wrap}

.body{background:#0F172A;padding:14px 18px 20px}
.section-hd{font-size:11px;font-weight:600;color:rgba(248,250,252,0.4);letter-spacing:0.07em;padding:14px 0 6px;text-transform:uppercase}

.tc-row{background:#1E293B;border:0.5px solid rgba(255,255,255,0.07);border-left:3px solid transparent;border-radius:7px;padding:9px 11px;margin-bottom:5px;transition:border-color 0.1s}
.tc-row.s-pass{border-left-color:#52a869;background:rgba(52,168,105,0.12)}

.tc-name{font-size:14px;color:#F8FAFC;font-weight:500;line-height:1.4}
.tc-btns{display:flex;gap:3px;flex-shrink:0}
.tbtn{font-size:12px;padding:3px 8px;border-radius:4px;border:0.5px solid rgba(255,255,255,0.07);background:#1E293B;color:rgba(248,250,252,0.35);cursor:pointer;transition:all 0.1s}
.tbtn:hover{background:rgba(255,255,255,0.07)}
.tbtn.ap{background:rgba(52,168,105,0.18);color:#7ec87e;border-color:rgba(52,168,105,0.4)}
.tbtn.af{background:rgba(226,75,74,0.18);color:#f09595;border-color:rgba(226,75,74,0.35)}
.tbtn.as{background:rgba(212,160,23,0.18);color:#f6a942;border-color:rgba(212,160,23,0.4)}

.tc-toggle:hover{color:rgba(248,250,252,0.6)}

.tc-detail{margin-top:8px;padding-top:8px;border-top:0.5px solid rgba(255,255,255,0.06);display:none}
.tc-detail.open{display:block}
.detail-label{font-size:12px;color:rgba(248,250,252,0.35);margin-bottom:3px;margin-top:8px}

.detail-val{font-size:13px;color:rgba(248,250,252,0.65);line-height:1.6}

.actual-editor{min-height:72px;border:0.5px solid rgba(255,255,255,0.07);border-radius:5px;padding:7px 9px;font-size:13px;color:#F8FAFC;background:#0F172A;outline:none;line-height:1.6}
.actual-editor:focus{border-color:rgba(248,250,252,0.35)}
.actual-editor img{max-width:100%;border-radius:4px;display:block;margin:4px 0;cursor:zoom-in}
.actual-editor[data-placeholder]:empty:before{content:attr(data-placeholder);color:rgba(255,255,255,0.2);pointer-events:none}
.save-row{display:flex;justify-content:flex-end;margin-top:5px}
.save-btn{font-size:12px;padding:4px 12px;border-radius:5px;border:0.5px solid rgba(255,255,255,0.07);background:#38BDF8;color:#0F172A;cursor:pointer}

.bottom-bar{display:flex;gap:8px;padding:11px 18px;background:#1E293B;border-top:0.5px solid rgba(255,255,255,0.06)}
.abtn{font-size:13px;padding:7px 14px;border-radius:6px;border:0.5px solid rgba(255,255,255,0.07);background:#1E293B;color:rgba(248,250,252,0.5);cursor:pointer;transition:background 0.1s}
.abtn:hover{background:rgba(255,255,255,0.07)}
.abtn.primary{background:#38BDF8;color:#0F172A;border-color:#38BDF8}
.abtn.primary:hover{background:#0ea5e9}
.abtn.send{background:#0369a1;color:#fff;border-color:#1F3864}
.abtn.send:hover{background:#0284c7}

.bug-out{display:none;padding:0 18px 20px;background:#0F172A}
.bug-out.open{display:block}
.bug-section-title{font-size:12px;font-weight:500;color:#F8FAFC;margin-bottom:8px;padding-top:4px}
.bug-item{border:0.5px solid rgba(226,75,74,0.25);background:rgba(226,75,74,0.1);border-radius:7px;padding:10px 12px;margin-bottom:8px}
.bug-item:last-child{margin-bottom:0}
.bug-id{font-size:12px;color:#f09595;font-weight:500;margin-bottom:5px}
.bug-line{font-size:13px;color:rgba(248,250,252,0.65);line-height:1.7}
.bug-line b{color:rgba(248,250,252,0.4);font-weight:500}
.no-fail{font-size:14px;color:#7ec87e;background:rgba(52,168,105,0.18);border-radius:7px;padding:10px 14px;display:inline-block}
.bug-actual-content{font-size:13px;color:rgba(248,250,252,0.65);line-height:1.6;margin-top:2px;padding-left:16px}
.bug-actual-content img{max-width:100%;border-radius:4px;display:block;margin:4px 0;cursor:zoom-in}

.lb-overlay{position:fixed;inset:0;z-index:99999;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;cursor:zoom-out}
.lb-overlay img{max-width:90vw;max-height:90vh;border-radius:8px;cursor:default}
.lb-close{position:fixed;top:16px;right:16px;background:rgba(255,255,255,0.15);border:none;color:#fff;font-size:20px;width:36px;height:36px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,0.25)}

.send-progress{position:fixed;bottom:24px;right:24px;z-index:9998;background:#1a1a1a;color:#fff;border-radius:8px;padding:12px 16px;font-size:13px;min-width:220px;box-shadow:0 4px 16px rgba(0,0,0,0.2);line-height:1.6}
.send-progress-title{font-weight:500;margin-bottom:6px}
.send-step{color:rgba(248,250,252,0.35);font-size:12px}
.send-step.done{color:#7ec87e}
.send-step.active{color:#fff}

<script src="../../firebase-auth.js"></script><script>
const STORAGE_KEY = 'qa_task_408'
const TASK_URL = 'https://boards.intelligent-bytes.com/project/hrfi/task/408'
const TASK_NUMBER = '408'
const TASK_NAME = 'ฟอร์มสร้างเอกสารสัญญาใหม่ให้พนักงาน'

const SECTIONS = [
  {
    name: 'ส่วนที่ 1 — เลือกพนักงาน',
    tcs: [
      {
        id: 'TC-001',
        name: 'ค้นหาพนักงาน Active ด้วยรหัสพนักงาน → แสดงใน dropdown',
        precondition: 'มีพนักงานสถานะ Active ในระบบ',
        steps: '1. เปิดฟอร์มสร้างเอกสารสัญญา\n2. พิมพ์รหัสพนักงาน Active ในช่องค้นหา\n3. ตรวจสอบ dropdown',
        expected: 'dropdown แสดงรายชื่อพนักงาน Active ที่ตรงกับรหัส สามารถเลือกได้'
      },
      {
        id: 'TC-002',
        name: 'ค้นหาพนักงาน Inactive → ไม่แสดงใน dropdown',
        precondition: 'มีพนักงานสถานะ Inactive ในระบบ',
        steps: '1. เปิดฟอร์ม\n2. พิมพ์รหัสพนักงาน Inactive\n3. ตรวจสอบ dropdown',
        expected: 'ไม่แสดงพนักงาน Inactive ใน dropdown'
      },
      {
        id: 'TC-003',
        name: 'เลือกพนักงาน → auto-fill ชื่อ-สกุล, ตำแหน่ง, แผนก/ฝ่าย',
        precondition: 'มีพนักงาน Active ในระบบ',
        steps: '1. ค้นหาและเลือกพนักงาน\n2. ตรวจสอบฟิลด์ ชื่อ-สกุล, ตำแหน่งปัจจุบัน, แผนก/ฝ่าย',
        expected: 'ฟิลด์ทั้ง 3 auto-fill ข้อมูลถูกต้องตรงกับข้อมูลพนักงานที่เลือก'
      },
      {
        id: 'TC-004',
        name: 'ฟิลด์ auto-fill เป็น read-only ไม่สามารถแก้ไขได้',
        precondition: 'เลือกพนักงานแล้ว',
        steps: '1. เลือกพนักงาน\n2. พยายามพิมพ์/แก้ไขในฟิลด์ ชื่อ-สกุล, ตำแหน่ง, แผนก/ฝ่าย',
        expected: 'ฟิลด์ทั้ง 3 เป็น read-only ไม่สามารถพิมพ์หรือแก้ไขได้'
      },
      {
        id: 'TC-005',
        name: 'ไม่เลือกรหัสพนักงาน → กดบันทึกไม่ได้ (required)',
        precondition: 'เปิดฟอร์มใหม่ ยังไม่เลือกพนักงาน',
        steps: '1. ปล่อยช่องรหัสพนักงานว่าง\n2. กรอกข้อมูลส่วนอื่นครบ\n3. กด บันทึกเอกสารสัญญา',
        expected: 'ระบบบล็อกการบันทึก แสดง error หรือ highlight ว่ารหัสพนักงานเป็นฟิลด์บังคับ'
      }
    ]
  },
  {
    name: 'ส่วนที่ 2 — ประเภทสัญญาและเลขที่สัญญา',
    tcs: [
      {
        id: 'TC-006',
        name: 'dropdown ประเภทสัญญามีครบ 6 ตัวเลือก',
        precondition: 'เปิดฟอร์ม',
        steps: '1. คลิก dropdown ประเภทสัญญา\n2. ตรวจสอบรายการตัวเลือกทั้งหมด',
        expected: 'มีครบ 6 ตัวเลือก: สัญญาจ้างงาน, สัญญาทดลองงาน, สัญญาจ้างพิเศษ/ชั่วคราว, สัญญาต่ออายุ, สัญญาโอนย้าย, อื่นๆ'
      },
      {
        id: 'TC-007',
        name: 'เลือกประเภท "อื่นๆ" → แสดงช่องกรอกรายละเอียดเพิ่มเติม',
        precondition: 'เปิดฟอร์ม',
        steps: '1. เลือก "อื่นๆ" ใน dropdown ประเภทสัญญา\n2. ตรวจสอบว่ามีช่องกรอกรายละเอียดปรากฏ',
        expected: 'แสดงช่อง text input/area สำหรับกรอกรายละเอียดเพิ่มเติมทันที'
      },
      {
        id: 'TC-008',
        name: 'ไม่เลือกประเภทสัญญา → บันทึกไม่ได้ (required)',
        precondition: 'เปิดฟอร์ม',
        steps: '1. ปล่อย dropdown ประเภทสัญญาว่าง\n2. กรอกข้อมูลส่วนอื่นครบ\n3. กด บันทึก',
        expected: 'ระบบบล็อกการบันทึก แสดง error ว่าประเภทสัญญาเป็นฟิลด์บังคับ'
      },
      {
        id: 'TC-009',
        name: 'เลขที่สัญญา auto-generate รูปแบบ CON-[ปี]-[running number]',
        precondition: 'เปิดฟอร์ม',
        steps: '1. เปิดฟอร์ม\n2. ตรวจสอบช่อง เลขที่สัญญา\n3. หาก auto-generate ให้ตรวจสอบรูปแบบ',
        expected: 'ค่า auto-generate มีรูปแบบ CON-[ปีพ.ศ. หรือค.ศ.]-[running number 4 หลัก] เช่น CON-2568-0001 และไม่ซ้ำกับที่มีอยู่'
      },
      {
        id: 'TC-010',
        name: 'กรอกเลขที่สัญญาเองได้ (manual input)',
        precondition: 'เปิดฟอร์ม',
        steps: '1. ลบหรือ clear ค่า auto-generate ออก\n2. พิมพ์เลขที่สัญญาใหม่เอง\n3. ตรวจสอบว่าระบบรับค่า',
        expected: 'ระบบยอมรับเลขที่สัญญาที่กรอกเอง'
      },
      {
        id: 'TC-011',
        name: 'เลขที่สัญญาซ้ำกับที่มีอยู่ → แสดง error',
        precondition: 'มีเลขที่สัญญาในระบบแล้ว',
        steps: '1. กรอกเลขที่สัญญาที่มีอยู่แล้วในระบบ\n2. กด บันทึก หรือ blur ออกจากฟิลด์',
        expected: 'แสดง error "เลขที่สัญญานี้มีอยู่แล้ว" และบล็อกการบันทึก'
      },
      {
        id: 'TC-012',
        name: 'ไม่กรอกเลขที่สัญญา → บันทึกไม่ได้ (required)',
        precondition: 'เปิดฟอร์ม',
        steps: '1. ลบเลขที่สัญญาออกให้ว่าง\n2. กรอกข้อมูลส่วนอื่นครบ\n3. กด บันทึก',
        expected: 'ระบบบล็อกการบันทึก แสดง error ว่าเลขที่สัญญาเป็นฟิลด์บังคับ'
      }
    ]
  },
  {
    name: 'ส่วนที่ 3 — วันที่สัญญาและเงื่อนไข',
    tcs: [
      {
        id: 'TC-013',
        name: 'ไม่กรอกวันที่เริ่มสัญญา → บันทึกไม่ได้ (required)',
        precondition: 'เปิดฟอร์ม',
        steps: '1. ปล่อยช่องวันที่เริ่มสัญญาว่าง\n2. กรอกข้อมูลส่วนอื่นครบ\n3. กด บันทึก',
        expected: 'ระบบบล็อกการบันทึก แสดง error ว่าวันที่เริ่มสัญญาเป็นฟิลด์บังคับ'
      },
      {
        id: 'TC-014',
        name: 'toggle "ไม่กำหนดวันสิ้นสุด" เปิด → ฟิลด์วันที่สิ้นสุด disabled',
        precondition: 'เปิดฟอร์ม',
        steps: '1. เปิด toggle "ไม่กำหนดวันสิ้นสุด"\n2. ตรวจสอบสถานะช่องวันที่สิ้นสุด',
        expected: 'ช่องวันที่สิ้นสุดสัญญา disabled ไม่สามารถกรอกหรือคลิกได้'
      },
      {
        id: 'TC-015',
        name: 'toggle "ไม่กำหนดวันสิ้นสุด" เปิด → ส่วนการแจ้งเตือน disabled ทั้งหมด',
        precondition: 'เปิดฟอร์ม',
        steps: '1. เปิด toggle "ไม่กำหนดวันสิ้นสุด"\n2. ตรวจสอบส่วนที่ 4 การแจ้งเตือนก่อนหมดอายุ',
        expected: 'ส่วนการแจ้งเตือนทั้งหมด (toggle, จำนวนวัน, checkbox) disabled ไม่สามารถกำหนดค่าได้'
      },
      {
        id: 'TC-016',
        name: 'วันที่สิ้นสุด < วันที่เริ่มสัญญา → แสดง error',
        precondition: 'เปิดฟอร์ม และไม่ได้เปิด toggle ไม่กำหนดวันสิ้นสุด',
        steps: '1. กรอกวันที่เริ่มสัญญา เช่น 01/06/2568\n2. กรอกวันที่สิ้นสุดก่อนวันที่เริ่ม เช่น 31/05/2568\n3. กด บันทึก หรือ blur',
        expected: 'แสดง error "วันที่สิ้นสุดต้องอยู่หลังวันที่เริ่มสัญญา" และบล็อกการบันทึก'
      },
      {
        id: 'TC-017',
        name: 'วันที่สิ้นสุด = วันที่เริ่มสัญญา → แสดง error',
        precondition: 'เปิดฟอร์ม',
        steps: '1. กรอกวันที่เริ่มและวันที่สิ้นสุดเป็นวันเดียวกัน\n2. กด บันทึก หรือ blur',
        expected: 'แสดง error เนื่องจากวันสิ้นสุดต้อง "อยู่หลัง" ไม่ใช่เท่ากัน'
      },

const state = {}
SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
  state[tc.id] = { status: null, note: '' }
}))

function saveState() {
  const data = {}
  Object.keys(state).forEach(id => { data[id] = { status: state[id].status, note: state[id].note } })
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data))
}

function loadState() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY)
    if (!saved) return
    const data = JSON.parse(saved)
    Object.keys(data).forEach(id => {
      if (state[id]) {
        state[id].status = data[id].status
        state[id].note = data[id].note || ''
      }
    })
  } catch(e) {}
}

function updateStats() {
  let p=0,f=0,s=0,n=0
  Object.values(state).forEach(v => {
    if(v.status==='pass') p++
    else if(v.status==='fail') f++
    else if(v.status==='skip') s++
    else n++
  })
  document.getElementById('sp').textContent = 'Pass ' + p
  document.getElementById('sf').textContent = 'Fail ' + f
  document.getElementById('ss').textContent = 'Skip ' + s
  document.getElementById('sn').textContent = 'Pending ' + n
  document.getElementById('st').textContent = 'Total ' + Object.keys(state).length + ' TC'
}

function setStatus(id, st) {
  state[id].status = state[id].status === st ? null : st
  const row = document.getElementById('row-' + id)
  row.className = 'tc-row' + (state[id].status ? ' s-' + state[id].status : '')
  ;['p','f','s'].forEach(k => {
    const map = {p:'pass',f:'fail',s:'skip'}
    const btn = document.getElementById(k + '-' + id)
    btn.className = 'tbtn' + (state[id].status === map[k] ? ' a' + k : '')
  })
  updateStats()
  saveState()
}

let activeEditor = null
function toggleDetail(id, el) {
  const d = document.getElementById('detail-' + id)
  const open = d.classList.toggle('open')
  el.textContent = open ? '▾ ซ่อน' : '▸ ดูรายละเอียด'
  if (open) activeEditor = id
}

function setupEditor(id) {
  const editor = document.getElementById('actual-' + id)
  if (!editor) return
  editor.addEventListener('focus', () => { activeEditor = id })
  editor.addEventListener('paste', (e) => {
    const items = Array.from(e.clipboardData?.items || [])
    const imgItem = items.find(i => i.type.startsWith('image/'))
    if (!imgItem) return
    e.preventDefault()
    const reader = new FileReader()
    reader.onload = (ev) => {
      const img = document.createElement('img')
      img.src = ev.target.result
      img.onclick = () => openLightbox(img.src)
      insertAtCursor(img)
      showToast('📋 วางรูปแล้ว')
    }
    reader.readAsDataURL(imgItem.getAsFile())
  })
  editor.addEventListener('dragover', (e) => { e.preventDefault() })
  editor.addEventListener('drop', (e) => {
    e.preventDefault()
    const _ins = (src) => { const img = document.createElement('img'); img.src = src; img.onclick = () => openLightbox(img.src); editor.focus(); insertAtCursor(img); showToast('📎 วางรูปแล้ว') }
    const file = Array.from(e.dataTransfer.files).find(f => f.type.startsWith('image/'))
    if (file) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(file); return }
    const item = Array.from(e.dataTransfer.items || []).find(i => i.kind === 'file' && i.type.startsWith('image/'))
    if (item) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(item.getAsFile()); return }
    const html = e.dataTransfer.getData('text/html')
    if (html) { const tmp = document.createElement('div'); tmp.innerHTML = html; const s = tmp.querySelector('img')?.src; if (s) { _ins(s); return } }
    const uri = (e.dataTransfer.getData('text/uri-list') || '').split('\n')[0].trim()
    if (uri && /\.(png|jpe?g|gif|webp|svg)/i.test(uri)) _ins(uri)
  })
}

function insertAtCursor(node) {
  const sel = window.getSelection()
  if (!sel || !sel.rangeCount) return
  const range = sel.getRangeAt(0)
  range.deleteContents()
  range.insertNode(node)
  range.setStartAfter(node)
  range.collapse(true)
  sel.removeAllRanges()
  sel.addRange(range)
}

function saveActual(id) {
  const editor = document.getElementById('actual-' + id)
  state[id].note = editor ? editor.innerHTML : ''
  saveState()
  showToast('💾 บันทึกแล้ว')
}

function openLightbox(src) {
  const overlay = document.createElement('div')
  overlay.className = 'lb-overlay'
  const img = document.createElement('img')
  img.src = src
  const close = document.createElement('button')
  close.className = 'lb-close'
  close.textContent = '✕'
  overlay.appendChild(img)
  overlay.appendChild(close)
  document.body.appendChild(overlay)
  const rm = () => overlay.remove()
  close.onclick = (e) => { e.stopPropagation(); rm() }
  overlay.onclick = rm
  img.onclick = (e) => e.stopPropagation()
  document.addEventListener('keydown', function esc(e) {
    if (e.key === 'Escape') { rm(); document.removeEventListener('keydown', esc) }
  })
}

function showToast(msg) {
  const t = document.createElement('div')
  t.textContent = msg
  t.style.cssText = 'position:fixed;top:16px;right:16px;z-index:9999;background:#1a1a1a;color:#fff;border-radius:6px;padding:8px 14px;font-size:12px;box-shadow:0 2px 8px rgba(0,0,0,0.15);pointer-events:none;'
  document.body.appendChild(t)
  setTimeout(() => t.remove(), 2000)
}

function resetAll() {
  if (!confirm('รีเซ็ตทั้งหมด?')) return
  localStorage.removeItem(STORAGE_KEY)
  Object.keys(state).forEach(id => { state[id] = { status: null, note: '' } })
  document.getElementById('bug-out').classList.remove('open')
  render()
  loadState()
  applyStateToUI()
  updateStats()
}

function showBugReport() {
  const fails = []
  let num = 1
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const actual = editor ? editor.innerText.trim() : ''
        const actualHtml = editor ? editor.innerHTML.trim() : ''
        fails.push({ ...tc, section: sec.name, actual, actualHtml, num: num++ })
      }
    })
  })
  const out = document.getElementById('bug-out')
  const list = document.getElementById('bug-list')
  const title = document.getElementById('bug-title')
  out.classList.add('open')
  document.getElementById('export-btn').style.display = fails.length ? 'block' : 'none'
  document.getElementById('send-btn').style.display = fails.length ? 'block' : 'none'
  if (!fails.length) {
    title.textContent = ''
    list.innerHTML = '<div class="no-fail">ไม่มี Test Case ที่ Fail ✅</div>'
    out.scrollIntoView({ behavior: 'smooth', block: 'start' })
    return
  }
  title.textContent = 'พบ ' + fails.length + ' รายการที่ Fail'
  list.innerHTML = fails.map(f => `
    <div class="bug-item">
      <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
      <div class="bug-line" style="font-weight:500;color:#F8FAFC;margin-bottom:6px">${f.name}</div>
      ${f.precondition ? `<div class="bug-line"><b>Precondition:</b> ${f.precondition}</div>` : ''}
      <div class="bug-line"><b>Steps:</b> ${f.steps.replace(/\n/g,'<br>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;')}</div>
      <div class="bug-line"><b>Expected:</b> ${f.expected}</div>
      <div class="bug-line"><b>Actual result:</b></div>
      <div class="bug-actual-content">${f.actualHtml || '<span style="color:rgba(248,250,252,0.4)">ยังไม่ได้ระบุ</span>'}</div>
    </div>
  `).join('')
  out.scrollIntoView({ behavior: 'smooth', block: 'start' })
}

document.getElementById('bug-list').addEventListener('click', e => {
  if (e.target.tagName === 'IMG') openLightbox(e.target.src)
})

    <div>
      <div class="section-hd">${sec.name}</div>
      ${sec.tcs.map(tc => `
        <div class="tc-row" id="row-${tc.id}">
          <div class="tc-top">
            <div class="tc-id">${tc.id}</div>
            <div class="tc-name">${tc.name}</div>
            <div class="tc-btns">
              <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
              <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
              <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
            </div>
          </div>
          <span class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</span>
          <div class="tc-detail" id="detail-${tc.id}">
            ${tc.precondition ? `<div class="detail-label">Precondition</div><div class="detail-val">${tc.precondition}</div>` : ''}
            <div class="detail-label">Steps</div>
            <div class="detail-val">${tc.steps.replace(/\n/g,'<br>')}</div>
            <div class="detail-label">Expected</div>
            <div class="detail-val">${tc.expected}</div>
            <div class="detail-label" style="margin-top:10px">Actual result</div>
            <div class="actual-editor" id="actual-${tc.id}" contenteditable="true"
              data-placeholder="พิมพ์หรือ Ctrl+V วางรูปได้เลย..."></div>
            <div class="save-row">
              <button class="save-btn" onclick="saveActual('${tc.id}')">💾 Save</button>
            </div>
          </div>
        </div>
      `).join('')}
    </div>
  `).join('')
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => setupEditor(tc.id)))
}

function applyStateToUI() {
  SECTIONS.forEach(sec => sec.tcs.forEach(tc => {
    const s = state[tc.id]
    if (s.status) {
      document.getElementById('row-' + tc.id).className = 'tc-row s-' + s.status
      const map = { pass:'p', fail:'f', skip:'s' }
      const btn = document.getElementById(map[s.status] + '-' + tc.id)
      if (btn) btn.className = 'tbtn a' + map[s.status][0]
    }
    if (s.note) {
      const editor = document.getElementById('actual-' + tc.id)
      if (editor) editor.innerHTML = s.note
    }
  }))
}

render()
;(async () => {
  if (window.AUTH) await window.AUTH.waitForAuth()
  if (window.FS) await window.FS.pullDoc(STORAGE_KEY)
  loadState()
  applyStateToUI()
  updateStats()
})()

const PROXY_URL = 'https://web-production-3a704.up.railway.app'

function exportBugJSON() {
  const payload = buildPayload()
  if (!payload) return
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' })
  const a = document.createElement('a')
  a.href = URL.createObjectURL(blob)
  a.download = 'bug-report-' + TASK_NUMBER + '.json'
  a.click()
  showToast('📥 ดาวน์โหลด bug-report-' + TASK_NUMBER + '.json แล้วครับ')
}

function buildPayload() {
  const fails = []
  SECTIONS.forEach(sec => {
    sec.tcs.forEach(tc => {
      if (state[tc.id]?.status === 'fail') {
        const editor = document.getElementById('actual-' + tc.id)
        const images = []
        if (editor) editor.querySelectorAll('img').forEach(img => images.push(img.src))
        fails.push({ tc_id: tc.id, name: tc.name, section: sec.name,
          precondition: tc.precondition || '', steps: tc.steps, expected: tc.expected,
          actual: editor ? editor.innerText.trim() : 'ยังไม่ได้ระบุ', images })
      }
    })
  })
  if (!fails.length) { showToast('ไม่มี Fail ที่จะส่ง'); return null }
  return {
    task_url: TASK_URL, task_number: TASK_NUMBER, task_name: TASK_NAME,
    total_pass: Object.values(state).filter(v => v.status === 'pass').length,
    total_fail: fails.length,
    total_skip: Object.values(state).filter(v => v.status === 'skip').length,
    total_tc: Object.keys(state).length,
    bugs: fails
  }
}

let progressEl = null
function showSending() {
  if (progressEl) progressEl.remove()
  progressEl = document.createElement('div')
  progressEl.className = 'send-progress'
  progressEl.innerHTML = `<div class="send-progress-title">📤 กำลังส่ง Bug Report...</div>
    <div class="send-step active" id="sp-0">→ ส่งไป proxy...</div>`
  document.body.appendChild(progressEl)
}
function showSendDone(msg) {
  if (!progressEl) return
  progressEl.querySelector('#sp-0').className = 'send-step done'
  progressEl.querySelector('#sp-0').textContent = '✓ ' + msg
  setTimeout(() => { progressEl?.remove(); progressEl = null }, 3000)
}
function showSendErr(msg) {
  if (!progressEl) return
  progressEl.querySelector('#sp-0').className = 'send-step err'
  progressEl.querySelector('#sp-0').textContent = '✗ ' + msg
  setTimeout(() => { progressEl?.remove(); progressEl = null }, 5000)
}

async function sendToBoard() {
  const payload = buildPayload()
  if (!payload) return
  showSending()
  try {
    const r = await fetch(`${PROXY_URL}/send`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    })
    const data = await r.json()
    if (data.ok) {
      showSendDone(`ส่ง ${payload.total_fail} bugs สำเร็จ!`)
      showToast(`✅ ส่ง ${payload.total_fail} bugs เข้า Task #${TASK_NUMBER} แล้วครับ`)
    } else {
      showSendErr(data.error || 'ส่งไม่สำเร็จ')
      showToast('❌ ' + (data.error || 'ส่งไม่สำเร็จ'))
    }
  } catch (err) {
    showSendErr('เปิด proxy ก่อน')
    showToast('❌ ไม่พบ proxy — รัน: python proxy.py')
    console.error(err)
  }
}
