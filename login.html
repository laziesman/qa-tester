<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — QA Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#ffffff; --canvas:#f7f8fa; --panel:#fbfbfc; --panel2:#f1f3f7;
  --line:#ececf0; --line2:#e2e4ea;
  --text:#16181d; --dim:#5a606b; --faint:#9499a3;
  --accent:#4f6ef7; --accent-soft:#eef2ff;
  --pass:#22c55e; --fail:#ef5350;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sarabun',system-ui,sans-serif;
  background:var(--canvas);
  color:var(--text);
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
  font-size:14.5px;
}

.wrap{width:100%;max-width:360px}

.brand{text-align:center;margin-bottom:24px}
.brand-icon{
  display:inline-flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:12px;
  background:var(--accent-soft);
  margin-bottom:12px;
}
.brand-icon svg{width:20px;height:20px;fill:none;stroke:var(--accent);stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.3px;color:var(--text)}
.brand .sub{font-size:13px;color:var(--faint);margin-top:4px}

.card{
  background:var(--bg);
  border:1px solid var(--line);
  border-radius:16px;
  padding:28px 28px 24px;
  box-shadow:0 1px 8px rgba(0,0,0,0.06);
}

label{
  font-size:11px;font-weight:700;letter-spacing:0.6px;text-transform:uppercase;
  color:var(--faint);
  display:block;margin-bottom:6px;
}
input{
  width:100%;padding:9px 12px;
  border-radius:9px;
  border:1px solid var(--line2);
  background:var(--bg);
  color:var(--text);
  font-size:14px;font-family:inherit;
  outline:none;
  margin-bottom:16px;
  transition:border-color .15s,box-shadow .15s;
}
input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
input::placeholder{color:var(--faint)}

.btn{
  width:100%;padding:10px;
  border-radius:9px;border:none;
  background:var(--accent);
  color:#fff;
  font-size:14px;font-weight:600;font-family:inherit;
  cursor:pointer;
  margin-top:2px;
  transition:opacity .15s;
}
.btn:hover{opacity:.88}
.btn:disabled{opacity:0.45;cursor:not-allowed}

.err{
  font-size:12.5px;color:var(--fail);
  margin-top:12px;min-height:18px;
}

.footer{text-align:center;margin-top:20px;font-size:12px;color:var(--faint)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-icon">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <h1>QA Tester</h1>
    <div class="sub">กรุณา Login เพื่อเข้าใช้งาน</div>
  </div>

  <div class="card">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="btn" onclick="doLogin()">Login</button>
    <div class="err" id="err"></div>
  </div>

  <div class="footer">Intelligent Bytes — QA System</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const CONFIG = {
  apiKey: "AIzaSyC7ULFZaYUqro-sSlqX1qITv9tTm1ybzj0",
  authDomain: "qa-tester-f005d.firebaseapp.com",
  projectId: "qa-tester-f005d",
  storageBucket: "qa-tester-f005d.firebasestorage.app",
  messagingSenderId: "447472890864",
  appId: "1:447472890864:web:fb79980cb0b76803032335"
};
firebase.initializeApp(CONFIG);
const auth = firebase.auth();

auth.onAuthStateChanged(user => { if (user) location.href = '/index.html'; });

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn');
  const err   = document.getElementById('err');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'กรุณากรอก Email และ Password'; return; }
  btn.disabled = true;
  btn.textContent = 'กำลัง Login...';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    location.href = '/index.html';
  } catch (e) {
    const msg = {
      'auth/invalid-credential': 'Email หรือ Password ไม่ถูกต้อง',
      'auth/user-not-found':     'ไม่พบ Email นี้ในระบบ',
      'auth/wrong-password':     'Password ไม่ถูกต้อง',
      'auth/too-many-requests':  'ลอง Login บ่อยเกินไป กรุณารอสักครู่',
    };
    err.textContent = msg[e.code] || e.message;
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
