<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — QA Tester</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Grotesk:wght@600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Sarabun',system-ui,sans-serif;
  background:#0F172A;
  color:#F8FAFC;
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px;
}

/* subtle grid bg */
body::before{
  content:'';
  position:fixed;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.02) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,0.02) 1px,transparent 1px);
  background-size:40px 40px;
  pointer-events:none;
}

.wrap{width:100%;max-width:360px;position:relative}

.brand{text-align:center;margin-bottom:28px}
.brand-dot{
  display:inline-flex;align-items:center;justify-content:center;
  width:42px;height:42px;border-radius:12px;
  background:linear-gradient(135deg,#4f6ef7,#7c94fa);
  margin-bottom:12px;
  box-shadow:0 4px 16px rgba(79,110,247,0.4);
}
.brand-dot svg{width:20px;height:20px;fill:none;stroke:#fff;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand h1{font-family:'Space Grotesk',sans-serif;font-size:20px;font-weight:700;letter-spacing:-0.3px}
.brand .sub{font-size:13px;color:rgba(255,255,255,0.35);margin-top:4px}

.card{
  background:#1E293B;
  border:0.5px solid rgba(255,255,255,0.09);
  border-radius:16px;
  padding:28px 28px 24px;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 0 0.5px rgba(255,255,255,0.04);
}

label{
  font-size:12px;font-weight:600;letter-spacing:0.4px;
  color:rgba(255,255,255,0.45);
  display:block;margin-bottom:6px;
}
input{
  width:100%;padding:10px 13px;
  border-radius:9px;
  border:0.5px solid rgba(255,255,255,0.1);
  background:#0F172A;
  color:#F8FAFC;
  font-size:14px;font-family:inherit;
  outline:none;
  margin-bottom:16px;
  transition:border-color .15s;
}
input:focus{border-color:rgba(79,110,247,0.7)}
input::placeholder{color:rgba(255,255,255,0.18)}

.btn{
  width:100%;padding:11px;
  border-radius:9px;border:none;
  background:linear-gradient(135deg,#4f6ef7,#6a85f9);
  color:#fff;
  font-size:14px;font-weight:600;font-family:inherit;
  cursor:pointer;
  margin-top:4px;
  box-shadow:0 2px 12px rgba(79,110,247,0.35);
  transition:opacity .15s,box-shadow .15s;
}
.btn:hover{opacity:.92;box-shadow:0 4px 18px rgba(79,110,247,0.45)}
.btn:disabled{opacity:0.45;cursor:not-allowed;box-shadow:none}

.err{
  font-size:12.5px;color:#f09595;
  margin-top:12px;min-height:18px;
  display:flex;align-items:center;gap:6px;
}
.err:not(:empty)::before{content:'⚠';font-size:13px}

.footer{text-align:center;margin-top:20px;font-size:12px;color:rgba(255,255,255,0.18)}
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <div class="brand-dot">
      <svg viewBox="0 0 24 24"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
    </div>
    <h1>QA Tester</h1>
    <div class="sub">กรุณา Login เพื่อเข้าใช้งาน</div>
  </div>

  <div class="card">
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="email@example.com" autocomplete="email">
    <label for="pass">Password</label>
    <input type="password" id="pass" placeholder="••••••••" autocomplete="current-password">
    <button class="btn" id="btn" onclick="doLogin()">Login</button>
    <div class="err" id="err"></div>
  </div>

  <div class="footer">Intelligent Bytes — QA System</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script>
const CONFIG = {
  apiKey: "AIzaSyC7ULFZaYUqro-sSlqX1qITv9tTm1ybzj0",
  authDomain: "qa-tester-f005d.firebaseapp.com",
  projectId: "qa-tester-f005d",
  storageBucket: "qa-tester-f005d.firebasestorage.app",
  messagingSenderId: "447472890864",
  appId: "1:447472890864:web:fb79980cb0b76803032335"
};
firebase.initializeApp(CONFIG);
const auth = firebase.auth();

auth.onAuthStateChanged(user => {
  if (user) location.href = '/index.html';
});

async function doLogin() {
  const email = document.getElementById('email').value.trim();
  const pass  = document.getElementById('pass').value;
  const btn   = document.getElementById('btn');
  const err   = document.getElementById('err');
  err.textContent = '';
  if (!email || !pass) { err.textContent = 'กรุณากรอก Email และ Password'; return; }
  btn.disabled = true;
  btn.textContent = 'กำลัง Login...';
  try {
    await auth.signInWithEmailAndPassword(email, pass);
    location.href = '/index.html';
  } catch (e) {
    const msg = {
      'auth/invalid-credential': 'Email หรือ Password ไม่ถูกต้อง',
      'auth/user-not-found':     'ไม่พบ Email นี้ในระบบ',
      'auth/wrong-password':     'Password ไม่ถูกต้อง',
      'auth/too-many-requests':  'ลอง Login บ่อยเกินไป กรุณารอสักครู่',
    };
    err.textContent = msg[e.code] || e.message;
    btn.disabled = false;
    btn.textContent = 'Login';
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
</script>
</body>
</html>
