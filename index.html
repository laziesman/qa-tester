<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="lib/firebase-sync.js"></script>
<script src="lib/firebase-auth.js"></script><script src="lib/firebase-storage.js"></script>
<title>QA Tester — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --pass:#22c55e; --fail:#ef5350; --skip:#eab308; --pending:#cbd5e1;
  --pass-soft:#dcfce7; --fail-soft:#fee2e2; --skip-soft:#fef9c3;
  --bg:#ffffff; --canvas:#f7f8fa; --panel:#fbfbfc; --panel2:#f1f3f7;
  --line:#ececf0; --line2:#e2e4ea;
  --text:#16181d; --dim:#5a606b; --faint:#9499a3;
  --accent:#4f6ef7; --accent-soft:#eef2ff;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:'Sarabun','Inter',system-ui,sans-serif;background:var(--canvas);color:var(--text);font-size:14.5px;line-height:1.55}
.num{font-family:'Space Grotesk',sans-serif;font-variant-numeric:tabular-nums}
.mono{font-family:'IBM Plex Mono',monospace}
::-webkit-scrollbar{width:9px;height:9px}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:9px}
::-webkit-scrollbar-track{background:transparent}
button{font-family:inherit;cursor:pointer}
a{color:inherit}
.app{display:flex;height:100vh;overflow:hidden}

/* ── Sidebar ── */
.sidebar{width:272px;flex-shrink:0;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column}
.sb-brand{padding:16px 16px 14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid var(--line)}
.sb-brand .dot{width:8px;height:8px;border-radius:999px;background:var(--pass)}
.sb-brand .name{font-weight:700;letter-spacing:.2px}
.sb-brand .ic{margin-left:auto;color:var(--faint);cursor:pointer;font-size:15px;transition:color .1s}
.sb-brand .ic:hover{color:var(--text)}
.selectors{padding:12px 12px 6px;display:flex;flex-direction:column;gap:7px}
.sel-field{position:relative}
.sel-field label{font-size:10px;font-weight:700;letter-spacing:0.8px;color:var(--faint);display:block;margin-bottom:5px}
.sel-field select{width:100%;appearance:none;background:var(--panel2);border:none;border-radius:999px;padding:7px 32px 7px 14px;font-size:13px;font-weight:500;color:var(--text);font-family:inherit;cursor:pointer;outline:none;transition:background .1s,color .1s}
.sel-field select:hover{background:var(--line2);color:var(--text)}
.sel-field select:focus{background:var(--line2);color:var(--text)}
.sel-field .chev{position:absolute;right:13px;bottom:8px;color:var(--faint);pointer-events:none;font-size:11px}
.sb-home{margin:8px 12px;padding:7px 14px;border-radius:999px;border:none;background:var(--panel2);color:var(--text);font-size:13px;font-weight:500;display:flex;align-items:center;gap:8px;transition:background .1s,color .1s;width:calc(100% - 24px);cursor:pointer}
.sb-home:hover{background:var(--line2);color:var(--text)}
.sb-home.on{background:var(--line2);color:var(--text);font-weight:600}
.sb-search{padding:2px 12px 10px}
.sb-search .wrap{position:relative}
.sb-search input{width:100%;padding:8px 32px 8px 11px;border-radius:9px;background:var(--bg);border:1px solid var(--line2);color:var(--text);font-size:13px;outline:none;font-family:inherit}
.sb-search input:focus{border-color:var(--accent)}
.sb-search .si{position:absolute;right:11px;top:9px;color:var(--faint)}
.sb-secthd{padding:4px 16px;font-size:10px;font-weight:700;letter-spacing:1px;color:var(--faint);display:flex;align-items:center}
.sb-secthd .c{margin-left:auto;font-weight:600;color:var(--dim)}
.sb-list{flex:1;overflow-y:auto;padding:0 8px 14px}
.sb-item{width:100%;text-align:left;display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:8px;margin-bottom:2px;border:none;background:transparent;transition:.1s;cursor:pointer}
.sb-item-meta{font-size:10px;color:var(--faint);margin-top:1px}
.sb-title{font-size:11px;color:var(--dim);line-height:1.5;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-item:hover{background:var(--panel2)}
.sb-item.sel{background:var(--line2)}
.sb-item .sid{font-size:12px;font-weight:500;color:var(--text);font-family:'IBM Plex Mono',monospace;flex:1;text-align:left}
.sb-badge{font-size:10px;font-weight:600;padding:1px 6px;border-radius:999px;white-space:nowrap;flex-shrink:0}
.sb-badge.fail{color:#b91c1c;background:var(--fail-soft);border:1px solid #fca5a5}
.sb-badge.pass{color:#15803d;background:var(--pass-soft);border:1px solid #86efac}
.sb-badge.empty{color:var(--faint);font-weight:400;font-size:12px}
.sb-open{width:20px;height:20px;border-radius:5px;border:1px solid var(--line2);outline:none;background:var(--bg);color:var(--faint);display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;opacity:0;transition:.1s;text-decoration:none;cursor:pointer}
.sb-item:hover .sb-open,.sb-item.sel .sb-open{opacity:1}
.sb-open:hover{color:var(--accent);border-color:var(--accent);background:var(--accent-soft)}

/* ── Main ── */
.main{flex:1;overflow-y:auto;position:relative;background:var(--canvas)}
.bar{display:flex;border-radius:8px;overflow:hidden;background:var(--line)}
.bar>span{transition:width .3s}
.crumb{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--faint);margin-bottom:10px}
.crumb b{color:var(--dim);font-weight:600}
.crumb .sep{opacity:.6}
.hide{display:none!important}

/* ── Dashboard ── */
.dash{padding:24px 30px}
.dash-card{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:22px 24px}
.dash-hd{display:flex;align-items:flex-end;gap:24px;margin-bottom:18px}
.eyebrow{font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--faint);margin-bottom:5px;text-transform:uppercase}
.dash-hd h1{font-size:24px;font-weight:700}
.dash-hd .sub{font-size:13px;color:var(--dim);margin-top:3px}
.dash-rate{margin-left:auto;text-align:right}
.dash-rate .v{font-size:46px;font-weight:700;line-height:1;font-family:'Space Grotesk',sans-serif}
.dash-rate .lb{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--faint);text-transform:uppercase}
.legend{display:flex;gap:20px;margin-top:15px;flex-wrap:wrap}
.lg{display:flex;align-items:center;gap:8px}
.lg .d{width:9px;height:9px;border-radius:3px;flex-shrink:0}
.lg .n{font-weight:700;font-size:15px;font-family:'Space Grotesk',sans-serif}
.lg .t{font-size:13px;color:var(--dim)}
.metrics{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:22px}
.metric{background:var(--panel2);border-radius:11px;padding:14px 16px}
.metric .ml{font-size:12px;color:var(--dim);margin-bottom:5px}
.metric .mv{font-size:22px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.dash-tasks{margin-top:26px}
.dash-tasks .hd{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--faint);margin-bottom:12px;display:flex;align-items:center;text-transform:uppercase}
.dash-tasks .hd .cnt{margin-left:auto;font-weight:600;letter-spacing:0;color:var(--dim)}
.taskrow{display:grid;grid-template-columns:52px 1fr 180px 64px;gap:16px;align-items:center;padding:14px 16px;border-radius:12px;border:1px solid var(--line);background:var(--bg);margin-bottom:8px;cursor:pointer;transition:.12s;text-align:left;width:100%}
.taskrow:hover{border-color:var(--line2);box-shadow:0 1px 6px rgba(0,0,0,.04)}
.taskrow.fail{border-left:3px solid var(--fail);border-radius:0 12px 12px 0}
.taskrow .tid{font-size:13px;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.taskrow .ttitle{font-size:14px;font-weight:500;line-height:1.4;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;overflow:hidden}
.taskrow .tbar{display:flex;flex-direction:column;gap:5px}
.taskrow .tbar .meta{font-size:11px;color:var(--faint)}
.taskrow .tstat{font-size:13px;font-weight:700;text-align:right;font-family:'Space Grotesk',sans-serif}

/* ── TC View ── */
.tcview{padding-bottom:112px}
.tc-hdr{position:sticky;top:0;z-index:20;background:var(--canvas);border-bottom:1px solid var(--line);padding:18px 30px 16px}
.tc-hdr .top{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.backbtn{font-size:12px;color:var(--dim);background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:6px 12px;transition:.1s}
.backbtn:hover{color:var(--text);border-color:var(--faint)}
.tasklink{margin-left:auto;font-size:12px;color:var(--dim);text-decoration:none;border:1px solid var(--line2);border-radius:8px;padding:6px 12px;transition:.12s;background:var(--bg);cursor:pointer}
.tasklink:hover{color:var(--accent);border-color:var(--accent)}
.tc-hdr .title-row{display:flex;align-items:baseline;gap:10px;margin-bottom:13px}
.tc-hdr .title-row .tid{font-size:14px;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.tc-hdr .title-row h1{font-size:18px;font-weight:700;letter-spacing:-.01em}
.tc-legend{display:flex;gap:18px;align-items:center;margin-top:11px;flex-wrap:wrap}
.tc-legend .rate{margin-left:auto;display:flex;align-items:baseline;gap:6px}
.tc-legend .rate .v{font-size:28px;font-weight:700;font-family:'Space Grotesk',sans-serif}
.tc-legend .rate .lb{font-size:11px;font-weight:700;letter-spacing:1px;color:var(--faint);text-transform:uppercase}

.tc-body{padding:0 30px}
.note-box{background:var(--accent-soft);border:1px solid #d8e0fd;border-radius:11px;padding:11px 14px;font-size:13px;color:#3b50c4;line-height:1.65;margin:16px 0 4px}
.toolbar{display:flex;align-items:center;gap:8px;padding:16px 0 4px;flex-wrap:wrap}
.seg{display:flex;gap:4px;background:var(--bg);border:1px solid var(--line2);border-radius:9px;padding:3px}
.seg button{border:none;background:transparent;color:var(--dim);font-size:13px;font-weight:600;padding:5px 12px;border-radius:6px;transition:.1s}
.seg button.on{background:var(--accent-soft);color:var(--accent)}
.collapse-btn{margin-left:auto;font-size:12px;color:var(--dim);background:var(--bg);border:1px solid var(--line2);border-radius:8px;padding:7px 13px;transition:.1s}
.collapse-btn:hover{color:var(--text);border-color:var(--faint)}

.section{margin-top:22px}
.section-hd{display:flex;align-items:center;gap:10px;font-size:12px;font-weight:700;letter-spacing:.5px;color:var(--dim);padding-bottom:10px}
.section-hd .count{font-size:11px;color:var(--faint);font-weight:600;margin-left:auto}
.tc{background:var(--bg);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:0 11px 11px 0;margin-bottom:8px;overflow:hidden;transition:.12s}
.tc.s-pass{border-left-color:var(--pass)}
.tc.s-fail{border-left-color:var(--fail);background:#fff6f6}
.tc.s-skip{border-left-color:var(--skip)}
.tc.s-retest{border-left-color:#f59e0b;background:rgba(245,158,11,0.04)}
.tc-head{display:grid;grid-template-columns:1fr auto;gap:14px;align-items:flex-start;padding:13px 15px}
.tc-meta{min-width:0}
.tc-idline{display:flex;align-items:center;gap:9px;margin-bottom:6px}
.tc-id{font-size:12px;font-weight:600;color:var(--dim);font-family:'IBM Plex Mono',monospace}
.tc-statustag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:999px;display:none}
.tc.s-pass .tc-statustag.pass{display:inline;color:#15803d;background:var(--pass-soft)}
.tc.s-fail .tc-statustag.fail{display:inline;color:#b91c1c;background:var(--fail-soft)}
.tc.s-skip .tc-statustag.skip{display:inline;color:#a16207;background:var(--skip-soft)}
.tc.s-retest .tc-statustag.retest{display:inline;color:#b45309;background:rgba(245,158,11,0.15)}
.tc-name{font-size:14px;font-weight:500;line-height:1.45}
.tc-btns{display:flex;gap:4px;flex-shrink:0}
.tbtn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid var(--line2);background:var(--bg);color:var(--dim);transition:.1s}
.tbtn:hover{color:var(--text);border-color:var(--faint)}
.tbtn.ap{background:var(--pass-soft);border-color:#86efac;color:#15803d}
.tbtn.af{background:var(--fail-soft);border-color:#fca5a5;color:#b91c1c}
.tbtn.as{background:var(--skip-soft);border-color:#fde047;color:#a16207}
.tc-toggle{display:inline-flex;align-items:center;gap:5px;font-size:12px;color:var(--faint);background:transparent;border:none;padding:0 15px 12px;margin-top:-2px}
.tc-toggle:hover{color:var(--dim)}
.tc-detail{display:none;padding:2px 15px 15px;border-top:1px solid var(--line);margin-top:2px}
.tc-detail.open{display:block}
.dlabel{font-size:10px;font-weight:700;letter-spacing:1px;color:var(--faint);margin:12px 0 4px;text-transform:uppercase}
.dval{font-size:13px;color:var(--dim);line-height:1.6}
.dval.expected{color:var(--text)}
.actual-editor{margin-top:5px;min-height:54px;border:1px solid var(--line2);border-radius:9px;background:var(--panel);padding:10px 12px;font-size:13px;color:var(--text);line-height:1.6;outline:none;transition:.12s}
.actual-editor:focus{border-color:var(--accent);background:var(--bg)}
.actual-editor:empty:before{content:attr(data-placeholder);color:var(--faint)}
.actual-editor img{max-width:100%;border-radius:7px;display:block;margin:6px 0;cursor:zoom-in;border:1px solid var(--line2)}
.save-row{margin-top:8px}
.save-btn{font-size:12px;font-weight:600;color:var(--accent);background:var(--accent-soft);border:1px solid #d8e0fd;border-radius:7px;padding:6px 13px;transition:.1s}
.save-btn:hover{background:#e3e9fe}

/* ── Action bar ── */
.actionbar{position:fixed;left:272px;right:0;bottom:0;z-index:30;background:rgba(255,255,255,.92);backdrop-filter:blur(8px);border-top:1px solid var(--line);padding:12px 30px}
.standalone .sidebar{display:none!important}
.standalone .actionbar{left:0!important}
.standalone .backbtn{display:none!important}
.actionbar-inner{display:flex;align-items:center;gap:9px}
.abtn{font-size:13px;font-weight:600;padding:9px 16px;border-radius:9px;border:1px solid var(--line2);background:var(--bg);color:var(--dim);transition:.1s}
.abtn:hover{color:var(--text);border-color:var(--faint)}
.abtn.primary{background:var(--accent);color:#fff;border-color:var(--accent)}
.abtn.primary:hover{filter:brightness(1.06)}
.abtn.send{background:#1d4ed8;color:#fff;border-color:#1d4ed8}
.abtn.send:hover{filter:brightness(1.1)}
.ab-spacer{margin-left:auto;font-size:12px;color:var(--faint)}

/* ── Bug report ── */
.bug-out{display:none;margin-top:24px;padding-top:20px;border-top:1px solid var(--line)}
.bug-out.open{display:block}
.bug-title{font-size:14px;font-weight:700;margin-bottom:12px}
.bug-item{border:1px solid #fbcaca;background:#fff6f6;border-radius:11px;padding:13px 15px;margin-bottom:9px}
.bug-item-retest{border:1px solid rgba(245,158,11,0.4);background:rgba(245,158,11,0.06);border-radius:11px;padding:13px 15px;margin-bottom:9px}
.retest-badge{font-size:11px;background:rgba(245,158,11,0.15);color:#b45309;border-radius:999px;padding:2px 8px;margin-left:6px;font-weight:600}
.bug-retest-btn{font-size:12px;font-weight:600;padding:6px 12px;border-radius:7px;border:1px solid rgba(245,158,11,0.3);background:transparent;color:#b45309;cursor:pointer;margin-top:8px;font-family:inherit;transition:.1s}
.bug-retest-btn:hover{background:rgba(245,158,11,0.1)}
.bug-id{font-size:12px;font-weight:600;color:#b91c1c;margin-bottom:6px;letter-spacing:.3px;font-family:'IBM Plex Mono',monospace}
.bug-name{font-size:14px;font-weight:600;color:var(--text);margin-bottom:8px;line-height:1.45}
.bug-line{font-size:13px;color:var(--dim);line-height:1.7;margin-bottom:2px}
.bug-line b{color:var(--faint);font-weight:600}
.bug-actual{font-size:13px;color:var(--text);line-height:1.6;margin-top:3px;padding-left:14px;border-left:2px solid var(--line2)}
.bug-actual img{max-width:100%;border-radius:7px;display:block;margin:6px 0;cursor:zoom-in;border:1px solid var(--line2)}
.no-fail{font-size:14px;font-weight:600;color:#15803d;background:var(--pass-soft);border:1px solid #86efac;border-radius:11px;padding:14px 16px;display:flex;align-items:center;gap:9px}

/* ── Misc ── */
.lb-overlay{position:fixed;inset:0;z-index:9999;background:rgba(15,18,25,.8);display:flex;align-items:center;justify-content:center;cursor:zoom-out;padding:40px}
.lb-overlay img{max-width:92vw;max-height:90vh;border-radius:10px;cursor:default}
.lb-close{position:fixed;top:18px;right:18px;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:20px;width:38px;height:38px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center}
.lb-close:hover{background:rgba(255,255,255,.32)}
.toast{position:fixed;top:18px;right:18px;z-index:10000;background:var(--text);color:#fff;border-radius:9px;padding:9px 15px;font-size:13px;box-shadow:0 6px 20px rgba(0,0,0,.2);pointer-events:none}
.send-progress{position:fixed;bottom:90px;right:24px;z-index:9998;background:var(--bg);color:var(--text);border:1px solid var(--line2);border-radius:11px;padding:13px 17px;font-size:13px;min-width:230px;box-shadow:0 6px 22px rgba(0,0,0,.12);line-height:1.65}
.send-progress-title{font-weight:600;margin-bottom:6px}
.send-step{color:var(--dim);font-size:12px}
.send-step.done{color:#15803d}
.send-step.err{color:#b91c1c}
.loading-state{padding:32px;text-align:center;color:var(--faint);font-size:13px}
.add-tc-btn-idx{display:block;width:100%;padding:10px;border:1px dashed var(--line2);border-radius:8px;background:transparent;color:var(--faint);cursor:pointer;font-size:13px;margin-top:6px;transition:all .15s;font-family:inherit}
.add-tc-btn-idx:hover{border-color:var(--dim);color:var(--dim);background:var(--panel2)}
.tbtn.del{color:var(--fail);border-color:rgba(239,83,80,.2)}
.tbtn.del:hover{background:rgba(239,83,80,.1);border-color:rgba(239,83,80,.4)}

/* ── Overview (All Projects) ── */
.ov-wrap{padding:24px 30px}
.ov-hd{display:flex;align-items:center;gap:10px;margin-bottom:18px}
.ov-hd h2{font-size:18px;font-weight:700}
.ov-hd .sub{font-size:13px;color:var(--faint);margin-left:4px}
.ov-sum{background:var(--bg);border:1px solid var(--line);border-radius:16px;padding:20px 24px;margin-bottom:20px;display:flex;align-items:center;gap:32px;flex-wrap:wrap}
.ov-sum-stat{display:flex;flex-direction:column;gap:3px;min-width:70px}
.ov-sum-stat .sv{font-size:30px;font-weight:700;font-family:'Space Grotesk',sans-serif;line-height:1}
.ov-sum-stat .sl{font-size:10px;font-weight:700;letter-spacing:.8px;color:var(--faint);text-transform:uppercase;margin-top:3px}
.ov-sum-bar{flex:1;min-width:200px}
.ov-projects{display:flex;flex-direction:column;gap:10px}
.ov-proj-card{background:var(--bg);border:1px solid var(--line);border-radius:14px;overflow:hidden}
.ov-proj-hd{padding:13px 18px;display:flex;align-items:center;gap:10px;cursor:pointer;background:var(--panel);transition:background .1s;user-select:none}
.ov-proj-hd:hover{background:var(--panel2)}
.ov-proj-name{font-size:14px;font-weight:700;flex:1}
.ov-proj-meta{font-size:12px;color:var(--faint)}
.ov-expand-btn{font-size:13px;color:var(--faint);width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:5px;transition:transform .2s,color .1s;flex-shrink:0}
.ov-proj-hd:hover .ov-expand-btn{color:var(--dim)}
.ov-sprints{display:none;border-top:1px solid var(--line)}
.ov-sprints.open{display:block}
.ov-sprint-row{display:grid;grid-template-columns:100px 1fr 64px 90px;gap:14px;align-items:center;padding:12px 18px;border-bottom:1px solid var(--line);cursor:pointer;transition:.1s}
.ov-sprint-row:last-child{border-bottom:none}
.ov-sprint-row:hover{background:var(--canvas)}
.ov-sprint-name{font-size:13px;font-weight:600;color:var(--dim)}
.ov-sprint-barwrap{display:flex;flex-direction:column;gap:4px}

function project() { return PROJECTS.find(p => p.id === curProject) }
function sprint()  { return project().sprints.find(s => s.id === curSprint) }
function task(tid) { return sprint().tasks.find(t => t.id === tid) }

function getTaskData(key)      { try { return JSON.parse(localStorage.getItem(key) || '{}') } catch(e) { return {} } }
function setTaskData(key, data) {
  const val = JSON.stringify(data)
  try {
    localStorage.setItem(key, val)
  } catch(e) {
    if (e.name !== 'QuotaExceededError') { showToast('❌ บันทึกไม่ได้: ' + e.message); return }
    // Auto-cleanup: strip base64 images from all tasks to free space, then retry
    let freed = 0
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i)
      if (!k || !k.startsWith('qa_task_')) continue
      try {
        const d = JSON.parse(localStorage.getItem(k) || '{}')
        let changed = false
        Object.values(d).forEach(tc => {
          if (tc && tc.note && tc.note.includes('data:image')) {
            freed += tc.note.length
            tc.note = tc.note.replace(/src="data:[^"]+"/g, 'src=""')
            freed -= tc.note.length
            changed = true
          }
        })
        if (changed) localStorage.setItem(k, JSON.stringify(d))
      } catch(e2) {}
    }
    try {
      localStorage.setItem(key, val)
      if (freed > 0) showToast(`⚠ ล้างรูปเก่า ${Math.round(freed/1024)}KB เพื่อเพิ่มพื้นที่`)
    } catch(e3) {
      showToast('❌ พื้นที่เต็ม ไม่สามารถบันทึกได้')
      console.error('[save]', e3)
    }
  }
}

function getProgress(key) {
  const d = getTaskData(key)
  let pass=0, fail=0, skip=0, retest=0
  Object.values(d).forEach(v => { if(v.status==='pass') pass++; else if(v.status==='fail') fail++; else if(v.status==='skip') skip++; else if(v.status==='retest') retest++ })
  const total = Object.keys(d).length
  return { pass, fail, skip, retest, n: total-pass-fail-skip-retest, total }
}

function sprintTally() {
  const acc = {pass:0,fail:0,skip:0,n:0,total:0}
  sprint().tasks.forEach(t => { const c=getProgress(t.storageKey); acc.pass+=c.pass; acc.fail+=c.fail; acc.skip+=c.skip; acc.n+=c.n; acc.total+=c.total })
  return acc
}

function barHTML(c) {
  if (!c.total) return ''
  const seg = (v,col) => v>0 ? `<span style="width:${v/c.total*100}%;background:${col}"></span>` : ''
  return seg(c.pass,'var(--pass)') + seg(c.fail,'var(--fail)') + seg(c.retest,'#f59e0b') + seg(c.skip,'var(--skip)') + seg(c.n,'var(--pending)')
}

    { id: 'TC-002', name: 'ค้นหาพนักงาน Active ด้วยชื่อ', precondition: 'มีพนักงาน Active ในระบบ', steps: '1. เปิดฟอร์มปรับกะ\n2. พิมพ์ชื่อพนักงาน (บางส่วน) ในช่องค้นหา\n3. ตรวจสอบ dropdown', expected: 'แสดงรายชื่อพนักงานที่ตรงกับคำค้นใน dropdown' },
    { id: 'TC-003', name: 'ค้นหาพนักงานที่ไม่มีในระบบ', precondition: 'ระบบทำงานปกติ', steps: '1. พิมพ์รหัส/ชื่อที่ไม่มีในระบบ\n2. ตรวจสอบ dropdown', expected: 'ไม่แสดงผลใน dropdown หรือแสดงข้อความ \'ไม่พบพนักงาน\'' },
    { id: 'TC-004', name: 'เลือกวันที่แล้ว auto-fill กะปัจจุบัน', precondition: 'เลือกพนักงานแล้ว และพนักงานมีกะ assign ในวันที่เลือก', steps: '1. เลือกพนักงาน\n2. เลือกวันที่ที่มีกะ assign\n3. ตรวจสอบฟิลด์กะปัจจุบัน', expected: 'ฟิลด์กะปัจจุบัน auto-fill อัตโนมัติ แสดงชื่อกะ / เวลาเข้า-ออก' },
    { id: 'TC-005', name: 'ฟิลด์กะปัจจุบัน read-only — แก้ไขไม่ได้', precondition: 'กะปัจจุบัน auto-fill แล้ว', steps: '1. พยายามแก้ไขฟิลด์กะปัจจุบัน (คลิก/พิมพ์)\n2. ตรวจสอบว่าเปลี่ยนค่าได้หรือไม่', expected: 'ฟิลด์กะปัจจุบัน ไม่สามารถแก้ไขได้ (read-only)' },
    { id: 'TC-006', name: 'พนักงานมีหลายกะในวันเดียวกัน → dropdown เลือกกะที่จะปรับ', precondition: 'มีพนักงานที่มีกะมากกว่า 1 กะในวันที่เลือก (4.1.7 multi-shift)', steps: '1. เลือกพนักงานที่มีหลายกะ\n2. เลือกวันที่ที่มีหลายกะ\n3. ตรวจสอบฟิลด์ \'กะปัจจุบัน\'', expected: 'แสดง dropdown ให้เลือกกะที่ต้องการปรับ (ไม่ใช่ auto-fill กะเดียว)' }

  { name: 'ส่วนที่ 2 — เลือกกะใหม่และเหตุผล', tcs: [
    { id: 'TC-007', name: 'Dropdown กะใหม่แสดงเฉพาะกะที่ Active', precondition: 'มีกะทั้ง Active และ Inactive ในระบบ', steps: '1. เปิด dropdown กะใหม่\n2. ตรวจสอบรายการกะที่แสดง', expected: 'แสดงเฉพาะกะที่ Active เท่านั้น ไม่มีกะ Inactive ปรากฏ' },
    { id: 'TC-008', name: 'แต่ละตัวเลือกใน dropdown กะใหม่แสดงข้อมูลครบ', precondition: 'เปิด dropdown กะใหม่', steps: '1. เปิด dropdown กะใหม่\n2. ตรวจสอบข้อมูลที่แสดงในแต่ละตัวเลือก', expected: 'แต่ละตัวเลือกแสดง: ชื่อกะ / เวลาเข้า-ออก / รหัสกะ' },
    { id: 'TC-009', name: 'เลือกกะใหม่เหมือนกะเดิม → แสดง error', precondition: 'กะปัจจุบัน auto-fill แล้ว', steps: '1. เลือกกะใหม่เป็นกะเดียวกับกะปัจจุบัน\n2. กด \'บันทึกการปรับกะ\'\n3. ตรวจสอบ error message', expected: 'แสดง error \'กะที่เลือกเหมือนกะปัจจุบัน\' และไม่บันทึก' },

    { id: 'TC-011', name: 'เลือกเหตุผล \'อื่นๆ\' → ช่อง reason_other บังคับกรอก', precondition: 'เปิดฟอร์มปรับกะ', steps: '1. เลือกเหตุผล \'อื่นๆ\'\n2. ตรวจสอบว่ามีช่อง reason_other ปรากฏ\n3. ลองกด \'บันทึก\' โดยไม่กรอก reason_other', expected: 'ช่อง reason_other ปรากฏขึ้นและบังคับกรอก ถ้าไม่กรอก → บล็อคและแสดง error' },
    { id: 'TC-012', name: 'เลือกเหตุผลอื่น (ไม่ใช่ อื่นๆ) → ไม่บังคับกรอก reason_other', precondition: 'เปิดฟอร์มปรับกะ', steps: '1. เลือกเหตุผล เช่น \'ปรับโดย HR\'\n2. ตรวจสอบว่าช่อง reason_other ซ่อนอยู่หรือไม่บังคับ\n3. กด \'บันทึก\' โดยไม่กรอก reason_other', expected: 'ไม่มีช่อง reason_other หรือไม่บังคับกรอก — บันทึกได้ปกติ' },
    { id: 'TC-013', name: 'ฟิลด์หมายเหตุเป็น optional — บันทึกได้โดยไม่กรอก', precondition: 'กรอกข้อมูลที่จำเป็นครบแล้ว', steps: '1. ปล่อยช่องหมายเหตุว่าง\n2. กด \'บันทึกการปรับกะ\'', expected: 'บันทึกสำเร็จโดยไม่ต้องกรอกหมายเหตุ' }
  ]},
  { name: 'Validation — Required Fields', tcs: [

    { id: 'TC-016', name: 'กด \'บันทึก\' โดยไม่เลือกกะใหม่ → บล็อค', precondition: 'เลือกพนักงานและวันที่แล้ว', steps: '1. ไม่เลือกกะใหม่\n2. กด \'บันทึกการปรับกะ\'', expected: 'ระบบบล็อคการบันทึก แสดง error หรือ highlight ฟิลด์กะใหม่' },
    { id: 'TC-017', name: 'กด \'บันทึก\' โดยไม่เลือกเหตุผล → บล็อค', precondition: 'กรอกข้อมูลอื่นครบ แต่ยังไม่เลือกเหตุผล', steps: '1. ไม่เลือกเหตุผล\n2. กด \'บันทึกการปรับกะ\'', expected: 'ระบบบล็อคการบันทึก แสดง error หรือ highlight ฟิลด์เหตุผล' },
    { id: 'TC-018', name: 'เหตุผล = อื่นๆ แต่ไม่กรอก reason_other → บล็อค + error', precondition: 'เลือกเหตุผล \'อื่นๆ\'', steps: '1. เลือกเหตุผล \'อื่นๆ\'\n2. ปล่อยช่อง reason_other ว่าง\n3. กด \'บันทึกการปรับกะ\'', expected: 'ระบบบล็อคและแสดง error \'กรุณาระบุเหตุผลเพิ่มเติมเมื่อเลือกเหตุผล อื่นๆ\'' }
  ]},
  { name: 'Happy Path & Post-Save', tcs: [

    { id: 'TC-020', name: 'หลังบันทึก — กะของวันนั้นในระบบอัปเดตทันที', precondition: 'บันทึกการปรับกะสำเร็จแล้ว', steps: '1. หลังบันทึกสำเร็จ\n2. เปิดฟอร์มปรับกะอีกครั้งสำหรับพนักงานเดิมในวันเดิม\n3. ตรวจสอบ auto-fill กะปัจจุบัน', expected: 'กะปัจจุบัน auto-fill เป็นกะใหม่ที่เพิ่งปรับ (มีผลทันที)' },
    { id: 'TC-021', name: 'หลังบันทึก — ปฏิทินใน 4.1 อัปเดต Badge กะทันที', precondition: 'บันทึกการปรับกะสำเร็จแล้ว', steps: '1. ไปที่หน้าปฏิทิน 4.1 (Shift Calendar)\n2. ตรวจสอบ Badge กะในวันที่ปรับ', expected: 'Badge กะในปฏิทินแสดงเป็นกะใหม่ที่ปรับไปแล้ว' },
    { id: 'TC-022', name: 'หลังบันทึก — audit log บันทึกครบ', precondition: 'บันทึกการปรับกะสำเร็จแล้ว', steps: '1. เปิดหน้า audit log หรือตรวจสอบผ่าน API\n2. ตรวจสอบ record ล่าสุด', expected: 'Audit log บันทึกครบ: วันที่ปรับ, กะเดิม, กะใหม่, ผู้ปรับ, เหตุผล' }

    { id: 'TC-002', name: 'ไม่แสดง GPS อย่างเดียว / Scanner / WiFi ในฟอร์ม', precondition: 'เปิดหน้าเพิ่มสถานที่ทำงาน', steps: '1. เปิดฟอร์มเพิ่มสถานที่ทำงาน\n2. ตรวจสอบว่ามีตัวเลือก GPS only, Scanner, WiFi หรือไม่', expected: 'ไม่ปรากฏตัวเลือก GPS อย่างเดียว, Scanner, หรือ WiFi ในฟอร์ม' },
    { id: 'TC-003', name: 'ฟิลด์ที่แสดงในฟอร์มครบถ้วน', precondition: 'เปิดหน้าเพิ่มสถานที่ทำงาน', steps: '1. เปิดฟอร์มเพิ่มสถานที่ทำงาน\n2. ตรวจสอบฟิลด์ทั้งหมดที่แสดง', expected: 'มีฟิลด์: บริษัท*, ชื่อสถานที่*, ละติจูด*, ลองจิจูด*, ระยะรัศมี ครบทุกตัว' }

  { name: 'ส่วนที่ 2 — Validation ฟิลด์บังคับ', tcs: [

    { id: 'TC-005', name: 'ไม่กรอกชื่อสถานที่ → บันทึกไม่ได้', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน', steps: '1. กรอกข้อมูลครบทุกฟิลด์ยกเว้น ชื่อสถานที่\n2. กดบันทึก', expected: 'แสดง error ที่ฟิลด์ชื่อสถานที่ บันทึกไม่สำเร็จ' },
    { id: 'TC-006', name: 'ไม่กรอกละติจูด → บันทึกไม่ได้', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน', steps: '1. กรอกข้อมูลครบทุกฟิลด์ยกเว้น ละติจูด\n2. กดบันทึก', expected: 'แสดง error ที่ฟิลด์ละติจูด บันทึกไม่สำเร็จ' },
    { id: 'TC-007', name: 'ไม่กรอกลองจิจูด → บันทึกไม่ได้', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน', steps: '1. กรอกข้อมูลครบทุกฟิลด์ยกเว้น ลองจิจูด\n2. กดบันทึก', expected: 'แสดง error ที่ฟิลด์ลองจิจูด บันทึกไม่สำเร็จ' },
    { id: 'TC-008', name: 'ไม่กรอกระยะรัศมี → บันทึกไม่ได้', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน', steps: '1. กรอกข้อมูลครบทุกฟิลด์ยกเว้น ระยะรัศมี\n2. กดบันทึก', expected: 'แสดง error ที่ฟิลด์ระยะรัศมี บันทึกไม่สำเร็จ' },
    { id: 'TC-009', name: 'กรอกครบทุกฟิลด์ → บันทึกได้', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน', steps: '1. กรอกบริษัท, ชื่อสถานที่, ละติจูด, ลองจิจูด, ระยะรัศมี ครบทุกฟิลด์\n2. กดบันทึก', expected: 'บันทึกสำเร็จ ไม่มี error' }
  ]},
  { name: 'ส่วนที่ 3 — Validation ระยะรัศมี ≤ 500 เมตร', tcs: [
    { id: 'TC-010', name: 'ระยะรัศมี = 500 → บันทึกได้ (boundary)', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน กรอกข้อมูลครบ', steps: '1. กรอกระยะรัศมี = 500\n2. กดบันทึก', expected: 'บันทึกสำเร็จ ระยะ 500 เมตรเป็นค่าสูงสุดที่ยอมรับได้' },
    { id: 'TC-011', name: 'ระยะรัศมี = 501 → error (เกินกำหนด)', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน กรอกข้อมูลครบ', steps: '1. กรอกระยะรัศมี = 501\n2. กดบันทึก', expected: 'แสดง error ว่าระยะรัศมีต้องไม่เกิน 500 เมตร บันทึกไม่สำเร็จ' },
    { id: 'TC-012', name: 'ระยะรัศมี = 0 → error (ค่าไม่ถูกต้อง)', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน กรอกข้อมูลครบ', steps: '1. กรอกระยะรัศมี = 0\n2. กดบันทึก', expected: 'แสดง error ค่ารัศมีต้องมากกว่า 0 บันทึกไม่สำเร็จ' },
    { id: 'TC-013', name: 'ระยะรัศมี = ค่าลบ → error', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน กรอกข้อมูลครบ', steps: '1. กรอกระยะรัศมี = -1\n2. กดบันทึก', expected: 'แสดง error บันทึกไม่สำเร็จ' },
    { id: 'TC-014', name: 'ระยะรัศมี = ตัวอักษร → error', precondition: 'เปิดฟอร์มเพิ่มสถานที่ทำงาน กรอกข้อมูลครบ', steps: '1. กรอกระยะรัศมี = "abc"\n2. กดบันทึก', expected: 'แสดง error หรือไม่ยอมรับตัวอักษร บันทึกไม่สำเร็จ' }
  ]},
  { name: 'ส่วนที่ 4 — Post Save', tcs: [
    { id: 'TC-015', name: 'บันทึกแล้วปรากฏในรายการสถานที่ (5.1.1)', precondition: 'กรอกข้อมูลครบและกดบันทึกสำเร็จแล้ว', steps: '1. บันทึกสถานที่ใหม่สำเร็จ\n2. ไปที่หน้ารายการสถานที่ทำงาน (5.1.1)\n3. ค้นหาสถานที่ที่เพิ่งเพิ่ม', expected: 'สถานที่ใหม่ปรากฏในรายการ (5.1.1)' },
    { id: 'TC-016', name: 'ข้อมูลในรายการแสดงถูกต้องครบถ้วน', precondition: 'สถานที่ใหม่ปรากฏในรายการแล้ว', steps: '1. ดูรายการสถานที่ที่เพิ่งเพิ่ม\n2. ตรวจสอบข้อมูลที่แสดง', expected: 'แสดงชื่อสถานที่, บริษัท, ระยะรัศมีถูกต้องตรงกับที่กรอก' }
  ]}

  'HR/Sprint-6/task-433.html': [
  { name: 'ส่วนที่ 1 — ขอบเขต (Scope)', tcs: [
    { id: 'TC-001', name: 'บริษัท auto-fill จาก context และไม่สามารถแก้ไขได้', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. เปิดหน้า Publish ตารางกะ\n2. สังเกต field บริษัท\n3. พยายามแก้ไข field บริษัท', expected: 'บริษัท auto-fill จาก context อัตโนมัติ และเป็น read-only ไม่สามารถแก้ไขได้' },
    { id: 'TC-002', name: 'เลือก/ไม่เลือก สาขา (optional)', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. ทดสอบไม่เลือกสาขา → กด Preview\n2. ทดสอบเลือกสาขา → กด Preview', expected: 'สาขาเป็น optional — ไม่เลือกก็ Preview ได้, เลือกสาขาก็ filter scope ได้' },

    { id: 'TC-004', name: 'กรองเฉพาะพนักงาน (multi-select, optional)', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. กด field กรองเฉพาะพนักงาน\n2. เลือกพนักงานมากกว่า 1 คน\n3. กด Preview', expected: 'กรองพนักงานแบบ multi-select ได้ — Preview แสดงเฉพาะพนักงานที่เลือก' }

  { name: 'ส่วนที่ 2 — ช่วงเวลา (Date Range)', tcs: [
    { id: 'TC-005', name: 'ต้องเลือกช่วงวันที่ก่อน Publish หรือ Draft เสมอ (required)', precondition: 'เปิดหน้า Publish ตารางกะ ยังไม่ได้เลือกวันที่', steps: '1. ไม่เลือกช่วงวันที่\n2. กด \'Publish ตาราง\'\n3. ไม่เลือกช่วงวันที่\n4. กด \'บันทึก Draft\'', expected: 'ทั้ง Publish และ Draft ถูก block — แสดง validation ว่าต้องเลือกช่วงวันที่' },
    { id: 'TC-006', name: 'Preset \'สัปดาห์นี้\' → ช่วงวันที่ถูก set อัตโนมัติ', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. กดปุ่ม Preset \'สัปดาห์นี้\'\n2. สังเกต date range', expected: 'ช่วงวันที่ถูก set เป็นวันจันทร์–อาทิตย์ของสัปดาห์ปัจจุบัน' },
    { id: 'TC-007', name: 'Preset \'เดือนนี้\' → ช่วงวันที่ถูก set อัตโนมัติ', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. กดปุ่ม Preset \'เดือนนี้\'\n2. สังเกต date range', expected: 'ช่วงวันที่ถูก set เป็นวันที่ 1 ถึงวันสุดท้ายของเดือนปัจจุบัน' },
    { id: 'TC-008', name: 'Preset \'เดือนหน้า\' → ช่วงวันที่ถูก set อัตโนมัติ', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. กดปุ่ม Preset \'เดือนหน้า\'\n2. สังเกต date range', expected: 'ช่วงวันที่ถูก set เป็นวันที่ 1 ถึงวันสุดท้ายของเดือนถัดไป' },
    { id: 'TC-009', name: 'เลือกช่วงวันที่อดีต → warning แจ้ง (ไม่บล็อก)', precondition: 'เปิดหน้า Publish ตารางกะ', steps: '1. เลือกช่วงวันที่ที่มีบางส่วนอยู่ในอดีต\n2. สังเกต warning', expected: 'แสดง warning \'ช่วงวันที่ที่เลือกมีบางส่วนที่ผ่านมาแล้ว ต้องการ Publish ย้อนหลังหรือไม่?\' — ยังสามารถ Publish ต่อได้ (ไม่บล็อก)' }
  ]},
  { name: 'ส่วนที่ 3 — Preview', tcs: [
    { id: 'TC-010', name: 'กด \'ดู Preview\' → แสดงตารางกะ + สรุปจำนวน', precondition: 'เลือกช่วงวันที่แล้ว', steps: '1. เลือกช่วงวันที่\n2. กดปุ่ม \'ดู Preview\'\n3. สังเกตผลลัพธ์', expected: 'แสดงตารางกะ + จำนวนพนักงานทั้งหมด / มีกะครบ / ยังไม่มีกะ + รายชื่อพนักงาน' },
    { id: 'TC-011', name: 'พนักงานที่ยังไม่มีกะแสดง badge สีส้มใน Preview', precondition: 'มีพนักงานที่ยังไม่มีกะในช่วงที่เลือก', steps: '1. เลือกช่วงวันที่ที่มีพนักงานไม่มีกะ\n2. กด \'ดู Preview\'\n3. สังเกต badge พนักงานที่ไม่มีกะ', expected: 'พนักงานที่ยังไม่มีกะแสดง badge สีส้ม (has_shift: false) แยกออกจากพนักงานที่มีกะ' },
    { id: 'TC-012', name: 'Preview แสดงเฉพาะพนักงานของบริษัทตาม X-Company-ID (Data Isolation)', precondition: 'Login เป็น user บริษัท A', steps: '1. กด \'ดู Preview\'\n2. ตรวจสอบรายชื่อพนักงานใน Preview', expected: 'แสดงเฉพาะพนักงานของบริษัทที่ login อยู่ ไม่มีข้อมูลของบริษัทอื่น' },
    { id: 'TC-013', name: 'Preview filter scope ตามสาขา/แผนกที่เลือก', precondition: 'เลือกสาขาหรือแผนกใน scope', steps: '1. เลือกสาขา X\n2. กด \'ดู Preview\'\n3. ตรวจสอบรายชื่อพนักงาน', expected: 'แสดงเฉพาะพนักงานของสาขา/แผนกที่เลือก ไม่รวมพนักงานสาขาอื่น' }

  { name: 'ส่วนที่ 4 — แจ้งเตือน (Notification)', tcs: [

  { name: 'ส่วนที่ 5 — บันทึก Draft', tcs: [

    { id: 'TC-019', name: 'Draft ปรากฏในแท็บ \'สถานะการ Publish\' ทันที พร้อม badge Draft (สีเทา)', precondition: 'บันทึก Draft สำเร็จแล้ว', steps: '1. บันทึก Draft\n2. ไปที่แท็บ \'สถานะการ Publish\'\n3. สังเกต batch ที่เพิ่งสร้าง', expected: 'batch ปรากฏในแท็บ \'สถานะการ Publish\' ทันที พร้อม badge Draft (สีเทา) — status=DRAFT' },
    { id: 'TC-020', name: 'Draft ไม่ส่ง notification', precondition: 'Toggle ส่ง Notification เปิดอยู่', steps: '1. เปิด Toggle notification\n2. กด \'บันทึก Draft\'\n3. ตรวจสอบ notification บน Mobile App', expected: 'Draft ไม่ส่ง notification — Mobile App ไม่ได้รับแจ้งเตือน' },

async function loadSections(t) {
  function withExtra(sections) {
    try {
      const extra = JSON.parse(localStorage.getItem(t.storageKey + '_tcs') || '[]')
      if (extra.length) return [...sections, { name: 'Test Cases เพิ่มเติม (นอกเหนือ AC)', tcs: extra }]
    } catch(e) {}
    return sections
  }

  // fast-path: SECTIONS_DB (existing tasks)
  const db = SECTIONS_DB[t.file]
  if (db) return withExtra(db)

  // fetch task file and parse SECTIONS
  try {
    const res = await fetch(t.file)
    const html = await res.text()
    const match = html.match(/const SECTIONS\s*=\s*(\[[\s\S]*?\])/)
    if (match) {
      const sections = new Function('return ' + match[1])()
      return withExtra(sections)
    }
  } catch(e) {}

  // dynamic task: TCs stored in localStorage
  try {
    const tcs = JSON.parse(localStorage.getItem(t.storageKey + '_tcs') || '[]')
    if (tcs.length) return [{ name: '', tcs }]
  } catch(e) {}
  return []
}

// ── State ──
let curProject = PROJECTS[0].id
let curSprint  = PROJECTS[0].sprints[0].id
let currentView = 'home', activeTask = null
let currentSections = []
let tcFilter = 'all', allOpen = false

// ── Navigation ──
function go(view, tid) {
  currentView = view
  const ovEl   = document.getElementById('view-overview')
  const dashEl = document.getElementById('view-dash')
  const tcEl   = document.getElementById('view-tc')
  const homBtn = document.getElementById('home-btn')

  if (view === 'home') {
    ovEl.classList.remove('hide')
    dashEl.classList.add('hide')
    tcEl.classList.add('hide')
    homBtn.classList.add('on')
    activeTask = null; currentSections = []
    renderOverview()
  } else if (view === 'dash') {
    ovEl.classList.add('hide')
    dashEl.classList.remove('hide')
    tcEl.classList.add('hide')
    homBtn.classList.remove('on')
    activeTask = null; currentSections = []
    renderDash()
  } else {
    ovEl.classList.add('hide')
    dashEl.classList.add('hide')
    tcEl.classList.remove('hide')
    homBtn.classList.remove('on')
    renderTask(tid)
  }
  document.getElementById('main').scrollTop = 0
  renderSidebar()
}

// ── Selectors ──
function renderSelectors() {
  document.getElementById('sel-project').innerHTML = PROJECTS.map(p => `<option value="${p.id}" ${p.id===curProject?'selected':''}>${p.name}</option>`).join('')
  document.getElementById('sel-sprint').innerHTML = project().sprints.map(s => `<option value="${s.id}" ${s.id===curSprint?'selected':''}>${s.name}</option>`).join('')
}
function onProjectChange() { curProject=document.getElementById('sel-project').value; curSprint=project().sprints[0].id; renderSelectors(); go('dash') }
function onSprintChange()  { curSprint=document.getElementById('sel-sprint').value; go('dash') }

// ── Sidebar ──
function goToTask(pid, sid, tid) {
  curProject = pid; curSprint = sid
  document.getElementById('search').value = ''
  renderSelectors(); go('task', tid)
}

function renderSidebar() {
  const q = document.getElementById('search').value.toLowerCase().trim()

  if (q) {
    // Global search across all projects/sprints
    const results = []
    PROJECTS.forEach(proj => proj.sprints.forEach(spr => spr.tasks.forEach(t => {
      if ((`#${t.id} ${t.title}`).toLowerCase().includes(q))
        results.push({ proj, spr, t })
    })))
    document.getElementById('sb-sprintlabel').textContent = 'ผลการค้นหา'
    document.getElementById('sb-count').textContent = results.length
    document.getElementById('sb-list').innerHTML = results.length ? results.map(({ proj, spr, t }) => {
      const p = getProgress(t.storageKey)
      const sel = currentView==='task' && activeTask===t.id && curProject===proj.id && curSprint===spr.id
      const hasFail = p.fail > 0
      let badge = p.fail>0
        ? `<span class="sb-badge fail">${p.fail} Fail</span>`
        : p.total>0 ? `<span class="sb-badge pass">${p.pass===p.total?'Done':p.pass+'/'+p.total}</span>`
        : `<span class="sb-badge empty">—</span>`
      return `<div class="sb-item" style="flex-direction:column;align-items:stretch;gap:2px" onclick="goToTask('${proj.id}','${spr.id}','${t.id}')">
        <div style="display:flex;align-items:center;gap:6px">
          <span class="sid" style="flex:1">#${t.id}</span>
          ${badge}
          <a class="sb-open" href="index.html?p=${proj.id}&s=${spr.id}&standalone=1#task=${t.id}" target="_blank" rel="noopener" title="เปิด Testcase" onclick="event.stopPropagation()">↗</a>
        </div>
        <div class="sb-title">${t.title}</div>
        <div class="sb-item-meta">${proj.name} › ${spr.name}</div>
      </div>`
    }).join('') : '<div style="padding:12px 8px;font-size:13px;color:var(--faint)">ไม่พบ task ที่ตรงกัน</div>'
    return
  }

  // Normal mode — current sprint only
  document.getElementById('sb-sprintlabel').textContent = sprint().name.toUpperCase() + ' · TASKS'
  const filtered = sprint().tasks
  document.getElementById('sb-count').textContent = filtered.length
  document.getElementById('sb-list').innerHTML = filtered.map(t => {
    const p = getProgress(t.storageKey)
    const sel = currentView==='task' && activeTask===t.id
    const hasFail = p.fail > 0
    let badge = p.fail>0
      ? `<span class="sb-badge fail">${p.fail} Fail</span>`
      : p.total>0 ? `<span class="sb-badge pass">${p.pass===p.total?'Done':p.pass+'/'+p.total}</span>`
      : `<span class="sb-badge empty">—</span>`
    return `<div class="sb-item ${sel?'sel':''}" onclick="go('task','${t.id}')">
      <span class="sid" style="flex:1">#${t.id}</span>
      ${badge}
      <a class="sb-open" href="index.html?p=${curProject}&s=${curSprint}&standalone=1#task=${t.id}" target="_blank" rel="noopener" title="เปิด Testcase" onclick="event.stopPropagation()">↗</a>
    </div>`
  }).join('')
}

// ── Overview ──
function renderOverview() {
  const tot = { pass:0, fail:0, skip:0, n:0, total:0, tasks:0 }
  PROJECTS.forEach(p => p.sprints.forEach(s => s.tasks.forEach(t => {
    const c = getProgress(t.storageKey)
    tot.pass+=c.pass; tot.fail+=c.fail; tot.skip+=c.skip; tot.n+=c.n; tot.total+=c.total
    tot.tasks++
  })))

  const rate = tot.total ? Math.round(tot.pass/tot.total*100) : null
  const rv = document.getElementById('ov-rate')
  rv.textContent = rate !== null ? rate+'%' : '—'
  rv.style.color = rate===null?'var(--text)':rate>=80?'var(--pass)':tot.fail>0?'#d97706':'var(--text)'
  document.getElementById('ov-bar').innerHTML = barHTML(tot)
  document.getElementById('ov-legend').innerHTML = [['pass','Pass'],['fail','Fail'],['skip','Skip'],['n','Pending']].map(([k,l]) => {
    const col = {pass:'var(--pass)',fail:'var(--fail)',skip:'var(--skip)',n:'var(--pending)'}[k]
    return `<div class="lg"><span class="d" style="background:${col}"></span><span class="n num">${tot[k]}</span><span class="t">${l}</span></div>`
  }).join('')
  document.getElementById('ov-total').textContent = tot.total
  document.getElementById('ov-fail').textContent = tot.fail
  document.getElementById('ov-fail').style.color = tot.fail>0?'var(--fail)':'var(--faint)'
  document.getElementById('ov-tasks').textContent = tot.tasks
  document.getElementById('ov-projs').textContent = PROJECTS.length
  document.getElementById('ov-sub').textContent = PROJECTS.length+' projects · '+tot.tasks+' tasks'

  document.getElementById('ov-projects').innerHTML = PROJECTS.map(proj => {
    const projTot = { pass:0, fail:0, skip:0, n:0, total:0 }
    proj.sprints.forEach(s => s.tasks.forEach(t => {
      const c = getProgress(t.storageKey)
      projTot.pass+=c.pass; projTot.fail+=c.fail; projTot.skip+=c.skip; projTot.n+=c.n; projTot.total+=c.total
    }))
    const totalTasks = proj.sprints.reduce((a,s) => a+s.tasks.length, 0)
    const projRate = projTot.total ? Math.round(projTot.pass/projTot.total*100) : null

    const projBadge = projTot.fail>0
      ? `<span class="sb-badge fail">${projTot.fail} Fail</span>`
      : projRate!==null ? `<span class="sb-badge pass">${projRate}%</span>` : ''

    const sprintsHtml = proj.sprints.map(spr => {
      const sprTot = { pass:0, fail:0, skip:0, n:0, total:0 }
      spr.tasks.forEach(t => {
        const c = getProgress(t.storageKey)
        sprTot.pass+=c.pass; sprTot.fail+=c.fail; sprTot.skip+=c.skip; sprTot.n+=c.n; sprTot.total+=c.total
      })
      const sprRate = sprTot.total ? Math.round(sprTot.pass/sprTot.total*100) : null
      const rateCol = sprTot.fail>0?'var(--fail)':sprRate>=80?'var(--pass)':'var(--text)'

      const chips = spr.tasks.map(t => {
        const tc = getProgress(t.storageKey)
        let cls = ''
        if (tc.total===0)          cls = ''
        else if (tc.fail>0)        cls = 'chip-fail'
        else if (tc.pass===tc.total) cls = 'chip-pass'
        else if (tc.n>0)           cls = 'chip-wip'
        else if (tc.skip>0)        cls = 'chip-skip'
        return `<span class="ov-chip ${cls}" onclick="goToTask('${proj.id}','${spr.id}','${t.id}');event.stopPropagation()" title="${t.title}">#${t.id}</span>`
      }).join('')

      return `<div class="ov-sprint-row" onclick="curProject='${proj.id}';curSprint='${spr.id}';renderSelectors();go('dash')">
        <div class="ov-sprint-name">${spr.name}</div>
        <div class="ov-sprint-barwrap">
          <div class="bar" style="height:7px">${barHTML(sprTot)||'<span style="width:100%;background:var(--line2)"></span>'}</div>
          <div class="ov-sprint-mini">
            <span class="ov-mini-stat"><span class="dot" style="background:var(--pass)"></span>${sprTot.pass} pass</span>
            <span class="ov-mini-stat"><span class="dot" style="background:var(--fail)"></span>${sprTot.fail} fail</span>
            <span class="ov-mini-stat"><span class="dot" style="background:var(--pending)"></span>${sprTot.n} pending</span>
            <span class="ov-mini-stat" style="color:var(--faint)">${spr.tasks.length} tasks</span>
          </div>
        </div>
        <div class="ov-sprint-rate" style="color:${rateCol}">${sprRate!==null?sprRate+'%':'—'}</div>
        <button class="ov-sprint-btn">ดู Sprint →</button>
      </div>`
    }).join('')

    return `<div class="ov-proj-card">
      <div class="ov-proj-hd" onclick="toggleOvProject(this)">
        <div class="ov-proj-name">${proj.name}</div>
        <div class="ov-proj-meta">${proj.sprints.length} sprint${proj.sprints.length>1?'s':''} · ${totalTasks} tasks · ${projTot.total} TC</div>
        ${projBadge}
        <div class="ov-expand-btn">▸</div>
      </div>
      <div class="ov-sprints">${sprintsHtml}</div>
    </div>`
  }).join('')

  renderSidebar()
}

function toggleOvProject(hd) {
  const body = hd.nextElementSibling
  const btn  = hd.querySelector('.ov-expand-btn')
  const open = body.classList.toggle('open')
  btn.textContent = open ? '▾' : '▸'
  btn.style.color = open ? 'var(--accent)' : ''
}

      <span class="tid mono">#${t.id}</span>
      <span class="ttitle">${t.title}</span>
      <span class="tbar"><span class="bar" style="height:6px">${barHTML(tc)}</span><span class="meta">${tc.pass}/${tc.total} passed${tc.n?' · '+tc.n+' pending':''}</span></span>
      <span class="tstat" style="color:${tc.fail>0?'var(--fail)':'var(--pass)'}">${tc.fail>0?tc.fail+' Fail':r+'%'}</span>
    </button>`
  }).join('')
  renderSelectors(); renderSidebar()
}

// ── TC View ──

  activeTask = tid
  const t = task(tid)

  document.getElementById('tc-title').textContent = t.title
  document.getElementById('tc-link').href = boardUrl(t.id, t)
  const note = document.getElementById('tc-note')
  note.classList.add('hide')
  tcFilter = 'all'; allOpen = false
  document.querySelectorAll('#tc-filter button').forEach(x => x.classList.toggle('on', x.dataset.f==='all'))
  document.getElementById('toggle-all').textContent = 'Expand all'
  document.getElementById('bug-out').classList.remove('open')
  document.getElementById('export-btn').style.display = 'none'

        <div style="font-size:32px;opacity:.2">📋</div>
        <div style="color:var(--dim);font-size:13px">ยังไม่มี Test Case</div>
        <button onclick="addTcDynamic()" style="font-size:13px;padding:7px 20px;border-radius:999px;background:var(--panel2);color:var(--dim);border:1px solid var(--line2);cursor:pointer;font-family:inherit">+ เพิ่ม Test Case</button>
      </div>`
    return
  }

  document.getElementById('tc-list').innerHTML = sections.map((sec, si) =>
    `<div class="section" id="sec-${si}">
      ${sec.name ? `<div class="section-hd">${sec.name}<span class="count num">${sec.tcs.length} TC</span></div>` : ''}
      ${sec.tcs.map(tc => `
        <div class="tc" id="row-${tc.id}">
          <div class="tc-head">
            <div class="tc-meta">
              <div class="tc-idline">
                <span class="tc-id mono">${tc.id}</span>
                <span class="tc-statustag pass">Pass</span>
                <span class="tc-statustag fail">Fail</span>
                <span class="tc-statustag skip">Skip</span>
                <span class="tc-statustag retest">Retest</span>
              </div>
              <div class="tc-name">${tc.name}</div>
            </div>
            <div class="tc-btns">
              <button class="tbtn" id="p-${tc.id}" onclick="setStatus('${tc.id}','pass')">Pass</button>
              <button class="tbtn" id="f-${tc.id}" onclick="setStatus('${tc.id}','fail')">Fail</button>
              <button class="tbtn" id="s-${tc.id}" onclick="setStatus('${tc.id}','skip')">Skip</button>
              ${(isDynamic || tc.id.startsWith('EX-')) ? `<button class="tbtn del" onclick="deleteTcDynamic('${tc.id}')" title="ลบ TC นี้">✕</button>` : ''}
            </div>
          </div>
          <button class="tc-toggle" onclick="toggleDetail('${tc.id}',this)">▸ ดูรายละเอียด</button>

            <div class="save-row"><button class="save-btn" onclick="saveActual('${tc.id}')">บันทึก Actual</button></div>
          </div>
        </div>`
      ).join('')}
    </div>`
  ).join('') + `<button class="add-tc-btn-idx" onclick="addTcDynamic()">+ เพิ่ม Test Case</button>`

  sections.forEach(sec => sec.tcs.forEach(tc => setupEditor(tc.id)))
  applyTaskStateToUI(); updateTaskStats(); applyTcFilter()
  renderSelectors(); renderSidebar()
}

function addTcDynamic() {
  const t = task(activeTask)
  const tcsKey = t.storageKey + '_tcs'
  let tcs = []
  try { tcs = JSON.parse(localStorage.getItem(tcsKey) || '[]') } catch(e) {}
  const isStatic = !!SECTIONS_DB[t.file]
  const prefix = isStatic ? 'EX-' : 'TC-'
  const nums = tcs.map(tc => parseInt(tc.id.replace(prefix,''), 10)).filter(n => !isNaN(n))
  const next = nums.length ? Math.max(...nums) + 1 : 1
  const id = prefix + String(next).padStart(3, '0')
  tcs.push({ id, name: id, precondition: '', steps: '', expected: '' })
  localStorage.setItem(tcsKey, JSON.stringify(tcs))
  renderTask(activeTask)
}

function deleteTcDynamic(tcId) {
  if (!confirm('ลบ ' + tcId + '?')) return
  const t = task(activeTask)
  const tcsKey = t.storageKey + '_tcs'
  let tcs = []
  try { tcs = JSON.parse(localStorage.getItem(tcsKey) || '[]') } catch(e) {}
  tcs = tcs.filter(tc => tc.id !== tcId)
  localStorage.setItem(tcsKey, JSON.stringify(tcs))
  const data = getTaskData(t.storageKey)
  delete data[tcId]
  setTaskData(t.storageKey, data)
  renderTask(activeTask)
}

function applyTaskStateToUI() {
  const data = getTaskData(task(activeTask).storageKey)
  allTcIds().forEach(id => {
    const s = data[id]
    if (!s) return
    if (s.status) {
      const row = document.getElementById('row-' + id)
      if (row) row.className = 'tc s-' + s.status
      const map = {pass:'p',fail:'f',skip:'s'}
      Object.entries(map).forEach(([st,k]) => {
        const b = document.getElementById(k+'-'+id)
        if (b) b.className = 'tbtn' + (s.status===st ? ' a'+k : '')
      })
    }
    if (s.note) {
      const ed = document.getElementById('actual-'+id)
      if (ed) {
        const _imgStyle = 'max-width:100%;border-radius:7px;display:block;margin:6px 0;cursor:zoom-in;border:1px solid var(--line2)'
        let _html = s.note
        _html = _html.replace(/\[รูป\]\s*(https?:\/\/[^\s<"'\n]+)/g, `<img src="$1" style="${_imgStyle}" onclick="openLightbox(this.src)">`)
        _html = _html.replace(/(?<!['"=>])(https?:\/\/i\.ibb\.co\/[^\s<"'\n]+)/g, `<img src="$1" style="${_imgStyle}" onclick="openLightbox(this.src)">`)
        ed.innerHTML = _html
      }
    }
  })
}

function updateTaskStats() {
  const c = getProgress(task(activeTask).storageKey)
  document.getElementById('tc-bar').innerHTML = barHTML(c)
  const rate = c.total ? Math.round(c.pass/c.total*100) : 0
  const col = rate>=80?'var(--pass)':(c.fail>0?'#d97706':'var(--text)')
  document.getElementById('tc-legend').innerHTML =
    [['pass','var(--pass)','Pass'],['fail','var(--fail)','Fail'],['retest','#f59e0b','Retest'],['skip','var(--skip)','Skip'],['n','var(--pending)','Pending']].map(([k,clr,l]) =>
      (k==='retest' && !c.retest) ? '' :
      `<div class="lg"><span class="d" style="background:${clr}"></span><span class="n num">${c[k]}</span><span class="t">${l}</span></div>`
    ).join('') +
    `<div class="lg" style="margin-left:8px;border-left:1px solid var(--line2);padding-left:12px"><span class="n num" style="color:var(--dim)">${c.total}</span><span class="t">Total TC</span></div>` +
    `<div class="rate"><span class="v" style="color:${col}">${rate}<span style="font-size:.6em;color:var(--faint)">%</span></span><span class="lb">Pass Rate</span></div>`
  document.getElementById('ab-summary').textContent = `${c.pass}/${c.total} passed · ${c.fail} fail`
}

function setStatus(tcId, st) {
  const key = task(activeTask).storageKey
  const data = getTaskData(key)
  if (!data[tcId]) data[tcId] = {status:null,note:''}
  data[tcId].status = data[tcId].status===st ? null : st
  setTaskData(key, data)
  const row = document.getElementById('row-'+tcId)
  if (row) row.className = 'tc' + (data[tcId].status ? ' s-'+data[tcId].status : '')
  const map = {pass:'p',fail:'f',skip:'s'}
  Object.entries(map).forEach(([full,k]) => {
    const b = document.getElementById(k+'-'+tcId)
    if (b) b.className = 'tbtn' + (data[tcId].status===full ? ' a'+k : '')
  })
  updateTaskStats(); applyTcFilter(); renderSidebar()
}

function toggleDetail(id, el) {
  const open = document.getElementById('detail-'+id).classList.toggle('open')
  el.innerHTML = open ? '▾ Hide details' : '▸ ดูรายละเอียด'
}

function setupEditor(id) {
  const ed = document.getElementById('actual-'+id)
  if (!ed) return
  ed.addEventListener('paste', e => {
    const it = Array.from(e.clipboardData?.items||[]).find(i => i.type.startsWith('image/'))
    if (!it) return
    e.preventDefault()
    const r = new FileReader()
    r.onload = ev => {
      const img = document.createElement('img'); img.src = ev.target.result
      img.onclick = () => openLightbox(img.src)
      insertAtCursor(img); showToast('วางรูปแล้ว')
    }
    r.readAsDataURL(it.getAsFile())
  })
  ed.addEventListener('dragover', e => e.preventDefault())
  ed.addEventListener('drop', e => {
    e.preventDefault()
    const _ins = src => { const _a = s => { const img = document.createElement('img'); img.src = s; img.onclick = () => openLightbox(img.src); ed.appendChild(img); showToast('วางรูปแล้ว') }; if (!src.startsWith('data:') || src.startsWith('data:image/gif')) { _a(src); return }; const tmp = new Image(); tmp.onload = () => { const MAX = 600, cv = document.createElement('canvas'); let w = tmp.width, h = tmp.height; if (w > MAX) { h = Math.round(h * MAX / w); w = MAX } if (h > MAX) { w = Math.round(w * MAX / h); h = MAX } cv.width = w; cv.height = h; cv.getContext('2d').drawImage(tmp, 0, 0, w, h); _a(cv.toDataURL('image/jpeg', 0.4)) }; tmp.src = src }
    const f = Array.from(e.dataTransfer.files).find(x => x.type.startsWith('image/'))
    if (f) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(f); return }
    const item = Array.from(e.dataTransfer.items||[]).find(i => i.kind==='file' && i.type.startsWith('image/'))
    if (item) { const r = new FileReader(); r.onload = ev => _ins(ev.target.result); r.readAsDataURL(item.getAsFile()); return }
    const html = e.dataTransfer.getData('text/html')
    if (html) { const tmp = document.createElement('div'); tmp.innerHTML = html; const s = tmp.querySelector('img')?.src; if (s) { _ins(s); return } }
    const uri = (e.dataTransfer.getData('text/uri-list')||'').split('\n')[0].trim()
    if (uri && /\.(png|jpe?g|gif|webp|svg)/i.test(uri)) _ins(uri)
  })
}

function insertAtCursor(node) {
  const sel = window.getSelection()
  if (!sel||!sel.rangeCount) return
  const r = sel.getRangeAt(0); r.deleteContents(); r.insertNode(node)
  r.setStartAfter(node); r.collapse(true); sel.removeAllRanges(); sel.addRange(r)
}

function saveActual(id) {
  const key = task(activeTask).storageKey
  const data = getTaskData(key)
  if (!data[id]) data[id] = {status:null,note:''}
  const ed = document.getElementById('actual-'+id)
  data[id].note = ed ? ed.innerHTML : ''
  setTaskData(key, data)
  showToast('บันทึกแล้ว')
}

function applyTcFilter() {
  currentSections.forEach((sec, si) => {
    const data = getTaskData(task(activeTask).storageKey)
    let shown = 0
    sec.tcs.forEach(tc => {
      const row = document.getElementById('row-'+tc.id)
      const s = data[tc.id]?.status
      let vis = true
      if (tcFilter==='fail') vis = s==='fail'
      else if (tcFilter==='pending') vis = !s
      if (row) row.style.display = vis ? '' : 'none'
      if (vis) shown++
    })
    const el = document.getElementById('sec-'+si)
    if (el) el.style.display = shown ? '' : 'none'
  })
}

function resetTask() {
  if (!confirm('รีเซ็ตผลทดสอบของ task นี้?')) return
  const key = task(activeTask).storageKey
  const data = {}
  allTcIds().forEach(id => data[id] = {status:null,note:''})
  setTaskData(key, data)
  allTcIds().forEach(id => {
    const row = document.getElementById('row-'+id)
    if (row) row.className = 'tc'
    const map = {pass:'p',fail:'f',skip:'s'}
    Object.values(map).forEach(k => { const b=document.getElementById(k+'-'+id); if(b) b.className='tbtn' })
    const ed = document.getElementById('actual-'+id)
    if (ed) ed.innerHTML = ''
  })
  updateTaskStats(); applyTcFilter()
  document.getElementById('bug-out').classList.remove('open')
  document.getElementById('export-btn').style.display = 'none'
  document.getElementById('send-btn').style.display = 'none'
  renderSidebar()
}

function markRetest(id) {
  const key = task(activeTask).storageKey
  const data = getTaskData(key)
  if (!data[id]) data[id] = {status:null,note:''}
  data[id].status = 'retest'
  setTaskData(key, data)
  const row = document.getElementById('row-'+id)
  if (row) row.className = 'tc s-retest'
  ;['p','f','s'].forEach(k => { const b = document.getElementById(k+'-'+id); if(b) b.className='tbtn' })
  updateTaskStats(); applyTcFilter(); renderSidebar(); showBugReport()
}

function unmarkRetest(id) {
  const key = task(activeTask).storageKey
  const data = getTaskData(key)
  if (!data[id]) data[id] = {status:null,note:''}
  data[id].status = 'fail'
  setTaskData(key, data)
  const row = document.getElementById('row-'+id)
  if (row) row.className = 'tc s-fail'
  const fb = document.getElementById('f-'+id); if(fb) fb.className='tbtn af'
  updateTaskStats(); applyTcFilter(); renderSidebar(); showBugReport()
}

function retestPass(id) {
  const key = task(activeTask).storageKey
  const data = getTaskData(key)
  if (!data[id]) data[id] = {status:null,note:''}
  data[id].status = 'pass'
  setTaskData(key, data)
  const row = document.getElementById('row-'+id)
  if (row) row.className = 'tc s-pass'
  const pb = document.getElementById('p-'+id); if(pb) pb.className='tbtn ap'
  ;['f','s'].forEach(k => { const b = document.getElementById(k+'-'+id); if(b) b.className='tbtn' })
  updateTaskStats(); applyTcFilter(); renderSidebar(); showBugReport()
}

function showBugReport() {
  const t = task(activeTask)
  const data = getTaskData(t.storageKey)
  const fails = []; let num = 1
  const retests = []
  currentSections.forEach(sec => sec.tcs.forEach(tc => {
    if (data[tc.id]?.status==='fail') {
      const ed = document.getElementById('actual-'+tc.id)
      fails.push({...tc, section:sec.name, actualHtml:ed?ed.innerHTML.trim():'', num:num++})
    } else if (data[tc.id]?.status==='retest') {
      retests.push({...tc, section:sec.name})
    }
  }))
  const out=document.getElementById('bug-out'), list=document.getElementById('bug-list'), title=document.getElementById('bug-title')
  out.classList.add('open')
  document.getElementById('export-btn').style.display = fails.length ? 'inline-block' : 'none'
  document.getElementById('send-btn').style.display   = fails.length ? 'inline-block' : 'none'
  if (!fails.length && !retests.length) {
    title.textContent=''; list.innerHTML='<div class="no-fail"><span style="width:9px;height:9px;border-radius:3px;background:var(--pass);display:inline-block"></span>ไม่มี Test Case ที่ Fail — ผ่านทั้งหมด</div>'
    out.scrollIntoView({behavior:'smooth',block:'start'}); return
  }
  const parts = []
  if (fails.length) parts.push(fails.length + ' รายการที่ Fail')
  if (retests.length) parts.push(retests.length + ' รายการรอ Retest')
  title.textContent = 'พบ ' + parts.join(' · ')
  const failsHtml = fails.map(f => `<div class="bug-item">
    <div class="bug-id">BUG-${String(f.num).padStart(3,'0')} · ${f.id}</div>
    <div class="bug-name">${f.name}</div>
    ${f.precondition?`<div class="bug-line"><b>Precondition:</b> ${f.precondition}</div>`:''}
    <div class="bug-line"><b>Steps:</b> ${f.steps.replace(/\n/g,'<br>&nbsp;&nbsp;&nbsp;')}</div>
    <div class="bug-line"><b>Expected:</b> ${f.expected}</div>
    <div class="bug-line"><b>Actual result:</b></div>
    <div class="bug-actual">${f.actualHtml||'<span style="color:var(--faint)">ยังไม่ได้ระบุ</span>'}</div>
    <button class="bug-retest-btn" onclick="markRetest('${f.id}')">🔁 Dev แก้แล้ว — Mark Retest</button>
  </div>`).join('')
  const retestsHtml = retests.length ? `
    <div class="bug-title" style="margin-top:16px;color:#b45309">รอ Retest (${retests.length})</div>
    ${retests.map(f => `<div class="bug-item-retest">
      <div class="bug-id" style="color:#b45309">${f.id}<span class="retest-badge">⏳ รอ Retest</span></div>
      <div class="bug-name">${f.name}</div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:8px">
        <button class="bug-retest-btn" style="color:#15803d;border-color:rgba(82,168,105,0.4)" onclick="retestPass('${f.id}')">✅ Retest ผ่าน</button>
        <button class="bug-retest-btn" style="color:#b91c1c;border-color:rgba(239,83,80,0.3)" onclick="unmarkRetest('${f.id}')">❌ Retest ไม่ผ่าน</button>
      </div>
    </div>`).join('')}
  ` : ''
  list.innerHTML = failsHtml + retestsHtml
  out.scrollIntoView({behavior:'smooth',block:'start'})
}

function buildPayload() {
  const t = task(activeTask)
  const data = getTaskData(t.storageKey)
  const fails = []
  currentSections.forEach(sec => sec.tcs.forEach(tc => {
    if (data[tc.id]?.status==='fail') {
      const ed = document.getElementById('actual-'+tc.id)
      const images = []; if (ed) ed.querySelectorAll('img').forEach(i => images.push(i.src))
      fails.push({tc_id:tc.id,name:tc.name,section:sec.name,precondition:tc.precondition||'',steps:tc.steps,expected:tc.expected,actual:ed?ed.innerText.trim():'ยังไม่ได้ระบุ',images})
    }
  }))
  if (!fails.length) { showToast('ไม่มี Fail ที่จะส่ง'); return null }
  const c = getProgress(t.storageKey)
  return {task_url:boardUrl(t.id,t),task_number:t.id,task_name:t.title,project:project().name,sprint:sprint().name,total_pass:c.pass,total_fail:fails.length,total_skip:c.skip,total_tc:c.total,bugs:fails}
}

function exportBugJSON() {
  const p = buildPayload(); if (!p) return
  const blob = new Blob([JSON.stringify(p,null,2)],{type:'application/json'})
  const a = document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='bug-report-'+p.task_number+'.json'; a.click()
  showToast('ดาวน์โหลด bug-report-'+p.task_number+'.json แล้ว')
}

let progressEl = null
function showSending() {
  if (progressEl) progressEl.remove()
  progressEl = document.createElement('div'); progressEl.className='send-progress'
  progressEl.innerHTML='<div class="send-progress-title">กำลังส่ง Bug Report...</div><div class="send-step" id="sp-0">→ ส่งไป proxy...</div>'
  document.body.appendChild(progressEl)
}
function showSendDone(m) { if(!progressEl)return; const s=progressEl.querySelector('#sp-0'); s.className='send-step done'; s.textContent='✓ '+m; setTimeout(()=>{progressEl?.remove();progressEl=null},3000) }
function showSendErr(m)  { if(!progressEl)return; const s=progressEl.querySelector('#sp-0'); s.className='send-step err';  s.textContent='✗ '+m; setTimeout(()=>{progressEl?.remove();progressEl=null},5000) }

async function sendToBoard() {
  const p = buildPayload(); if (!p) return
  showSending()
  try {
    const r = await fetch(`${PROXY_URL}/send`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(p)})
    const d = await r.json()
    if (d.ok) { showSendDone(`ส่ง ${p.total_fail} bugs สำเร็จ!`); showToast(`ส่ง ${p.total_fail} bugs เข้า Task #${p.task_number} แล้ว`) }
    else       { showSendErr(d.error||'ส่งไม่สำเร็จ'); showToast(d.error||'ส่งไม่สำเร็จ') }
  } catch(e) { showSendErr('เปิด proxy ก่อน'); showToast('ไม่พบ proxy — รัน: python proxy.py'); console.error(e) }
}

function openLightbox(src) {
  const o=document.createElement('div'); o.className='lb-overlay'
  const img=document.createElement('img'); img.src=src
  const c=document.createElement('button'); c.className='lb-close'; c.textContent='✕'
  o.appendChild(img); o.appendChild(c); document.body.appendChild(o)
  const rm=()=>o.remove()
  c.onclick=e=>{e.stopPropagation();rm()}; o.onclick=rm; img.onclick=e=>e.stopPropagation()
  document.addEventListener('keydown',function esc(e){if(e.key==='Escape'){rm();document.removeEventListener('keydown',esc)}})
}
document.getElementById('bug-list').addEventListener('click',e=>{if(e.target.tagName==='IMG')openLightbox(e.target.src)})

function showToast(m) {
  const t=document.createElement('div'); t.className='toast'; t.textContent=m
  document.body.appendChild(t); setTimeout(()=>t.remove(),2200)
}

  allOpen = !allOpen
  document.querySelectorAll('.tc-detail').forEach(d => d.classList.toggle('open', allOpen))
  document.querySelectorAll('.tc-toggle').forEach(t => t.innerHTML = allOpen ? '▾ Hide details' : '▸ ดูรายละเอียด')
  e.target.textContent = allOpen ? 'Collapse all' : 'Expand all'
})

// ── Init ──
;(async function() {
  if (window.AUTH) await window.AUTH.waitForAuth()
  if (window.FS) await window.FS.pullAll()
  const params = new URLSearchParams(location.search)
  const hashStr = location.hash.slice(1)               // e.g. "task=403"
  const hashTask = hashStr.startsWith('task=') ? hashStr.replace('task=','') : hashStr

  // standalone mode
  if (params.get('standalone') === '1') {
    document.querySelector('.app').classList.add('standalone')
  }

  // set project / sprint from URL params
  const pParam = params.get('p'), sParam = params.get('s')
  if (pParam) {
    const proj = PROJECTS.find(p => p.id === pParam)
    if (proj) {
      curProject = proj.id
      const spr = sParam ? proj.sprints.find(s => s.id === sParam) : proj.sprints[0]
      if (spr) curSprint = spr.id
    }
  }

  renderSelectors()

  // navigate to task from hash
  if (hashTask) {
    const found = sprint().tasks.find(t => t.id === hashTask)
    if (found) { go('task', found.id); return }
  }
  go('home')
})()

// Prevent browser from navigating when files are dropped outside an editor
document.addEventListener('dragover', e => e.preventDefault())
document.addEventListener('drop', e => e.preventDefault())
</script>
