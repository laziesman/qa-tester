<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="lib/firebase-sync.js"></script>
<script src="lib/firebase-auth.js"></script><script src="lib/firebase-storage.js"></script>
<title>QA Tester — Dashboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="lib/dashboard.css">
</head>
<body>
<div class="app">
  <!-- Sidebar -->
  <aside class="sidebar">
    <div class="sb-brand">
      <span class="dot"></span>
      <span class="name">QA Tester</span>
    </div>
    <div class="sb-search"><div class="wrap"><input id="search" placeholder="ค้นหา task..." oninput="renderSidebar()"><span class="si">⌕</span></div></div>
    <button class="sb-home on" id="home-btn" onclick="go('home')">Dashboard</button>
    <div class="selectors">
      <div class="sel-field"><label>PROJECT</label><select id="sel-project" onchange="onProjectChange()"></select><span class="chev">▾</span></div>
      <div class="sel-field"><label>SPRINT</label><select id="sel-sprint" onchange="onSprintChange()"></select><span class="chev">▾</span></div>
    </div>
    <div class="sb-secthd"><span id="sb-sprintlabel">TASKS</span><span class="c" id="sb-count"></span></div>
    <div class="sb-list" id="sb-list"></div>
  </aside>

  <main class="main" id="main">
    <!-- Overview (All Projects) -->
    <section id="view-overview" class="hide">
      <div class="ov-wrap">
        <div class="ov-hd">
          <h2>Overview</h2>
          <span class="sub" id="ov-sub">ทุกโปรเจค</span>
        </div>
        <div class="ov-sum">
          <div class="ov-sum-stat"><div class="sv num" id="ov-rate">—</div><div class="sl">Pass Rate</div></div>
          <div class="ov-sum-bar">
            <div class="bar" style="height:9px;margin-bottom:9px" id="ov-bar"></div>
            <div style="display:flex;gap:18px;flex-wrap:wrap" id="ov-legend"></div>
          </div>
          <div class="ov-sum-stat"><div class="sv num" id="ov-total">0</div><div class="sl">Test Cases</div></div>
          <div class="ov-sum-stat"><div class="sv num" id="ov-fail" style="color:var(--fail)">0</div><div class="sl">Fails</div></div>
          <div class="ov-sum-stat"><div class="sv num" id="ov-tasks">0</div><div class="sl">Tasks</div></div>
          <div class="ov-sum-stat"><div class="sv num" id="ov-projs">0</div><div class="sl">Projects</div></div>
        </div>
        <div class="ov-projects" id="ov-projects"></div>
      </div>
    </section>

    <!-- Dashboard (Sprint-level) -->
    <section class="dash hide" id="view-dash">
      <div class="crumb" id="dash-crumb"></div>
      <div class="dash-card">
        <div class="dash-hd">
          <div>
            <div class="eyebrow" id="d-eyebrow">—</div>
            <h1 class="num" id="d-sprintname">Sprint</h1>
            <div class="sub"><span id="d-tasks">0</span> tasks · <span class="num" id="d-total">0</span> test cases</div>
          </div>
          <div class="dash-rate"><div class="v num" id="d-rate" style="color:var(--pass)">0<span style="font-size:.42em;color:var(--faint)">%</span></div><div class="lb">Pass Rate</div></div>
        </div>
        <div class="bar" style="height:9px" id="d-bar"></div>
        <div class="legend" id="d-legend"></div>
        <div class="metrics" id="d-metrics"></div>
      </div>
      <div class="dash-tasks">
        <div class="hd">Tasks<span class="cnt" id="d-taskcount"></span></div>
        <div id="d-tasklist"></div>
      </div>
    </section>

    <!-- TC View -->
    <section class="tcview hide" id="view-tc">
      <div class="tc-hdr">
        <div class="top">
          <button class="backbtn" id="back-btn">← กลับ Dashboard</button>
          <a class="tasklink" id="tc-link" href="#" target="_blank">↗ เปิด Taiga</a>
        </div>
        <div class="crumb" id="tc-crumb"></div>
        <div class="title-row"><span class="tid mono" id="tc-tid">#000</span><h1 id="tc-title">—</h1></div>
        <div class="bar" style="height:8px" id="tc-bar"></div>
        <div class="tc-legend" id="tc-legend"></div>
      </div>
      <div class="tc-body">
        <div class="note-box hide" id="tc-note"></div>
        <div class="toolbar">
          <div class="seg" id="tc-filter">
            <button class="on" data-f="all">All</button>
            <button data-f="fail">Fail</button>
            <button data-f="pending">Pending</button>
          </div>
          <button class="collapse-btn" id="toggle-all">Expand all</button>
        </div>
        <div id="tc-list"></div>
        <div class="bug-out" id="bug-out"><div class="bug-title" id="bug-title"></div><div id="bug-list"></div></div>
      </div>
      <div class="actionbar" id="actionbar">
        <div class="actionbar-inner">
          <button class="abtn primary" onclick="showBugReport()">สรุป Bug Report</button>
          <button class="abtn" id="export-btn" onclick="exportBugJSON()" style="display:none">↓ Export JSON</button>
          <button class="abtn send" id="send-btn" onclick="sendToBoard()" style="display:none">↑ ส่งไป Taiga</button>
          <button class="abtn" onclick="resetTask()">Reset</button>
          <span class="ab-spacer" id="ab-summary"></span>
        </div>
      </div>
    </section>
  </main>
</div>

<script src="lib/dashboard.js"></script>
</body>
</html>
